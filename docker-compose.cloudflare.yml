services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ontologyagent-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - ledger
      - chain
      - circle
    restart: unless-stopped
