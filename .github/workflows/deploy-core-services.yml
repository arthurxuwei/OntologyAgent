name: Deploy core services

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-core-services.yml"
      - "docker-compose.core.yml"
      - "docker-compose.cloudflare.yml"
      - "ledger/**"
      - "chain/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: lighthouse-core-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  test-ledger:
    name: Test ledger
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kovaloop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kovaloop_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ledger/requirements.txt

      - name: Install ledger dependencies
        working-directory: ledger
        run: python -m pip install -r requirements.txt

      - name: Run ledger tests
        working-directory: ledger
        env:
          TEST_POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/kovaloop_test
        run: python -m unittest discover -s tests

  test-chain:
    name: Test chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: chain/package-lock.json

      - name: Install chain dependencies
        working-directory: chain
        run: npm ci

      - name: Typecheck chain
        working-directory: chain
        run: npm run typecheck

      - name: Run chain tests
        working-directory: chain
        run: npm test

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs:
      - test-ledger
      - test-chain
    outputs:
      image-prefix: ${{ steps.image-meta.outputs.image-prefix }}
      image-tag: ${{ steps.image-meta.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve image names
        id: image-meta
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image-prefix=${REGISTRY}/${owner}/kovaloop-core" >> "$GITHUB_OUTPUT"
          echo "image-tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Build ledger image
        run: |
          image_prefix="${{ steps.image-meta.outputs.image-prefix }}"
          image_tag="${{ steps.image-meta.outputs.image-tag }}"
          docker build \
            --tag "${image_prefix}/ledger:${image_tag}" \
            --tag "${image_prefix}/ledger:latest" \
            ./ledger

      - name: Build chain and circle runtime image
        run: |
          image_prefix="${{ steps.image-meta.outputs.image-prefix }}"
          image_tag="${{ steps.image-meta.outputs.image-tag }}"
          docker build \
            --tag "${image_prefix}/chain:${image_tag}" \
            --tag "${image_prefix}/chain:latest" \
            ./chain

      - name: Push images
        run: |
          image_prefix="${{ steps.image-meta.outputs.image-prefix }}"
          image_tag="${{ steps.image-meta.outputs.image-tag }}"
          docker push "${image_prefix}/ledger:${image_tag}"
          docker push "${image_prefix}/ledger:latest"
          docker push "${image_prefix}/chain:${image_tag}"
          docker push "${image_prefix}/chain:latest"

  deploy:
    name: Deploy to Tencent Lighthouse
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: lighthouse-core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_SSH_KEY: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
        run: |
          test -n "${LIGHTHOUSE_HOST}"
          test -n "${LIGHTHOUSE_SSH_KEY}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${LIGHTHOUSE_SSH_KEY}" > ~/.ssh/lighthouse_key
          chmod 600 ~/.ssh/lighthouse_key
          ssh-keyscan -H "${LIGHTHOUSE_HOST}" >> ~/.ssh/known_hosts

      - name: Copy compose file
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
        run: |
          test -n "${LIGHTHOUSE_USER}"
          remote="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          ssh -i ~/.ssh/lighthouse_key "${remote}" '
            sudo install -d -o "$USER" -g "$USER" /opt/kovaloop /opt/kovaloop/data /opt/kovaloop/data/ledger /opt/kovaloop/data/chain /opt/kovaloop/website
            if [ -d /opt/chief/data ] && [ ! -e /opt/kovaloop/data/ledger/offchain_ledger.sqlite3 ] && [ ! -e /opt/kovaloop/data/ledger/offchain_ledger.json ]; then
              sudo cp -a /opt/chief/data/. /opt/kovaloop/data/
              sudo chown -R "$USER:$USER" /opt/kovaloop/data
            fi
            touch /opt/kovaloop/.env /opt/kovaloop/.env.database
            chmod 600 /opt/kovaloop/.env.database
          '
          scp -i ~/.ssh/lighthouse_key docker-compose.core.yml "${remote}:/opt/kovaloop/docker-compose.core.yml"
          scp -i ~/.ssh/lighthouse_key docker-compose.website.yml "${remote}:/opt/kovaloop/docker-compose.website.yml"
          scp -i ~/.ssh/lighthouse_key docker-compose.cloudflare.yml "${remote}:/opt/kovaloop/docker-compose.cloudflare.yml"
          scp -i ~/.ssh/lighthouse_key website/index.html "${remote}:/opt/kovaloop/website/index.html"

      - name: Update deployment env
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
          IMAGE_PREFIX: ${{ needs.build-and-push.outputs.image-prefix }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          COINBASE_ONRAMP_BEARER_TOKEN: ${{ secrets.COINBASE_ONRAMP_BEARER_TOKEN }}
          COINBASE_API_KEY_ID: ${{ secrets.COINBASE_API_KEY_ID }}
          COINBASE_API_PRIVATE_KEY: ${{ secrets.COINBASE_API_PRIVATE_KEY }}
          GITHUB_CLIENT_ID: ${{ secrets.KOVALOOP_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.KOVALOOP_GITHUB_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.KOVALOOP_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.KOVALOOP_GOOGLE_CLIENT_SECRET }}
          LEGACY_GITHUB_CLIENT_ID: ${{ secrets.CHIEF_GITHUB_CLIENT_ID }}
          LEGACY_GITHUB_CLIENT_SECRET: ${{ secrets.CHIEF_GITHUB_CLIENT_SECRET }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          LEDGER_DEBUG_ADMIN_TOKEN: ${{ secrets.LEDGER_DEBUG_ADMIN_TOKEN }}
          CIRCLE_API_KEY: ${{ secrets.CIRCLE_API_KEY }}
          CIRCLE_ENTITY_SECRET: ${{ secrets.CIRCLE_ENTITY_SECRET }}
          CIRCLE_WALLET_SET_ID: ${{ secrets.CIRCLE_WALLET_SET_ID }}
          CIRCLE_USDC_TOKEN_ID: ${{ secrets.CIRCLE_USDC_TOKEN_ID }}
          SUPABASE_CONNECTION_URL: ${{ secrets.SUPABASE_CONNECTION_URL }}
        run: |
          remote="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          if [ -z "${GITHUB_CLIENT_ID}" ] && [ -n "${LEGACY_GITHUB_CLIENT_ID}" ]; then GITHUB_CLIENT_ID="${LEGACY_GITHUB_CLIENT_ID}"; fi
          if [ -z "${GITHUB_CLIENT_SECRET}" ] && [ -n "${LEGACY_GITHUB_CLIENT_SECRET}" ]; then GITHUB_CLIENT_SECRET="${LEGACY_GITHUB_CLIENT_SECRET}"; fi
          if [ -z "${CIRCLE_USDC_TOKEN_ID}" ]; then CIRCLE_USDC_TOKEN_ID="aa7bb533-aeb8-535c-bd65-354aed91ea3d"; fi
          {
            printf 'GHCR_IMAGE_PREFIX=%s\nIMAGE_TAG=%s\nKOVALOOP_DATA_ROOT=/opt/kovaloop/data\nCHAIN_PROFILE=base-mainnet\nCIRCLE_BLOCKCHAIN=BASE\nCHAIN_MOCK=false\nLEDGER_SETTLEMENT_ENABLED=true\nLEDGER_SETTLEMENT_REQUIRE_SUCCESS=true\nCLOUDFLARE_TUNNEL_TOKEN=%s\nCOINBASE_ONRAMP_BEARER_TOKEN=%s\nCOINBASE_API_KEY_ID=%s\nCOINBASE_API_PRIVATE_KEY=%s\n' \
              "${IMAGE_PREFIX}" \
              "${IMAGE_TAG}" \
              "${CLOUDFLARE_TUNNEL_TOKEN}" \
              "${COINBASE_ONRAMP_BEARER_TOKEN}" \
              "${COINBASE_API_KEY_ID}" \
              "${COINBASE_API_PRIVATE_KEY}"
            if [ -n "${GITHUB_CLIENT_ID}" ]; then printf 'GITHUB_CLIENT_ID=%s\n' "${GITHUB_CLIENT_ID}"; fi
            if [ -n "${GITHUB_CLIENT_SECRET}" ]; then printf 'GITHUB_CLIENT_SECRET=%s\n' "${GITHUB_CLIENT_SECRET}"; fi
            if [ -n "${GOOGLE_CLIENT_ID}" ]; then printf 'GOOGLE_CLIENT_ID=%s\n' "${GOOGLE_CLIENT_ID}"; fi
            if [ -n "${GOOGLE_CLIENT_SECRET}" ]; then printf 'GOOGLE_CLIENT_SECRET=%s\n' "${GOOGLE_CLIENT_SECRET}"; fi
            if [ -n "${AUTH_SESSION_SECRET}" ]; then printf 'AUTH_SESSION_SECRET=%s\n' "${AUTH_SESSION_SECRET}"; fi
            if [ -n "${ADMIN_TOKEN}" ]; then printf 'ADMIN_TOKEN=%s\n' "${ADMIN_TOKEN}"; fi
            if [ -n "${PUBLIC_BASE_URL}" ]; then printf 'PUBLIC_BASE_URL=%s\n' "${PUBLIC_BASE_URL}"; fi
            if [ -n "${LEDGER_DEBUG_ADMIN_TOKEN}" ]; then printf 'LEDGER_DEBUG_ADMIN_TOKEN=%s\n' "${LEDGER_DEBUG_ADMIN_TOKEN}"; fi
            if [ -n "${CIRCLE_API_KEY}" ]; then printf 'CIRCLE_API_KEY=%s\n' "${CIRCLE_API_KEY}"; fi
            if [ -n "${CIRCLE_ENTITY_SECRET}" ]; then printf 'CIRCLE_ENTITY_SECRET=%s\n' "${CIRCLE_ENTITY_SECRET}"; fi
            if [ -n "${CIRCLE_WALLET_SET_ID}" ]; then printf 'CIRCLE_WALLET_SET_ID=%s\n' "${CIRCLE_WALLET_SET_ID}"; fi
            if [ -n "${CIRCLE_USDC_TOKEN_ID}" ]; then printf 'CIRCLE_USDC_TOKEN_ID=%s\n' "${CIRCLE_USDC_TOKEN_ID}"; fi
          } | ssh -i ~/.ssh/lighthouse_key "${remote}" 'cat > /opt/kovaloop/.env.deploy'
          test -n "${SUPABASE_CONNECTION_URL}"
          printf 'DATABASE_URL=%s\n' "${SUPABASE_CONNECTION_URL}" \
            | ssh -i ~/.ssh/lighthouse_key "${remote}" 'umask 077; cat > /opt/kovaloop/.env.database'
          ssh -i ~/.ssh/lighthouse_key "${remote}" 'grep -q "^DATABASE_URL=." /opt/kovaloop/.env.database'

      - name: Pull and restart services
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          remote="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          ssh_opts=(-o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/lighthouse_key)
          if [ -n "${GHCR_PAT:-}" ]; then
            printf '%s' "${GHCR_PAT}" | ssh "${ssh_opts[@]}" "${remote}" 'sudo docker login ghcr.io -u github-actions --password-stdin'
          fi
          ssh "${ssh_opts[@]}" "${remote}" '
            set -euo pipefail
            cd /opt/kovaloop
            compose_files="-f docker-compose.core.yml -f docker-compose.website.yml"
            if grep -q "^CLOUDFLARE_TUNNEL_TOKEN=." .env.deploy; then
              compose_files="${compose_files} -f docker-compose.cloudflare.yml"
            fi
            echo "Stopping existing services"
            sudo docker rm -f chief-ledger chief-circle chief-cloudflared 2>/dev/null || true
            sudo docker compose --env-file .env --env-file .env.deploy --env-file .env.database ${compose_files} down --remove-orphans
            echo "Pruning stopped containers"
            sudo docker container prune -f
            echo "Pruning old images"
            sudo docker image prune -af
            echo "Pruning build cache"
            sudo docker builder prune -af
            sudo docker system df
            echo "Pulling images"
            sudo docker compose --env-file .env --env-file .env.deploy --env-file .env.database ${compose_files} pull
            echo "Starting services"
            sudo docker compose --env-file .env --env-file .env.deploy --env-file .env.database ${compose_files} up -d --remove-orphans
            sudo docker compose --env-file .env --env-file .env.deploy --env-file .env.database ${compose_files} ps
          '
