name: Deploy core services

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-core-services.yml"
      - "docker-compose.core.yml"
      - "docker-compose.cloudflare.yml"
      - "ledger/**"
      - "chain/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: lighthouse-core-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  test-ledger:
    name: Test ledger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ledger/requirements.txt

      - name: Install ledger dependencies
        working-directory: ledger
        run: python -m pip install -r requirements.txt

      - name: Run ledger tests
        working-directory: ledger
        run: python -m unittest discover -s tests

  test-chain:
    name: Test chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: chain/package-lock.json

      - name: Install chain dependencies
        working-directory: chain
        run: npm ci

      - name: Typecheck chain
        working-directory: chain
        run: npm run typecheck

      - name: Run chain tests
        working-directory: chain
        run: npm test

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs:
      - test-ledger
      - test-chain
    outputs:
      image-prefix: ${{ steps.image-meta.outputs.image-prefix }}
      image-tag: ${{ steps.image-meta.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: image-meta
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "image-prefix=${REGISTRY}/${repo}" >> "$GITHUB_OUTPUT"
          echo "image-tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Build ledger image
        run: |
          image_prefix="${{ steps.image-meta.outputs.image-prefix }}"
          image_tag="${{ steps.image-meta.outputs.image-tag }}"
          docker build \
            --tag "${image_prefix}/ledger:${image_tag}" \
            --tag "${image_prefix}/ledger:latest" \
            ./ledger

      - name: Build chain and circle runtime image
        run: |
          image_prefix="${{ steps.image-meta.outputs.image-prefix }}"
          image_tag="${{ steps.image-meta.outputs.image-tag }}"
          docker build \
            --tag "${image_prefix}/chain:${image_tag}" \
            --tag "${image_prefix}/chain:latest" \
            ./chain

      - name: Push images
        run: |
          image_prefix="${{ steps.image-meta.outputs.image-prefix }}"
          image_tag="${{ steps.image-meta.outputs.image-tag }}"
          docker push "${image_prefix}/ledger:${image_tag}"
          docker push "${image_prefix}/ledger:latest"
          docker push "${image_prefix}/chain:${image_tag}"
          docker push "${image_prefix}/chain:latest"

  deploy:
    name: Deploy to Tencent Lighthouse
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: lighthouse-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_SSH_KEY: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
        run: |
          test -n "${LIGHTHOUSE_HOST}"
          test -n "${LIGHTHOUSE_SSH_KEY}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${LIGHTHOUSE_SSH_KEY}" > ~/.ssh/lighthouse_key
          chmod 600 ~/.ssh/lighthouse_key
          ssh-keyscan -H "${LIGHTHOUSE_HOST}" >> ~/.ssh/known_hosts

      - name: Copy compose file
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
        run: |
          test -n "${LIGHTHOUSE_USER}"
          remote="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          ssh -i ~/.ssh/lighthouse_key "${remote}" '
            sudo install -d -o "$USER" -g "$USER" /opt/chief /opt/chief/data /opt/chief/data/ledger /opt/chief/data/chain
            touch /opt/chief/.env
          '
          scp -i ~/.ssh/lighthouse_key docker-compose.core.yml "${remote}:/opt/chief/docker-compose.core.yml"
          scp -i ~/.ssh/lighthouse_key docker-compose.cloudflare.yml "${remote}:/opt/chief/docker-compose.cloudflare.yml"

      - name: Update deployment env
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
          IMAGE_PREFIX: ${{ needs.build-and-push.outputs.image-prefix }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          remote="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          printf 'GHCR_IMAGE_PREFIX=%s\nIMAGE_TAG=%s\nCHIEF_DATA_ROOT=/opt/chief/data\nCLOUDFLARE_TUNNEL_TOKEN=%s\n' \
            "${IMAGE_PREFIX}" \
            "${IMAGE_TAG}" \
            "${CLOUDFLARE_TUNNEL_TOKEN}" \
            | ssh -i ~/.ssh/lighthouse_key "${remote}" 'cat > /opt/chief/.env.deploy'

      - name: Pull and restart services
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          remote="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          if [ -n "${GHCR_PAT:-}" ]; then
            printf '%s' "${GHCR_PAT}" | ssh -i ~/.ssh/lighthouse_key "${remote}" 'sudo docker login ghcr.io -u github-actions --password-stdin'
          fi
          ssh -i ~/.ssh/lighthouse_key "${remote}" '
            cd /opt/chief
            compose_files="-f docker-compose.core.yml"
            if grep -q "^CLOUDFLARE_TUNNEL_TOKEN=." .env.deploy; then
              compose_files="${compose_files} -f docker-compose.cloudflare.yml"
            fi
            sudo docker compose --env-file .env --env-file .env.deploy ${compose_files} pull
            sudo docker ps -q --filter publish=8092 | xargs -r sudo docker rm -f
            sudo docker ps -q --filter publish=8093 | xargs -r sudo docker rm -f
            sudo docker ps -aq --filter ancestor=cloudflare/cloudflared:latest | xargs -r sudo docker rm -f
            sudo docker compose --env-file .env --env-file .env.deploy ${compose_files} up -d --remove-orphans
            sudo docker compose --env-file .env --env-file .env.deploy ${compose_files} ps
          '
