name: Repair ledger withdrawals

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/repair-ledger-withdrawals.yml"

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_SSH_KEY: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
        run: |
          test -n "${LIGHTHOUSE_HOST}"
          test -n "${LIGHTHOUSE_SSH_KEY}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${LIGHTHOUSE_SSH_KEY}" > ~/.ssh/lighthouse_key
          chmod 600 ~/.ssh/lighthouse_key
          ssh-keyscan -H "${LIGHTHOUSE_HOST}" >> ~/.ssh/known_hosts

      - name: Repair duplicate withdrawal lifecycle rows
        env:
          LIGHTHOUSE_HOST: ${{ secrets.LIGHTHOUSE_HOST }}
          LIGHTHOUSE_USER: ${{ secrets.LIGHTHOUSE_USER }}
        run: |
          test -n "${LIGHTHOUSE_HOST}"
          test -n "${LIGHTHOUSE_USER}"
          remote="${LIGHTHOUSE_USER}@${LIGHTHOUSE_HOST}"
          ssh -i ~/.ssh/lighthouse_key "${remote}" 'sudo docker exec -i chief-ledger python -' <<'PY'
          import json
          import sqlite3

          db_path = "/app/data/offchain_ledger.sqlite3"
          connection = sqlite3.connect(db_path)
          rows = connection.execute(
              "SELECT position, payload FROM ledger_records WHERE collection = ? ORDER BY position",
              ("entries",),
          ).fetchall()
          entries = [json.loads(payload) for _position, payload in rows]
          by_id = {entry.get("entryId"): entry for entry in entries if entry.get("entryId")}

          replacements = {}
          remove_ids = set()
          for entry in list(entries):
              metadata = entry.get("metadata")
              if not isinstance(metadata, dict):
                  continue
              linked_entry_id = metadata.get("linkedEntryId")
              status = metadata.get("dashboardStatus")
              if status not in {"failed", "withdrawn"} or linked_entry_id not in by_id:
                  continue
              target = by_id[linked_entry_id]
              replacement_metadata = dict(metadata)
              replacement_metadata.pop("linkedEntryId", None)
              target.update(
                  {
                      "entryType": entry.get("entryType", target.get("entryType")),
                      "availableDeltaAtomic": entry.get(
                          "availableDeltaAtomic",
                          target.get("availableDeltaAtomic", "0"),
                      ),
                      "lockedDeltaAtomic": entry.get(
                          "lockedDeltaAtomic",
                          target.get("lockedDeltaAtomic", "0"),
                      ),
                      "reason": entry.get("reason", target.get("reason")),
                      "metadata": replacement_metadata,
                      "createdAt": entry.get("createdAt", target.get("createdAt")),
                  }
              )
              replacements[entry.get("entryId")] = linked_entry_id
              remove_ids.add(entry.get("entryId"))

          if replacements:
              entries = [entry for entry in entries if entry.get("entryId") not in remove_ids]
              connection.execute("DELETE FROM ledger_records WHERE collection = ?", ("entries",))
              for position, entry in enumerate(entries):
                  connection.execute(
                      """
                      INSERT INTO ledger_records(collection, record_id, position, payload)
                      VALUES (?, ?, ?, ?)
                      """,
                      (
                          "entries",
                          entry["entryId"],
                          position,
                          json.dumps(entry, separators=(",", ":"), sort_keys=True),
                      ),
                  )
              chain_rows = connection.execute(
                  "SELECT record_id, position, payload FROM ledger_records WHERE collection = ? ORDER BY position",
                  ("chainRecords",),
              ).fetchall()
              for record_id, position, payload in chain_rows:
                  record = json.loads(payload)
                  changed = False
                  entry_ids = record.get("entryIds")
                  if isinstance(entry_ids, list):
                      next_entry_ids = [replacements.get(item, item) for item in entry_ids]
                      changed = changed or next_entry_ids != entry_ids
                      record["entryIds"] = next_entry_ids
                  if changed:
                      connection.execute(
                          """
                          UPDATE ledger_records
                          SET payload = ?
                          WHERE collection = ? AND record_id = ? AND position = ?
                          """,
                          (
                              json.dumps(record, separators=(",", ":"), sort_keys=True),
                              "chainRecords",
                              record_id,
                              position,
                          ),
                      )
              connection.commit()

          print(json.dumps({"replacements": replacements, "removed": sorted(remove_ids)}))
          PY
