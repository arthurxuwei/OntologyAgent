<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OntologyAgent Console</title>
    <style>
      :root {
        --bg: #f4efe4;
        --panel: #fff9ef;
        --panel-strong: #f2e5c6;
        --ink: #1f2933;
        --muted: #5f6c76;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --accent-soft: #d7f3ee;
        --border: #d7c9aa;
        --danger: #b91c1c;
        --shadow: 0 20px 40px rgba(74, 57, 33, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.08), transparent 28%),
          radial-gradient(circle at bottom right, rgba(180, 83, 9, 0.09), transparent 32%),
          linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      }

      .shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px 28px;
      }

      .hero {
        display: grid;
        gap: 10px;
        margin-bottom: 22px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.95;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 22px;
      }

      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 249, 239, 0.98));
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .chat-panel {
        min-height: 68vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .chat-header,
      .side-header {
        padding: 20px 22px;
        border-bottom: 1px solid rgba(215, 201, 170, 0.7);
      }

      .chat-header h2,
      .side-header h2 {
        margin: 0;
        font-size: 20px;
      }

      .messages {
        padding: 22px;
        display: grid;
        gap: 14px;
        align-content: start;
        overflow-y: auto;
      }

      .message {
        max-width: 78%;
        padding: 12px 14px;
        border-radius: 16px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .message.user {
        justify-self: end;
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .message.agent {
        justify-self: start;
        background: var(--panel-strong);
        border-bottom-left-radius: 4px;
      }

      .composer {
        border-top: 1px solid rgba(215, 201, 170, 0.7);
        padding: 16px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
      }

      textarea {
        width: 100%;
        min-height: 54px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px 14px;
        font: inherit;
        background: #fffdf7;
        color: var(--ink);
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        font: inherit;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #fff;
        box-shadow: 0 14px 28px rgba(15, 118, 110, 0.24);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .side {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .side-body {
        padding: 18px;
        display: grid;
        gap: 14px;
      }

      .meta-box {
        padding: 14px;
        border-radius: 16px;
        background: rgba(242, 229, 198, 0.5);
        border: 1px solid rgba(215, 201, 170, 0.9);
      }

      .meta-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .meta-value {
        margin-top: 5px;
        font-size: 13px;
        line-height: 1.5;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .message {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">Pure Core / Dynamic Skills</div>
        <h1>OntologyAgent</h1>
      </section>

      <section class="layout">
        <article class="card chat-panel">
          <header class="chat-header">
            <h2>Agent Chat</h2>
          </header>
          <div id="messages" class="messages"></div>
          <form id="composer" class="composer">
            <textarea id="input" placeholder="Ask the agent..." required></textarea>
            <button id="send" type="submit">Send</button>
          </form>
        </article>

        <aside class="side">
          <section class="card">
            <header class="side-header">
              <h2>Runtime</h2>
            </header>
            <div class="side-body">
              <div class="meta-box">
                <div class="meta-label">Status</div>
                <div id="status" class="meta-value">Loading...</div>
              </div>
              <div class="meta-box">
                <div class="meta-label">Skills</div>
                <div id="skills" class="meta-value">-</div>
              </div>
              <div class="meta-box">
                <div class="meta-label">MCP Health</div>
                <div id="mcp-health" class="meta-value">-</div>
              </div>
              <button id="reload" type="button">Reload Runtime</button>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <script>
      const messagesEl = document.getElementById("messages");
      const composerEl = document.getElementById("composer");
      const inputEl = document.getElementById("input");
      const sendEl = document.getElementById("send");
      const statusEl = document.getElementById("status");
      const skillsEl = document.getElementById("skills");
      const mcpHealthEl = document.getElementById("mcp-health");
      const reloadEl = document.getElementById("reload");

      let sessionId = null;

      function appendMessage(role, text) {
        const node = document.createElement("div");
        node.className = `message ${role}`;
        node.textContent = text;
        messagesEl.appendChild(node);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return node;
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.detail || response.statusText);
        }
        return payload;
      }

      async function ensureSession() {
        if (sessionId) return sessionId;
        const payload = await api("/agent/sessions", { method: "POST" });
        sessionId = payload.sessionId;
        return sessionId;
      }

      async function refreshHealth() {
        try {
          const health = await api("/health");
          statusEl.textContent = `${health.status} / ${health.modelName || "unknown model"} / ${health.toolCount || 0} tools`;
          skillsEl.textContent = (health.skills || []).join("\n") || "No enabled skills";
          mcpHealthEl.textContent = JSON.stringify(health.mcpHealth || {}, null, 2);
        } catch (error) {
          statusEl.textContent = error.message;
          statusEl.classList.add("error");
        }
      }

      function isSendShortcut(event) {
        return (
          event.key === "Enter" &&
          (event.metaKey || event.ctrlKey || event.getModifierState("OS"))
        );
      }

      function submitComposer() {
        if (sendEl.disabled) return;
        if (composerEl.requestSubmit) {
          composerEl.requestSubmit();
        } else {
          composerEl.dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
        }
      }

      inputEl.addEventListener("keydown", (event) => {
        if (!isSendShortcut(event)) return;
        event.preventDefault();
        submitComposer();
      });

      composerEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const input = inputEl.value.trim();
        if (!input) return;

        appendMessage("user", input);
        inputEl.value = "";
        sendEl.disabled = true;
        const agentNode = appendMessage("agent", "");

        try {
          const id = await ensureSession();
          const response = await fetch(`/agent/sessions/${id}/messages/stream`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input }),
          });
          if (!response.ok || !response.body) {
            throw new Error(`Request failed: ${response.status}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const events = buffer.split("\n\n");
            buffer = events.pop() || "";
            for (const eventText of events) {
              const dataLine = eventText.split("\n").find((line) => line.startsWith("data: "));
              if (!dataLine) continue;
              const data = JSON.parse(dataLine.slice(6));
              if (data.delta) agentNode.textContent += data.delta;
              if (data.output) agentNode.textContent = data.output;
              if (data.error) throw new Error(data.error);
            }
          }
        } catch (error) {
          agentNode.textContent = `Error: ${error.message}`;
          agentNode.classList.add("error");
        } finally {
          sendEl.disabled = false;
          refreshHealth();
        }
      });

      reloadEl.addEventListener("click", async () => {
        reloadEl.disabled = true;
        try {
          await api("/agent/reload-runtime", { method: "POST" });
          await refreshHealth();
        } finally {
          reloadEl.disabled = false;
        }
      });

      refreshHealth();
    </script>
  </body>
</html>
