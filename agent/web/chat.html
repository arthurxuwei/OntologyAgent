<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OntologyAgent Console</title>
    <style>
      :root {
        --bg: #f4efe4;
        --panel: #fff9ef;
        --panel-strong: #f2e5c6;
        --ink: #1f2933;
        --muted: #5f6c76;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --accent-soft: #d7f3ee;
        --border: #d7c9aa;
        --danger: #b91c1c;
        --shadow: 0 20px 40px rgba(74, 57, 33, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.08), transparent 28%),
          radial-gradient(circle at bottom right, rgba(180, 83, 9, 0.09), transparent 32%),
          linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      }

      .shell {
        max-width: 1240px;
        margin: 0 auto;
        padding: 32px 20px 28px;
      }

      .hero {
        display: grid;
        gap: 10px;
        margin-bottom: 22px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.95;
        font-weight: 700;
      }

      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 249, 239, 0.98));
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-title {
        margin: 0 0 8px;
        font-size: 16px;
        font-weight: 700;
      }

      .meta-box {
        padding: 14px;
        border-radius: 16px;
        background: rgba(242, 229, 198, 0.5);
        border: 1px solid rgba(215, 201, 170, 0.9);
      }

      .meta-row {
        display: grid;
        gap: 4px;
        margin-bottom: 10px;
      }

      .meta-row:last-child {
        margin-bottom: 0;
      }

      .meta-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .meta-value {
        font-size: 13px;
        line-height: 1.4;
        word-break: break-word;
      }

      .button-grid {
        display: grid;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
        transform: none;
      }

      .primary {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #fff;
        box-shadow: 0 14px 28px rgba(15, 118, 110, 0.24);
      }

      .secondary {
        background: var(--panel-strong);
        color: var(--ink);
      }

      .ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--ink);
      }

      .chat {
        display: grid;
      }

      .workspace {
        min-height: 72vh;
        display: grid;
        grid-template-columns: minmax(360px, 420px) minmax(0, 1fr);
      }

      .chat-main {
        min-height: 72vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .chat-header {
        padding: 22px 24px 14px;
        border-bottom: 1px solid rgba(215, 201, 170, 0.7);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .chat-header h2 {
        margin: 0;
        font-size: 20px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: var(--accent-soft);
        border-radius: 999px;
        color: var(--accent-strong);
        font-size: 13px;
      }

      .status-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: currentColor;
      }

      .messages {
        padding: 22px 24px;
        overflow: auto;
        display: grid;
        gap: 14px;
        align-content: start;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0)),
          linear-gradient(180deg, rgba(244, 239, 228, 0.32), rgba(255, 249, 239, 0.12));
      }

      .message {
        max-width: min(84%, 760px);
        padding: 14px 16px;
        border-radius: 20px;
        border: 1px solid rgba(215, 201, 170, 0.85);
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message.user {
        margin-left: auto;
        background: #f6efe1;
      }

      .message.agent {
        background: #fffdf8;
      }

      .message.intro-message {
        max-width: 380px;
        padding: 8px 10px;
        border-radius: 16px;
        font-size: 13px;
        line-height: 1.45;
        white-space: normal;
      }

      .message.intro-message .message-label {
        margin-bottom: 4px;
        font-size: 11px;
      }

      .message.system {
        max-width: 100%;
        background: #fff5f5;
        border-color: rgba(185, 28, 28, 0.2);
        color: var(--danger);
      }

      .message-label {
        display: block;
        margin-bottom: 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .composer {
        padding: 18px 24px 24px;
        border-top: 1px solid rgba(215, 201, 170, 0.7);
        display: grid;
        gap: 12px;
      }

      .guard-panel {
        padding: 24px 20px;
        border-right: 1px solid rgba(215, 201, 170, 0.7);
        background:
          linear-gradient(180deg, rgba(242, 229, 198, 0.35), rgba(255, 249, 239, 0.72));
      }

      .guard-shell {
        display: grid;
        gap: 14px;
        padding: 18px;
        border-radius: 18px;
        border: 1px solid rgba(215, 201, 170, 0.9);
        background: linear-gradient(180deg, rgba(242, 229, 198, 0.45), rgba(255, 249, 239, 0.72));
      }

      .guard-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .guard-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-content: start;
      }

      .guard-select {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.86);
        padding: 12px 14px;
        font: inherit;
        font-size: 14px;
        color: var(--ink);
      }

      .guard-select:focus {
        outline: 2px solid rgba(15, 118, 110, 0.18);
        border-color: var(--accent);
      }

      .guard-summary {
        display: grid;
        gap: 12px;
      }

      .guard-summary-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .guard-result {
        height: 240px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(215, 201, 170, 0.9);
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: auto;
      }

      textarea {
        width: 100%;
        min-height: 104px;
        resize: vertical;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.72);
        padding: 16px 18px;
        font: inherit;
        font-size: 14px;
        color: var(--ink);
      }

      textarea:focus {
        outline: 2px solid rgba(15, 118, 110, 0.18);
        border-color: var(--accent);
      }

      .composer-actions {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 960px) {
        .workspace,
        .chat-main {
          min-height: auto;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .guard-panel {
          border-right: 0;
          border-bottom: 1px solid rgba(215, 201, 170, 0.7);
        }

        .message {
          max-width: 100%;
        }

        .guard-grid,
        .guard-summary-grid,
        .guard-actions {
          grid-template-columns: 1fr;
        }

        .guard-result {
          height: 180px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <span class="eyebrow">OntologyAgent Console</span>
        <h1>和管家持续对话，同时管理理财子。</h1>
      </section>

      <div class="card chat">
        <div class="workspace">
          <section class="guard-panel">
            <div class="guard-shell">
              <div>
                <h3 class="panel-title">理财子控制台</h3>
              </div>

              <div class="guard-grid">
                <div class="guard-actions">
                  <button class="primary" id="new-session-button" data-control-button>新建会话</button>
                  <select class="guard-select" id="guard-action-select" data-control-button>
                    <option value="/autonomy/status">查看理财子状态</option>
                    <option value="/autonomy/start">启动理财子</option>
                    <option value="/autonomy/tick">执行一轮理财子 Tick</option>
                    <option value="/autonomy/stop">停止理财子</option>
                  </select>
                  <button class="secondary" id="guard-action-button" data-control-button>执行理财子操作</button>
                </div>

                <div class="guard-summary">
                  <div class="guard-summary-grid">
                    <div class="meta-box">
                      <div class="meta-row">
                        <span class="meta-label">Session ID</span>
                        <span class="meta-value" id="session-id">未创建</span>
                      </div>
                      <div class="meta-row">
                        <span class="meta-label">消息数</span>
                        <span class="meta-value" id="message-count">0</span>
                      </div>
                    </div>

                    <div class="meta-box">
                      <div class="meta-row">
                        <span class="meta-label">运行状态</span>
                        <span class="meta-value" id="guard-running">未查询</span>
                      </div>
                      <div class="meta-row">
                        <span class="meta-label">健康状态</span>
                        <span class="meta-value" id="guard-health">未查询</span>
                      </div>
                      <div class="meta-row">
                        <span class="meta-label">最近建议</span>
                        <span class="meta-value" id="guard-decision">未查询</span>
                      </div>
                    </div>

                    <div class="meta-box">
                      <div class="meta-row">
                        <span class="meta-label">Chain Signer</span>
                        <span class="meta-value" id="chain-signer-address">未查询</span>
                      </div>
                      <div class="meta-row">
                        <span class="meta-label">最近链上动作</span>
                        <span class="meta-value" id="recent-chain-action">暂无</span>
                      </div>
                    </div>
                  </div>

                  <div>
                    <span class="meta-label">最近理财子返回</span>
                    <div class="guard-result" id="guard-result">等待操作…</div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="chat-main">
            <header class="chat-header">
              <div>
                <h2>管家</h2>
              </div>
              <div class="status-pill" id="connection-status">Ready</div>
            </header>

            <section class="messages" id="messages">
              <article class="message agent intro-message">
                <span class="message-label">Agent</span>
                页面已准备好。先创建一个 session，然后就可以开始聊天了。
              </article>
            </section>

            <section class="composer">
              <textarea
                id="composer"
                placeholder="输入你的问题，比如：先查看理财子状态，再告诉我当前适合继续交易还是先补充资金。"
              ></textarea>
              <div class="composer-actions">
                <span class="hint">支持多轮会话。左侧理财子负责风控与保护，右侧用于和管家持续交互。</span>
                <button class="primary" id="send-button">发送消息</button>
              </div>
            </section>
          </section>
        </div>
      </div>

    <script>
      const state = {
        sessionId: null,
        messageCount: 0,
        busy: false,
      };

      const sessionIdEl = document.getElementById("session-id");
      const messageCountEl = document.getElementById("message-count");
      const guardRunningEl = document.getElementById("guard-running");
      const guardHealthEl = document.getElementById("guard-health");
      const guardDecisionEl = document.getElementById("guard-decision");
      const chainSignerAddressEl = document.getElementById("chain-signer-address");
      const recentChainActionEl = document.getElementById("recent-chain-action");
      const messagesEl = document.getElementById("messages");
      const composerEl = document.getElementById("composer");
      const sendButtonEl = document.getElementById("send-button");
      const newSessionButtonEl = document.getElementById("new-session-button");
      const connectionStatusEl = document.getElementById("connection-status");
      const guardResultEl = document.getElementById("guard-result");
      const guardActionSelectEl = document.getElementById("guard-action-select");
      const guardActionButtonEl = document.getElementById("guard-action-button");

      const GUARD_ACTION_LABELS = {
        "/autonomy/status": "查看理财子状态",
        "/autonomy/start": "启动理财子",
        "/autonomy/tick": "执行理财子 Tick",
        "/autonomy/stop": "停止理财子",
      };

      function setBusy(busy, label = "Working") {
        state.busy = busy;
        sendButtonEl.disabled = busy;
        newSessionButtonEl.disabled = busy;
        document.querySelectorAll("[data-control-button]").forEach((button) => {
          button.disabled = busy;
        });
        connectionStatusEl.textContent = busy ? label : "Ready";
      }

      function setSession(sessionId, messageCount = 0) {
        state.sessionId = sessionId;
        state.messageCount = messageCount;
        sessionIdEl.textContent = sessionId ?? "未创建";
        messageCountEl.textContent = String(messageCount);
      }

      function addMessage(kind, label, content) {
        const article = document.createElement("article");
        article.className = `message ${kind}`;

        const heading = document.createElement("span");
        heading.className = "message-label";
        heading.textContent = label;
        article.appendChild(heading);

        article.append(document.createTextNode(content));
        messagesEl.appendChild(article);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function updateGuardSummary(payload) {
        const source = payload.ledger ? payload : payload.result ? payload.result : payload;
        const ledger = source.ledger ?? {};
        guardRunningEl.textContent = source.running ? "运行中" : source.enabled ? "已启用，待运行" : "已停止";
        guardHealthEl.textContent = ledger.healthStatus ?? "未知";
        guardDecisionEl.textContent = ledger.lastDecision?.action ?? "暂无";
      }

      function updateGuardResult(title, payload, isError = false) {
        guardResultEl.textContent =
          `${title}\n\n${typeof payload === "string" ? payload : JSON.stringify(payload, null, 2)}`;
        guardResultEl.style.color = isError ? "var(--danger)" : "var(--ink)";
      }

      function summarizeRecentChainAction(action) {
        if (!action || !action.summary) {
          return "暂无";
        }

        const summary = action.summary;
        const parts = [summary.kind || action.tool || "未知动作"];
        if (summary.to) parts.push(`to=${summary.to}`);
        if (summary.target) parts.push(`target=${summary.target}`);
        if (summary.url) parts.push(`url=${summary.url}`);
        if (summary.amountEth) parts.push(`amount=${summary.amountEth} ETH`);
        if (summary.valueEth && summary.valueEth !== "0") parts.push(`value=${summary.valueEth} ETH`);
        if (summary.txHash) parts.push(`tx=${summary.txHash}`);
        if (summary.userOpHash) parts.push(`userOp=${summary.userOpHash}`);
        return parts.join(" | ");
      }

      function updateChainStatus(payload) {
        const wallet = payload?.chainWallet?.wallet ?? {};
        chainSignerAddressEl.textContent = wallet.address ?? "未配置";
        recentChainActionEl.textContent = summarizeRecentChainAction(payload?.recentChainAction);
      }

      async function refreshHealth() {
        try {
          const payload = await requestJson("/health", { method: "GET" });
          updateChainStatus(payload);
        } catch (_error) {
          chainSignerAddressEl.textContent = "读取失败";
          recentChainActionEl.textContent = "读取失败";
        }
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, {
          headers: {
            "content-type": "application/json",
            ...(options.headers || {}),
          },
          ...options,
        });

        let payload = null;
        try {
          payload = await response.json();
        } catch (_error) {
          payload = null;
        }

        if (!response.ok) {
          const detail = payload?.detail ?? JSON.stringify(payload) ?? response.statusText;
          throw new Error(detail);
        }

        return payload;
      }

      async function createSession() {
        setBusy(true, "Creating session");
        try {
          const payload = await requestJson("/agent/sessions", { method: "POST" });
          setSession(payload.sessionId, 0);
          addMessage("system", "System", `已创建新会话：${payload.sessionId}`);
          updateGuardResult("会话已创建", payload);
        } catch (error) {
          addMessage("system", "System", `创建会话失败：${error.message}`);
          updateGuardResult("创建会话失败", error.message, true);
        } finally {
          setBusy(false);
          refreshHealth();
        }
      }

      async function ensureSession() {
        if (!state.sessionId) {
          await createSession();
        }
        return state.sessionId;
      }

      async function sendMessage() {
        const input = composerEl.value.trim();
        if (!input) {
          return;
        }

        const sessionId = await ensureSession();
        if (!sessionId) {
          return;
        }

        addMessage("user", "You", input);
        composerEl.value = "";
        setBusy(true, "Agent thinking");

        try {
          const payload = await requestJson(`/agent/sessions/${sessionId}/messages`, {
            method: "POST",
            body: JSON.stringify({ input }),
          });
          setSession(payload.sessionId, payload.messageCount);
          addMessage("agent", "Agent", payload.output);
        } catch (error) {
          addMessage("system", "System", `发送失败：${error.message}`);
        } finally {
          setBusy(false);
          composerEl.focus();
          refreshHealth();
        }
      }

      async function runGuardAction(path, label) {
        setBusy(true, label);
        try {
          const payload = await requestJson(path, {
            method: path === "/autonomy/status" ? "GET" : "POST",
          });
          updateGuardSummary(payload);
          updateGuardResult(`${label} 完成`, payload);
        } catch (error) {
          updateGuardResult(`${label} 失败`, error.message, true);
        } finally {
          setBusy(false);
          refreshHealth();
        }
      }

      sendButtonEl.addEventListener("click", sendMessage);
      newSessionButtonEl.addEventListener("click", createSession);
      guardActionButtonEl.addEventListener("click", () => {
        const path = guardActionSelectEl.value;
        runGuardAction(path, GUARD_ACTION_LABELS[path] ?? "执行 Guard 操作");
      });
      composerEl.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          event.preventDefault();
          sendMessage();
        }
      });

      runGuardAction("/autonomy/status", "初始化理财子状态");
      refreshHealth();
    </script>
  </body>
</html>
