name: ontologyagent

services:
  agent:
    build:
      context: ./agent
    container_name: agent
    ports:
      - "8000:8000"
    environment:
      CHAIN_MCP_URL: ${CHAIN_MCP_URL:-http://chain-mcp:8091/mcp/}
      CHAIN_TIMEOUT_SECONDS: ${CHAIN_TIMEOUT_SECONDS:-20}
      FREQTRADE_MCP_URL: ${FREQTRADE_MCP_URL:-http://freqtrade:8090/mcp/}
      X402_PAY_TO: ${X402_PAY_TO:-}
      X402_PRICE: ${X402_PRICE:-0.01}
      X402_NETWORK: ${X402_NETWORK:-eip155:84532}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-https://x402.org/facilitator}
    restart: unless-stopped
    depends_on:
      - chain
      - freqtrade

  chain:
    build:
      context: ./chain
    container_name: chain
    ports:
      - "8091:8091"
    environment:
      CHAIN_MCP_PORT: ${CHAIN_MCP_PORT:-8091}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      RPC_URL: ${RPC_URL:-https://base-sepolia-rpc.publicnode.com}
      CHAIN_ID: ${CHAIN_ID:-84532}
      DAILY_LIMIT: ${DAILY_LIMIT:-2.0}
      SINGLE_TX_CAP: ${SINGLE_TX_CAP:-1.0}
      WHITELISTED_RECIPIENTS: ${WHITELISTED_RECIPIENTS:-}
      CHAIN_MOCK: ${CHAIN_MOCK:-false}
      BUNDLER_RPC_URL: ${BUNDLER_RPC_URL:-}
      ENTRY_POINT_ADDRESS: ${ENTRY_POINT_ADDRESS:-0x0576a174D229E3cFA37253523E645A78A0C91B57}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-https://x402.org/facilitator}
      X402_NETWORK: ${X402_NETWORK:-eip155:84532}
      X402_BUYER_PRIVATE_KEY: ${X402_BUYER_PRIVATE_KEY:-}
      X402_USDC_SINGLE_CAP: ${X402_USDC_SINGLE_CAP:-1.0}
      X402_USDC_DAILY_CAP: ${X402_USDC_DAILY_CAP:-2.0}
    networks:
      default:
        aliases:
          - chain-mcp
    restart: unless-stopped

  freqtrade:
    build:
      context: ./freqtrade
    container_name: freqtrade
    ports:
      - "8080:8080"
      - "8090:8090"
    environment:
      FREQTRADE_USERNAME: ${FREQTRADE_USERNAME:-freqtrade}
      FREQTRADE_PASSWORD: ${FREQTRADE_PASSWORD:-freqtrade}
      FREQTRADE_TIMEOUT_SECONDS: ${FREQTRADE_TIMEOUT_SECONDS:-20}
      FREQTRADE_ALLOW_WRITE_ACTIONS: ${FREQTRADE_ALLOW_WRITE_ACTIONS:-true}
      FREQTRADE_API_URL: ${FREQTRADE_API_URL:-http://127.0.0.1:8080/api/v1}
      FREQTRADE_MCP_PORT: ${FREQTRADE_MCP_PORT:-8090}
      FREQTRADE_CONFIG_PATH: /app/config/config.json
      FREQTRADE_STRATEGY_PATH: /app/strategies
      FREQTRADE_STRATEGY_NAME: ${FREQTRADE_STRATEGY_NAME:-SimpleAgentStrategy}
    volumes:
      - ./freqtrade/config:/app/config
      - ./freqtrade/strategies:/app/strategies
      - ./freqtrade/data:/app/data
    restart: unless-stopped
