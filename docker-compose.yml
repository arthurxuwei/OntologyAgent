name: chief

services:
  ledger:
    build:
      context: ./ledger
    container_name: ledger
    ports:
      - "8092:8092"
    environment:
      LEDGER_DB_PATH: ${LEDGER_DB_PATH:-/app/data/offchain_ledger.sqlite3}
      LEDGER_STATE_PATH: ${LEDGER_STATE_PATH:-/app/data/offchain_ledger.json}
      COINBASE_ONRAMP_MOCK: ${COINBASE_ONRAMP_MOCK:-false}
      COINBASE_ONRAMP_API_BASE_URL: ${COINBASE_ONRAMP_API_BASE_URL:-https://api.developer.coinbase.com}
      COINBASE_ONRAMP_TOKEN_PATH: ${COINBASE_ONRAMP_TOKEN_PATH:-/onramp/v1/token}
      COINBASE_ONRAMP_HOSTED_URL: ${COINBASE_ONRAMP_HOSTED_URL:-https://pay.coinbase.com/buy/select-asset}
      COINBASE_ONRAMP_BEARER_TOKEN: ${COINBASE_ONRAMP_BEARER_TOKEN:-}
      COINBASE_API_KEY_ID: ${COINBASE_API_KEY_ID:-}
      COINBASE_API_PRIVATE_KEY: ${COINBASE_API_PRIVATE_KEY:-}
      LEDGER_CHAIN_RECORD_ENABLED: ${LEDGER_CHAIN_RECORD_ENABLED:-false}
      LEDGER_CHAIN_RECORD_REQUIRE_SUCCESS: ${LEDGER_CHAIN_RECORD_REQUIRE_SUCCESS:-false}
      LEDGER_CHAIN_HTTP_URL: ${LEDGER_CHAIN_HTTP_URL:-http://chain:8091}
      LEDGER_CHAIN_RECORDER_ADDRESS: ${LEDGER_CHAIN_RECORDER_ADDRESS:-0x000000000000000000000000000000000000dEaD}
      LEDGER_SETTLEMENT_ENABLED: ${LEDGER_SETTLEMENT_ENABLED:-false}
      LEDGER_SETTLEMENT_REQUIRE_SUCCESS: ${LEDGER_SETTLEMENT_REQUIRE_SUCCESS:-false}
      LEDGER_SETTLEMENT_HTTP_URL: ${LEDGER_SETTLEMENT_HTTP_URL:-http://circle:8093}
      LEDGER_SETTLEMENT_TIMEOUT_SECONDS: ${LEDGER_SETTLEMENT_TIMEOUT_SECONDS:-60}
      LEDGER_WALLET_HTTP_URL: ${LEDGER_WALLET_HTTP_URL:-http://circle:8093}
      LEDGER_WALLET_TIMEOUT_SECONDS: ${LEDGER_WALLET_TIMEOUT_SECONDS:-60}
      CHAIN_PROFILE: ${CHAIN_PROFILE:-base-sepolia}
      X402_USDC_ASSET_ADDRESS: ${X402_USDC_ASSET_ADDRESS:-}
    volumes:
      - ./ledger/data:/app/data
    restart: unless-stopped

  circle:
    build:
      context: ./chain
    container_name: circle
    command: npm run start:circle
    ports:
      - "8093:8093"
    environment:
      CIRCLE_HTTP_PORT: ${CIRCLE_HTTP_PORT:-8093}
      CHAIN_MOCK: ${CHAIN_MOCK:-false}
      CHAIN_MOCK_BALANCE_ETH: ${CHAIN_MOCK_BALANCE_ETH:-1.0}
      CHAIN_MOCK_USDC_BALANCE: ${CHAIN_MOCK_USDC_BALANCE:-0}
      CHAIN_PROFILE: ${CHAIN_PROFILE:-base-sepolia}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-}
      X402_NETWORK: ${X402_NETWORK:-}
      X402_USDC_ASSET_ADDRESS: ${X402_USDC_ASSET_ADDRESS:-}
      CIRCLE_API_KEY: ${CIRCLE_API_KEY:-}
      CIRCLE_ENTITY_SECRET: ${CIRCLE_ENTITY_SECRET:-}
      CIRCLE_ENTITY_SECRET_CIPHERTEXT: ${CIRCLE_ENTITY_SECRET_CIPHERTEXT:-}
      CIRCLE_WALLET_SET_ID: ${CIRCLE_WALLET_SET_ID:-}
      CIRCLE_BLOCKCHAIN: ${CIRCLE_BLOCKCHAIN:-}
      CIRCLE_BASE_URL: ${CIRCLE_BASE_URL:-https://api.circle.com/v1/w3s}
      CIRCLE_USDC_TOKEN_ID: ${CIRCLE_USDC_TOKEN_ID:-}
      AGENT_WALLET_STATE_PATH: ${AGENT_WALLET_STATE_PATH:-/app/data/agent_wallet_state.json}
    volumes:
      - ./chain/data:/app/data
    restart: unless-stopped
