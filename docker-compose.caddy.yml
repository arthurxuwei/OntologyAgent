services:
  caddy:
    image: caddy:2-alpine
    container_name: ontologyagent-caddy
    depends_on:
      - ledger
      - circle
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.core:/etc/caddy/Caddyfile:ro
      - ${ONTOLOGY_DATA_ROOT:-/opt/ontologyagent/data}/caddy/data:/data
      - ${ONTOLOGY_DATA_ROOT:-/opt/ontologyagent/data}/caddy/config:/config
    restart: unless-stopped
