              width: '140px',
              padding: '10px 14px',
              border: `1px solid ${valid || value === '' ? 'var(--stroke-rule)' : 'var(--status-negative)'}`,
              background: 'var(--surface-paper)',
              fontSize: '14px',
              color: 'var(--ink-primary)',
              outline: 'none',
            }}
          />
          <span className="font-mono" style={{ fontSize: '13px', color: 'var(--ink-tertiary)', letterSpacing: '0.04em' }}>
            USDC
          </span>
          <button
            type="button"
            onClick={handleSave}
            disabled={!valid || !dirty}
            className="font-body"
            style={{
              padding: '8px 16px',
              background: (valid && dirty) ? 'var(--ink-primary)' : 'var(--stroke-hairline)',
              border: `1px solid ${(valid && dirty) ? 'var(--ink-primary)' : 'var(--stroke-rule)'}`,
              color: (valid && dirty) ? 'var(--ink-inverse)' : 'var(--ink-tertiary)',
              fontSize: '12px',
              cursor: (valid && dirty) ? 'pointer' : 'not-allowed',
              letterSpacing: '0.02em',
              marginLeft: '8px',
            }}
          >
            {t('mvp.dash.settings.limits_save')}
          </button>
          {dirty && (
            <button
              type="button"
              onClick={handleReset}
              className="smallcaps-mono"
              style={{
                background: 'transparent',
                border: 'none',
                padding: '2px 4px',
                cursor: 'pointer',
                fontSize: '10px',
                color: 'var(--ink-tertiary)',
              }}
            >
              {t('mvp.dash.settings.limits_cancel')}
            </button>
          )}
          {justSaved && (
            <span
              className="smallcaps-mono fade-up"
              style={{ fontSize: '10px', color: 'var(--status-positive)', marginLeft: '4px' }}
            >
              ✓ {t('mvp.dash.settings.limits_saved')}
            </span>
          )}
        </div>
        <div
          className="font-body"
          style={{ marginTop: '10px', fontSize: '12px', color: 'var(--ink-tertiary)', lineHeight: 1.5 }}
        >
          {valid
            ? t('mvp.dash.settings.limits_help')
            : t('mvp.dash.settings.limits_invalid')}
        </div>
      </div>
    );
  }

  function Section({ title, description, children, amber }) {
    return (
      <section
        style={{
          marginTop: '32px',
          paddingTop: '24px',
          borderTop: `1px solid ${amber ? 'var(--accent-amber-soft)' : 'var(--stroke-rule)'}`,
        }}
      >
        <div className="smallcaps-mono" style={{ color: amber ? 'var(--accent-amber)' : 'var(--ink-tertiary)', marginBottom: '4px' }}>
          {title}
        </div>
        {description && (
          <div className="font-body" style={{ fontSize: '13px', color: 'var(--ink-secondary)', marginBottom: '18px', maxWidth: '640px' }}>
            {description}
          </div>
        )}
        {children}
      </section>
    );
  }

  function SignedInCard({ t, user, onSignOut }) {
    if (!user) {
      return (
        <div className="font-body" style={{ fontSize: '13px', color: 'var(--ink-tertiary)' }}>
          —
        </div>
      );
    }
    const displayName = user.name || user.login || user.email || '—';
    const handle = user.login ? `@${user.login}` : user.email;
    const providerLabel = providerDisplay(t, user.provider);
    return (
      <div
        style={{
          display: 'flex',
          alignItems: 'center',
          gap: '14px',
          padding: '14px 16px',
          border: '1px solid var(--stroke-hairline)',
          background: 'var(--surface-paper)',
          maxWidth: '520px',
        }}
      >
        <IdentityAvatar user={user} size={44} />
        <div style={{ minWidth: 0, flex: 1 }}>
          <div
            className="font-body"
            style={{
              fontSize: '14px',
              fontWeight: 500,
              color: 'var(--ink-primary)',
              lineHeight: 1.3,
            }}
          >
            {displayName}
          </div>
          <div
            className="font-body"
            style={{
              fontSize: '12px',
              color: 'var(--ink-secondary)',
              marginTop: '2px',
              lineHeight: 1.4,
              overflow: 'hidden',
              textOverflow: 'ellipsis',
              whiteSpace: 'nowrap',
            }}
          >
            {handle}
            {handle && user.email && user.login ? (
              <span style={{ color: 'var(--ink-tertiary)' }}> · {user.email}</span>
            ) : null}
          </div>
          <div
            className="smallcaps-mono"
            style={{
              fontSize: '9px',
              color: 'var(--ink-tertiary)',
              letterSpacing: '0.06em',
              marginTop: '6px',
            }}
          >
            {t('mvp.dash.settings.account_signed_in_via')} {providerLabel}
          </div>
        </div>
        {onSignOut && (
          <button
            type="button"
            onClick={onSignOut}
            className="smallcaps-mono"
            style={{
              padding: '6px 12px',
              background: 'transparent',
              border: '1px solid var(--stroke-rule)',
              color: 'var(--ink-secondary)',
              fontSize: '10px',
              letterSpacing: '0.08em',
              cursor: 'pointer',
              textTransform: 'uppercase',
              flexShrink: 0,
            }}
          >
            {t('mvp.dash.settings.account_sign_out')}
          </button>
        )}
      </div>
    );
  }

  function providerDisplay(t, provider) {
    switch (provider) {
      case 'github': return t('mvp.dash.settings.account_provider_github');
      case 'email':  return t('mvp.dash.settings.account_provider_email');
      default:       return provider || '—';
    }
  }

  // CSS-generated identicon — colored circle + initial. No network round-trip
  // (so it works offline and in standalone builds). Color is a deterministic
  // hash of the user's stable id (login → email → name → '?').
  function IdentityAvatar({ user, size = 40 }) {
    if (user && user.avatar_url) {
      return (
        <img
          src={user.avatar_url}
          alt=""
          style={{
            width: size,
            height: size,
            borderRadius: '50%',
            objectFit: 'cover',
            flexShrink: 0,
          }}
        />
      );
    }
    const seed = (user && (user.login || user.email || user.name)) || '?';
    const initial = seed[0].toUpperCase();
    const bg = colorFromString(seed);
    return (
      <div
        style={{
          width: size,
          height: size,
          borderRadius: '50%',
          background: bg,
          color: '#FFFFFF',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          fontWeight: 600,
          fontSize: Math.round(size * 0.42),
          flexShrink: 0,
          fontFamily: '"JetBrains Mono", monospace',
          letterSpacing: '0.02em',
        }}
        aria-hidden="true"
      >
        {initial}
      </div>
    );
  }

  function colorFromString(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    const hue = h % 360;
    return `hsl(${hue} 38% 42%)`;
  }

  window.MvpSettingsView = MvpSettingsView;
})();

</script>
<script type="text/babel" data-src="src/dashboard/DashboardApp.jsx">
// MVP dashboard · top-level routing.
//
// Onboarding flow:
//   1. MvpGithubAuthScreen — prototype GitHub-style consent, email-scoped
//   2. MvpClaimScreen      — claim a wallet assigned to the signed-in email
//   3. DashboardSurface   — chrome + 5 tabs
//
// State comes from MvpAppStateProvider (MVP-specific localStorage keys, so
// MVP dashboard state is fully isolated from the main project's dashboard).

(function () {
  function DashboardRouter() {
    const { authChecked, registered, claimed } = window.useAppState();
    if (!authChecked) return <AuthCheckingScreen />;
    if (!registered) return <window.MvpGithubAuthScreen />;
    if (!claimed)    return <window.MvpClaimScreen />;
    return <DashboardSurface />;
  }

  function AuthCheckingScreen() {
    const t = window.useT();
    return (
      <div
        style={{
          minHeight: '100vh',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '48px',
        }}
      >
        <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)' }}>
          {t('mvp.dash.auth.checking')}
        </div>
      </div>
    );
  }

  function DashboardSurface() {
    const { currentUser, ownerEmail, mockState, agents: claimedAgents, activeAgentId, setActiveAgent } =
      window.useAppState();
    // ?tab=<id> lets dev/test land on a specific tab. Default portfolio.
    // ?onramp=1 opens the Coinbase onramp modal on mount (screenshot helper).
    const params = React.useMemo(() => new URLSearchParams(window.location.search), []);
    const initialTab = React.useMemo(() => {
      const t = params.get('tab');
      return ['portfolio', 'overview', 'transactions', 'funding', 'settings'].includes(t)
        ? t
        : 'portfolio';
    }, [params]);
    const [activeTab, setActiveTab] = React.useState(initialTab);
    React.useEffect(() => {
      if (params.get('onramp') === '1' && activeTab === 'funding') {
        // Poll up to ~2s for the button to mount, then click it.
        let tries = 0;
        const tick = () => {
          tries += 1;
          const btn = Array.from(document.querySelectorAll('button')).find(
            (b) => /Open Coinbase/i.test(b.textContent || ''),
          );
          if (btn) { btn.click(); return; }
          if (tries < 20) setTimeout(tick, 100);
        };
        setTimeout(tick, 100);
      }
      // eslint-disable-next-line react-hooks/exhaustive-deps
    }, []);
    const [addAgentOpen, setAddAgentOpen] = React.useState(false);
    const [ledgerDashboardState, setLedgerDashboardState] = React.useState(null);

    React.useEffect(() => {
      let cancelled = false;
      const emailQuery = ownerEmail ? `?email=${encodeURIComponent(ownerEmail)}` : '';
      fetch(`/dashboard/data${emailQuery}`)
        .then((response) => {
          if (!response.ok) throw new Error(`dashboard data ${response.status}`);
          return response.json();
        })
        .then((payload) => {
          if (cancelled || !payload || !payload.agents || !payload.defaultAgentId) return;
          window.DASH_MOCK.day1 = payload;
          window.DASH_CLAIMABLE = {};
          setLedgerDashboardState(payload);
        })
        .catch(() => {
          // Keep the standalone day1 fixture when the backend is unavailable.
        });
      return () => { cancelled = true; };
    }, [ownerEmail]);

    // Same roster-merging logic as main: base roster from mockState ∪
    // user-claimed pool agents. Pool agents always appear as fresh-claim
    // payloads regardless of mockState (matches "you just claimed this").
    const fullState = ledgerDashboardState || window.DASH_MOCK[mockState] || window.DASH_MOCK.day1;
    const baseRoster = fullState.agents;
    const claimablePool = window.DASH_CLAIMABLE || {};

    const claimedFromPool = {};
    for (const id of claimedAgents) {
      if (!baseRoster[id] && claimablePool[id]) {
        claimedFromPool[id] = claimablePool[id];
      }
    }
    const agentRoster = { ...baseRoster, ...claimedFromPool };

    const displayedAgents = claimedAgents.filter((id) => agentRoster[id]);

    const fallbackId = activeAgentId && agentRoster[activeAgentId]
      ? activeAgentId
      : fullState.defaultAgentId;
    const data = agentRoster[fallbackId] || agentRoster[fullState.defaultAgentId];

    // Auto-snap active agent when mockState's roster doesn't include it.
    React.useEffect(() => {
      if (activeAgentId && !agentRoster[activeAgentId]) {
        setActiveAgent(fullState.defaultAgentId);
      }
    }, [mockState, activeAgentId, agentRoster, fullState.defaultAgentId, setActiveAgent]);

    // Force-remount views on agent switch so their local state (Funding form
    // drafts, etc.) resets to the incoming agent.
    const viewKey = fallbackId;

    const handleSelectAgent = (id) => {
      setActiveAgent(id);
      setActiveTab('overview');
    };

    let view;
    if (activeTab === 'portfolio') {
      view = (
        <window.MvpPortfolioView
          effectiveRoster={agentRoster}
          displayedAgents={displayedAgents}
          onSelectAgent={handleSelectAgent}
          onAddAgent={() => setAddAgentOpen(true)}
        />
      );
    } else if (activeTab === 'overview') {
      view = (
        <window.MvpOverviewView
          key={viewKey}
          data={data}
          ownerEmail={ownerEmail}
          onJumpTo={setActiveTab}
        />
      );
    } else if (activeTab === 'transactions') {
      view = <window.MvpTransactionsView key={viewKey} data={data} />;
    } else if (activeTab === 'funding') {
      view = <window.MvpFundingView key={viewKey} data={data} />;
    } else if (activeTab === 'settings') {
      view = <window.MvpSettingsView key={viewKey} data={data} />;
    }

    return (
      <>
        <window.MvpDashboardChrome
          activeTab={activeTab}
          setActiveTab={setActiveTab}
          user={currentUser}
          ownerEmail={ownerEmail}
          agentList={displayedAgents}
          agentRoster={agentRoster}
          onAddAgent={() => setAddAgentOpen(true)}
        >
          {view}
        </window.MvpDashboardChrome>
        {addAgentOpen && (
          <window.MvpAddAgentModal onClose={() => setAddAgentOpen(false)} />
        )}
      </>
    );
  }

  // Reset link — only after onboarding (matches main).
  function ResetLink() {
    const t = window.useT();
    const { claimed, resetAll } = window.useAppState();
    if (!claimed) return null;
    return (
      <button
        type="button"
        onClick={resetAll}
        className="font-mono"
        style={{
          background: 'transparent',
          border: 'none',
          padding: '2px 0',
          cursor: 'pointer',
          fontSize: '10px',
          letterSpacing: '0.06em',
          color: 'var(--ink-tertiary)',
        }}
        title={t('mvp.dash.reset_title')}
      >
        ↻ {t('mvp.dash.reset')}
      </button>
    );
  }

  function DashboardRoot() {
    return (
      <window.LangProvider>
        <window.AppStateProvider>
          <div style={{ background: 'var(--surface-paper)', minHeight: '100vh', position: 'relative' }}>
            <div
              style={{
                position: 'fixed',
                top: '24px',
                right: '48px',
                zIndex: 50,
                display: 'flex',
                alignItems: 'center',
                gap: '16px',
              }}
            >
              <ResetLink />
              <window.LangSwitcher />
            </div>
            <DashboardRouter />
          </div>
        </window.AppStateProvider>
      </window.LangProvider>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<DashboardRoot />);
})();

</script>
</body>
</html>
