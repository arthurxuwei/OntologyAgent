                flex: 1,
                background: 'transparent',
                border: 'none',
                fontSize: '24px',
                fontWeight: 500,
                color: '#0A0B0D',
                outline: 'none',
                fontFamily: 'inherit',
              }}
              inputMode="decimal"
            />
            <span style={{ fontSize: '13px', color: '#8A94A6', fontWeight: 500 }}>USD</span>
          </div>
          <SubHint>{t('mvp.dash.onramp.min_max_hint')}</SubHint>
        </div>

        {/* You receive (USDC) */}
        <div
          style={{
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'baseline',
            padding: '12px 16px',
            background: '#F5F6F8',
            borderRadius: '8px',
            marginBottom: '20px',
          }}
        >
          <div>
            <div style={{ fontSize: '11px', color: '#5B6B79', letterSpacing: '0.04em', textTransform: 'uppercase' }}>
              {t('mvp.dash.onramp.receive_label')}
            </div>
            <div style={{ fontSize: '20px', fontWeight: 500, color: '#0A0B0D', marginTop: '2px' }}>
              {usdcReceive.toFixed(2)} <span style={{ fontSize: '13px', color: '#5B6B79', fontWeight: 400 }}>USDC</span>
            </div>
          </div>
          <div style={{ fontSize: '11px', color: '#5B6B79' }}>
            {t('mvp.dash.onramp.fee_label')}: ${fee.toFixed(2)}
          </div>
        </div>

        {/* Payment method */}
        <div style={{ marginBottom: '24px' }}>
          <Label>{t('mvp.dash.onramp.payment_method_label')}</Label>
          {[
            { id: 'apple_pay',  label: t('mvp.dash.onramp.method_apple_pay'),  meta: '••••2847' },
            { id: 'card',       label: t('mvp.dash.onramp.method_card'),       meta: 'Visa ••••3119' },
            { id: 'bank',       label: t('mvp.dash.onramp.method_bank'),       meta: t('mvp.dash.onramp.method_bank_meta') },
          ].map((m) => (
            <PaymentRow
              key={m.id}
              active={method === m.id}
              onClick={() => setMethod(m.id)}
              label={m.label}
              meta={m.meta}
            />
          ))}
        </div>

        {/* Network reminder */}
        <div
          style={{
            display: 'flex',
            justifyContent: 'space-between',
            fontSize: '12px',
            color: '#5B6B79',
            padding: '10px 0',
            borderTop: '1px solid #E7E9EE',
            borderBottom: '1px solid #E7E9EE',
            marginBottom: '20px',
          }}
        >
          <span>{t('mvp.dash.onramp.network_label')}</span>
          <span style={{ color: '#0A0B0D' }}>Base</span>
        </div>

        {/* CTA */}
        <button
          type="button"
          onClick={onPay}
          disabled={!validAmount}
          style={{
            width: '100%',
            background: validAmount ? '#0052FF' : '#C5C7CD',
            color: '#FFFFFF',
            border: 'none',
            borderRadius: '8px',
            padding: '16px',
            fontSize: '15px',
            fontWeight: 600,
            cursor: validAmount ? 'pointer' : 'not-allowed',
            fontFamily: 'inherit',
          }}
        >
          {t('mvp.dash.onramp.pay_button').replace('{amount}', amount || '0')}
        </button>
      </>
    );
  }

  function PaymentRow({ active, onClick, label, meta }) {
    return (
      <button
        type="button"
        onClick={onClick}
        style={{
          width: '100%',
          background: 'transparent',
          border: `1px solid ${active ? '#0052FF' : '#E7E9EE'}`,
          borderRadius: '8px',
          padding: '12px 14px',
          marginTop: '8px',
          cursor: 'pointer',
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          fontFamily: 'inherit',
          textAlign: 'left',
        }}
      >
        <span style={{ fontSize: '14px', fontWeight: 500, color: '#0A0B0D' }}>{label}</span>
        <span style={{ fontSize: '12px', color: '#5B6B79' }}>{meta}</span>
      </button>
    );
  }

  function CenteredMessage({ title, subtitle, accent }) {
    return (
      <div style={{ textAlign: 'center', padding: '40px 16px' }}>
        <div
          style={{
            fontSize: '20px',
            fontWeight: 600,
            color: accent || '#0A0B0D',
            marginBottom: '8px',
          }}
        >
          {title}
        </div>
        <div style={{ fontSize: '14px', color: '#5B6B79', lineHeight: 1.55 }}>
          {subtitle}
        </div>
      </div>
    );
  }

  function Label({ children }) {
    return (
      <div
        style={{
          fontSize: '11px',
          color: '#5B6B79',
          letterSpacing: '0.04em',
          textTransform: 'uppercase',
          marginBottom: '6px',
          fontWeight: 500,
        }}
      >
        {children}
      </div>
    );
  }

  function SubHint({ children }) {
    return (
      <div style={{ marginTop: '6px', fontSize: '11px', color: '#8A94A6' }}>
        {children}
      </div>
    );
  }

  // Inline SVG wordmark — uses the canonical Coinbase blue circle + 'coinbase'
  // wordmark in white. Not pixel-perfect to their brand, but unmistakable.
  function CoinbaseWordmark() {
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
        <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="16" fill="#FFFFFF" />
          <rect x="11" y="11" width="10" height="10" rx="1.5" fill="#0052FF" />
        </svg>
        <span style={{ fontWeight: 600, fontSize: '15px', letterSpacing: '-0.01em' }}>
          coinbase
        </span>
      </div>
    );
  }

  window.MvpCoinbaseOnrampModal = CoinbaseOnrampModal;
})();

</script>
<script type="text/babel" data-src="src/dashboard/views/AddressPicker.jsx">
// MVP AddressPicker — custom dropdown for choosing among saved external
// withdrawal addresses. Mounted on FundingView (Step 2) and later on
// SettingsView (Step 5) for management.
//
// Why custom (not native <select>): we render a star marker for the default
// wallet, two-line items (label + truncated address), and a trailing
// "+ Add new" action — none of which native <select> supports.
//
// Selection model: controlled. Parent owns `selectedId` and reacts to
// `onSelect`. Default-wallet logic is read from useAppState() purely for
// rendering the ★ marker — selection itself is independent so the user can
// override per-transaction without touching the persisted default.

(function () {
  function AddressPicker({
    selectedId,
    onSelect,
    onAddNew,
    disabled = false,
  }) {
    const t = window.useT();
    const { wallets, defaultWalletId } = window.useAppState();
    const [open, setOpen] = React.useState(false);
    const rootRef = React.useRef(null);

    // Close on outside click or Esc.
    React.useEffect(() => {
      if (!open) return;
      const handleClick = (e) => {
        if (rootRef.current && !rootRef.current.contains(e.target)) {
          setOpen(false);
        }
      };
      const handleKey = (e) => {
        if (e.key === 'Escape') setOpen(false);
      };
      document.addEventListener('mousedown', handleClick);
      document.addEventListener('keydown', handleKey);
      return () => {
        document.removeEventListener('mousedown', handleClick);
        document.removeEventListener('keydown', handleKey);
      };
    }, [open]);

    const selected = wallets.find((w) => w.id === selectedId);
    const isEmpty = wallets.length === 0;

    const handleToggle = () => {
      if (disabled) return;
      setOpen((o) => !o);
    };

    const handlePick = (id) => {
      if (onSelect) onSelect(id);
      setOpen(false);
    };

    const handleAddNew = () => {
      setOpen(false);
      if (onAddNew) onAddNew();
    };

    return (
      <div ref={rootRef} style={{ position: 'relative', width: '100%' }}>
        {/* Closed state — looks like an input but is a button. */}
        <button
          type="button"
          onClick={handleToggle}
          disabled={disabled}
          className="font-body"
          style={{
            width: '100%',
            padding: '10px 14px',
            border: '1px solid var(--stroke-rule)',
            background: disabled ? 'var(--stroke-hairline)' : 'var(--surface-paper)',
            cursor: disabled ? 'not-allowed' : 'pointer',
            fontSize: '14px',
            color: 'var(--ink-primary)',
            outline: 'none',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            textAlign: 'left',
            gap: '12px',
            minHeight: '42px',
          }}
        >
          {isEmpty ? (
            <span style={{ color: 'var(--ink-tertiary)', fontSize: '13px' }}>
              {t('mvp.dash.addr_book.empty_inline')}
            </span>
          ) : selected ? (
            <span style={{ display: 'flex', alignItems: 'center', gap: '10px', minWidth: 0, flex: 1 }}>
              {selected.id === defaultWalletId && (
                <span style={{ color: 'var(--accent-amber)', fontSize: '13px', flexShrink: 0 }}>★</span>
              )}
              <span style={{ fontWeight: 500, flexShrink: 0 }}>{selected.label}</span>
              <ChainChip chain={selected.chain} />
              <span
                className="font-mono"
                style={{ color: 'var(--ink-tertiary)', fontSize: '12px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}
              >
                {truncateAddress(selected.address)}
              </span>
            </span>
          ) : (
            <span style={{ color: 'var(--ink-tertiary)', fontSize: '13px' }}>
              {t('mvp.dash.addr_book.placeholder')}
            </span>
          )}
          <span style={{ color: 'var(--ink-tertiary)', fontSize: '10px', userSelect: 'none', flexShrink: 0 }}>
            {open ? '▲' : '▼'}
          </span>
        </button>

        {open && (
          <div
            style={{
              position: 'absolute',
              top: 'calc(100% + 4px)',
              left: 0,
              right: 0,
              background: 'var(--surface-paper)',
              border: '1px solid var(--stroke-rule)',
              boxShadow: '0 4px 16px rgba(26, 26, 26, 0.12)',
              zIndex: 10,
              maxHeight: '320px',
              overflowY: 'auto',
            }}
          >
            {isEmpty ? (
              <div style={{ padding: '20px 14px', textAlign: 'center' }}>
                <div
                  className="font-body"
                  style={{
                    fontSize: '13px',
                    color: 'var(--ink-tertiary)',
                    marginBottom: '12px',
                  }}
                >
                  {t('mvp.dash.addr_book.empty_title')}
                </div>
                <button
                  type="button"
                  onClick={handleAddNew}
                  className="font-body"
                  style={{
                    background: 'var(--ink-primary)',
                    border: '1px solid var(--ink-primary)',
                    color: 'var(--ink-inverse)',
                    padding: '8px 16px',
                    fontSize: '13px',
                    cursor: 'pointer',
                    letterSpacing: '0.02em',
                  }}
                >
                  {t('mvp.dash.addr_book.empty_cta')}
                </button>
              </div>
            ) : (
              <>
                {wallets.map((w) => (
                  <button
                    key={w.id}
                    type="button"
                    onClick={() => handlePick(w.id)}
                    className="font-body"
                    style={{
                      display: 'block',
                      width: '100%',
                      padding: '10px 14px',
                      background: w.id === selectedId ? 'var(--accent-amber-soft)' : 'transparent',
                      border: 'none',
                      borderBottom: '1px solid var(--stroke-hairline)',
                      cursor: 'pointer',
                      textAlign: 'left',
                      fontSize: '13px',
                      color: 'var(--ink-primary)',
                    }}
                  >
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                      {w.id === defaultWalletId ? (
                        <span style={{ color: 'var(--accent-amber)', fontSize: '12px', width: '12px', flexShrink: 0 }}>★</span>
                      ) : (
                        <span style={{ width: '12px', flexShrink: 0 }} />
                      )}
                      <span style={{ fontWeight: 500 }}>{w.label}</span>
                      <ChainChip chain={w.chain} />
                    </div>
                    <div
                      className="font-mono"
                      style={{
                        marginTop: '2px',
                        marginLeft: '20px',
                        fontSize: '11px',
                        color: 'var(--ink-tertiary)',
                        overflow: 'hidden',
                        textOverflow: 'ellipsis',
                        whiteSpace: 'nowrap',
                      }}
                    >
                      {truncateAddress(w.address)}
                    </div>
                  </button>
                ))}
                <button
                  type="button"
                  onClick={handleAddNew}
                  className="font-body"
                  style={{
                    display: 'block',
                    width: '100%',
                    padding: '10px 14px',
                    background: 'transparent',
                    border: 'none',
                    cursor: 'pointer',
                    textAlign: 'left',
                    fontSize: '13px',
                    color: 'var(--accent-amber)',
                    letterSpacing: '0.01em',
                  }}
                >
                  + {t('mvp.dash.addr_book.add_new')}
                </button>
              </>
            )}
          </div>
        )}
      </div>
    );
  }

  function truncateAddress(addr) {
    if (!addr) return '';
    if (addr.length <= 13) return addr;
    return `${addr.slice(0, 6)}…${addr.slice(-4)}`;
  }

  // Small lozenge that surfaces the wallet's destination chain. Static for
  // MVP (Base is the only enabled chain) but kept as a component so adding
  // more chains later only touches this one place.
  function ChainChip({ chain }) {
    const label = (chain || 'base').toUpperCase();
    return (
      <span
        className="smallcaps-mono"
        style={{
          display: 'inline-block',
          padding: '1px 6px',
          fontSize: '9px',
          letterSpacing: '0.06em',
          color: 'var(--ink-secondary)',
          border: '1px solid var(--stroke-rule)',
          background: 'var(--surface-paper)',
          lineHeight: 1.5,
          flexShrink: 0,
        }}
      >
        {label}
      </span>
    );
  }

  window.AddressPicker = AddressPicker;
})();

</script>
<script type="text/babel" data-src="src/dashboard/views/QRScanner.jsx">
// MVP QRScanner — captures a QR code from the device camera or an uploaded
// image and emits the parsed wallet address via `onDecode(address)`.
//
// Standalone component: renders the scan surface only — no modal chrome.
// AddAddressModal (Step 4) embeds this inside its own dialog. For isolated
// verification, see `mvp/qr_test.html`.
//
// Address parser accepts three input shapes:
//   1. Raw hex:      0x[40 hex chars]
//   2. EIP-681 URI:  ethereum:0x... or base:0x... (with optional @chainId / ?params)
//   3. Fallback:     any string containing a 0x[40 hex] substring
//
// Camera lifecycle: getUserMedia({ facingMode: 'environment' }) on mount,
// rAF loop draws frames to a hidden canvas and runs jsQR on the pixel
// buffer. Stream + rAF are torn down on unmount, on success, and while
// showing the error overlay (resumed via "Try again").

(function () {
  const ADDRESS_RE      = /^0x[a-fA-F0-9]{40}$/;
  const URI_PREFIX_RE   = /^(?:ethereum|base):(0x[a-fA-F0-9]{40})/i;
  const ADDRESS_GREP_RE = /0x[a-fA-F0-9]{40}/;

  function parseAddress(text) {
    if (!text) return null;
    const trimmed = String(text).trim();
    if (ADDRESS_RE.test(trimmed)) return trimmed;
    const uriMatch = trimmed.match(URI_PREFIX_RE);
    if (uriMatch) return uriMatch[1];
    const grepMatch = trimmed.match(ADDRESS_GREP_RE);
    if (grepMatch) return grepMatch[0];
    return null;
  }

  function QRScanner({ onDecode }) {
    const t = window.useT();
    const videoRef     = React.useRef(null);
    const canvasRef    = React.useRef(null);
    const streamRef    = React.useRef(null);
    const rafRef       = React.useRef(null);
    const fileInputRef = React.useRef(null);

    // 'requesting' | 'scanning' | 'denied' | 'no-camera' | 'error'
    const [status, setStatus]     = React.useState('requesting');
    const [errorKey, setErrorKey] = React.useState('');

    const stopStream = React.useCallback(() => {
      if (streamRef.current) {
        streamRef.current.getTracks().forEach((trk) => trk.stop());
        streamRef.current = null;
      }
      if (rafRef.current) {
        cancelAnimationFrame(rafRef.current);
        rafRef.current = null;
      }
    }, []);

    const handleDecodedText = React.useCallback((text) => {
      const addr = parseAddress(text);
      if (!addr) {
        setErrorKey('mvp.dash.addr_scan.error_not_address');
        setStatus('error');
        return;
      }
      stopStream();
      if (onDecode) onDecode(addr);
    }, [onDecode, stopStream]);

    // Start camera on mount (and whenever we return to 'requesting' via retry).
    React.useEffect(() => {
      if (status !== 'requesting') return;
      let cancelled = false;
      async function start() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          if (!cancelled) setStatus('no-camera');
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' },
            audio: false,
          });
          if (cancelled) {
            stream.getTracks().forEach((trk) => trk.stop());
            return;
          }
          streamRef.current = stream;
          const video = videoRef.current;
          if (video) {
            video.srcObject = stream;
            video.setAttribute('playsinline', 'true');
            await video.play().catch(() => { /* autoplay blocked is harmless; we still read frames */ });
          }
          setStatus('scanning');
        } catch (e) {
          if (cancelled) return;
          // NotAllowedError → user denied. OverconstrainedError / NotFoundError
          // → no camera that matches. Treat both as "use upload instead".
          const name = e && e.name;
          setStatus(name === 'NotAllowedError' ? 'denied' : 'no-camera');
        }
      }
      start();
      return () => {
        cancelled = true;
      };
    }, [status]);

    // rAF scan loop — runs only while scanning.
    React.useEffect(() => {
      if (status !== 'scanning') return;
      const video  = videoRef.current;
      const canvas = canvasRef.current;
      if (!video || !canvas) return;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      if (!ctx) return;

      const tick = () => {
        if (video.readyState >= video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          try {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const result = typeof window.jsQR === 'function'
              ? window.jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' })
              : null;
            if (result && result.data) {
              handleDecodedText(result.data);
              return;
            }
          } catch { /* keep scanning */ }
        }
        rafRef.current = requestAnimationFrame(tick);
      };
      rafRef.current = requestAnimationFrame(tick);
      return () => {
        if (rafRef.current) {
          cancelAnimationFrame(rafRef.current);
          rafRef.current = null;
        }
      };
    }, [status, handleDecodedText]);

    // Tear down the stream on unmount.
    React.useEffect(() => () => stopStream(), [stopStream]);

    const handleUpload = async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload  = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const img = await new Promise((resolve, reject) => {
          const i = new Image();
          i.onload  = () => resolve(i);
          i.onerror = reject;
          i.src = dataUrl;
        });
        // Use an offscreen canvas so we don't disturb the live-scan canvas.
        const off = document.createElement('canvas');
        off.width  = img.naturalWidth;
        off.height = img.naturalHeight;
        const offCtx = off.getContext('2d', { willReadFrequently: true });
        offCtx.drawImage(img, 0, 0);
        const imageData = offCtx.getImageData(0, 0, off.width, off.height);
        const result = typeof window.jsQR === 'function'
          ? window.jsQR(imageData.data, off.width, off.height)
          : null;
        if (!result || !result.data) {
          setErrorKey('mvp.dash.addr_scan.error_no_qr');
          setStatus('error');
          return;
        }
        handleDecodedText(result.data);
      } catch {
        setErrorKey('mvp.dash.addr_scan.error_image_read');
        setStatus('error');
      } finally {
        // Reset so user can re-pick the same file after a failed attempt.
        if (fileInputRef.current) fileInputRef.current.value = '';
      }
    };

    const handleRetry = () => {
      setErrorKey('');
      // If the stream is still alive, resume scanning; otherwise re-request.
      if (streamRef.current) {
        setStatus('scanning');
      } else {
        setStatus('requesting');
      }
    };

    const showVideo = status === 'scanning' || status === 'error';

    return (
      <div style={{ width: '100%' }}>
        {/* Scan surface — square-ish viewport. */}
        <div
          style={{
            position: 'relative',
            width: '100%',
            aspectRatio: '1 / 1',
            background: 'var(--surface-deep, #1A1A1A)',
            border: '1px solid var(--stroke-rule, rgba(26,26,26,0.20))',
            overflow: 'hidden',
          }}
        >
          {/* Video stays mounted across scanning/error so the stream survives. */}
          <video
            ref={videoRef}
            muted
            autoPlay
            playsInline
            style={{
              width: '100%',
              height: '100%',
              objectFit: 'cover',
              display: showVideo ? 'block' : 'none',
            }}
          />
          {/* Canvas is offscreen — used only for pixel reads. */}
          <canvas ref={canvasRef} style={{ display: 'none' }} />

          {/* Status overlays — only shown when not scanning. */}
          {status === 'requesting' && (
            <Overlay tone="info">
              <div className="font-body" style={{ fontSize: '13px', color: 'rgba(245,241,234,0.78)' }}>
                {t('mvp.dash.addr_scan.requesting')}
              </div>
            </Overlay>
          )}
          {status === 'denied' && (
            <Overlay tone="warn">
              <div className="font-body" style={{ fontSize: '13px', color: 'rgba(245,241,234,0.92)', marginBottom: '6px' }}>
                {t('mvp.dash.addr_scan.denied')}
              </div>
              <div className="font-body" style={{ fontSize: '11px', color: 'rgba(245,241,234,0.6)' }}>
                {t('mvp.dash.addr_scan.upload_instead')}
              </div>
            </Overlay>
          )}
          {status === 'no-camera' && (
            <Overlay tone="warn">
              <div className="font-body" style={{ fontSize: '13px', color: 'rgba(245,241,234,0.92)', marginBottom: '6px' }}>
                {t('mvp.dash.addr_scan.no_camera')}
              </div>
              <div className="font-body" style={{ fontSize: '11px', color: 'rgba(245,241,234,0.6)' }}>
                {t('mvp.dash.addr_scan.upload_instead')}
              </div>
            </Overlay>
          )}
          {status === 'error' && (
            <Overlay tone="warn">
              <div className="font-body" style={{ fontSize: '13px', color: 'rgba(245,241,234,0.92)', marginBottom: '10px', textAlign: 'center', padding: '0 12px' }}>
                {t(errorKey)}
              </div>
              <button
                type="button"
                onClick={handleRetry}
                className="font-body"
                style={{
                  background: 'transparent',
                  border: '1px solid rgba(245,241,234,0.6)',
                  color: 'rgba(245,241,234,0.92)',
                  padding: '6px 14px',
                  fontSize: '12px',
                  cursor: 'pointer',
                  letterSpacing: '0.04em',
                }}
              >
                {t('mvp.dash.addr_scan.retry')}
              </button>
            </Overlay>
          )}

          {/* Subtle scan-area hint when scanning. */}
          {status === 'scanning' && (
            <div
              style={{
                position: 'absolute',
                inset: 0,
                pointerEvents: 'none',
                display: 'flex',
                alignItems: 'flex-end',
                justifyContent: 'center',
                padding: '14px',
              }}
            >
              <div
                className="font-body"
                style={{
                  background: 'rgba(0,0,0,0.55)',
                  color: 'rgba(245,241,234,0.92)',
                  padding: '4px 10px',
                  fontSize: '11px',
                  letterSpacing: '0.04em',
                }}
              >
                {t('mvp.dash.addr_scan.hint')}
              </div>
            </div>
          )}
        </div>

        {/* Upload fallback — always available, regardless of camera state. */}
        <div
          style={{
            marginTop: '12px',
            display: 'flex',
            alignItems: 'center',
            gap: '10px',
            justifyContent: 'space-between',
          }}
        >
          <div
            className="font-body"
            style={{ fontSize: '11px', color: 'var(--ink-tertiary, #8B847A)', letterSpacing: '0.02em' }}
          >
            {t('mvp.dash.addr_scan.or_upload')}
          </div>
          <label
            className="font-body"
            style={{
              padding: '6px 12px',
              background: 'transparent',
              border: '1px solid var(--stroke-rule, rgba(26,26,26,0.20))',
              color: 'var(--ink-primary, #1A1A1A)',
              fontSize: '12px',
              cursor: 'pointer',
              letterSpacing: '0.02em',
            }}
          >
            {t('mvp.dash.addr_scan.upload')}
            <input
              ref={fileInputRef}
              type="file"
              accept="image/*"
              onChange={handleUpload}
              style={{ display: 'none' }}
            />
          </label>
        </div>
      </div>
    );
  }

  function Overlay({ tone, children }) {
    // tone is ornamental; the dark video backdrop already carries the look.
    return (
      <div
        style={{
          position: 'absolute',
          inset: 0,
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          background: tone === 'warn'
            ? 'rgba(26,26,26,0.88)'
            : 'rgba(26,26,26,0.7)',
          padding: '16px',
          textAlign: 'center',
        }}
      >
        {children}
      </div>
    );
  }

  window.QRScanner = QRScanner;
  // Exported for tests / debugging.
  window.parseQRAddress = parseAddress;
})();

</script>
<script type="text/babel" data-src="src/dashboard/views/AddAddressModal.jsx">
// MVP · AddAddressModal — adds a wallet to the owner's address book.
//
// State machine (single form with a transforming body):
//   choose  → user picks method (Scan QR / Paste)
//   scan    → QRScanner is mounted; onDecode flips to confirm
//   paste   → 0x… text input + Continue button → confirm on valid input
//   confirm → captured address (readonly) + label + "set as default" + Save
//
// Both methods feed the same final form because the data we collect is the
// same regardless of input source — only the capture step differs. Buttons
// for Scan and Paste stay symmetrical on desktop AND mobile (camera might be
// unavailable, but the picker hides under camera-denied/no-camera overlays,
// and Paste is always there as the deterministic fallback).
//
// On Save: window.useAppState().addWallet(label, address, { setAsDefault })
// is called and the modal closes. The picker upstream re-renders against the
// new wallets[] automatically (context update).

(function () {
  const STRICT_ADDR_RE = /^0x[a-fA-F0-9]{40}$/;

  function AddAddressModal({ open, onClose }) {
    const t = window.useT();
    const { wallets, addWallet } = window.useAppState();

    // mode + per-mode draft state, all reset on open.
    const [mode, setMode]               = React.useState('choose');
    const [address, setAddress]         = React.useState('');
    const [pasteInput, setPasteInput]   = React.useState('');
    const [label, setLabel]             = React.useState('');
    const [setAsDefault, setSetAsDefault] = React.useState(false);

    React.useEffect(() => {
      if (open) {
        setMode('choose');
        setAddress('');
        setPasteInput('');
        setLabel('');
        setSetAsDefault(false);
      }
    }, [open]);

    // Esc closes (any mode).
    React.useEffect(() => {
      if (!open) return;
      const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
      document.addEventListener('keydown', onKey);
      return () => document.removeEventListener('keydown', onKey);
    }, [open, onClose]);

    if (!open) return null;

    // Case-insensitive duplicate check against existing wallets.
    const normalizedAddress = address.toLowerCase();
    const duplicate = !!normalizedAddress && wallets.some(
      (w) => w.address.toLowerCase() === normalizedAddress
    );

    const pasteValid = STRICT_ADDR_RE.test(pasteInput.trim());

    const handleBack = () => {
      // Return to method picker; discard whatever was captured.
      setMode('choose');
      setAddress('');
      setPasteInput('');
    };

    const handleScanDecoded = (addr) => {
      setAddress(addr);
      // Default label suggestion: "Wallet N+1".
      setLabel('');
      setMode('confirm');
    };

    const handlePasteContinue = () => {
      if (!pasteValid) return;
      setAddress(pasteInput.trim());
      setMode('confirm');
    };

    const handleSave = () => {
      if (!address || duplicate) return;
      const finalLabel = label.trim() || `Wallet ${wallets.length + 1}`;
      // MVP locks chain to 'base'. Selector skeleton in Confirm exposes the
      // future multi-chain UI but is non-interactive until phase 2 / CCTP.
      addWallet(finalLabel, address, { chain: 'base', setAsDefault });
      onClose && onClose();
    };

    return (
      <div
        onClick={(e) => { if (e.target === e.currentTarget) onClose && onClose(); }}
        style={{
          position: 'fixed',
          inset: 0,
          background: 'rgba(26, 26, 26, 0.55)',
          zIndex: 100,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '32px',
        }}
      >
        <div
          style={{
            width: '480px',
            maxWidth: '100%',
            maxHeight: 'calc(100vh - 64px)',
            overflowY: 'auto',
            background: 'var(--surface-card)',
            border: '1px solid var(--stroke-rule)',
            boxShadow: '0 24px 64px rgba(0,0,0,0.24)',
          }}
        >
          {/* Header */}
          <div
            style={{
              padding: '20px 24px',
              borderBottom: '1px solid var(--stroke-hairline)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
            }}
          >
            <div className="font-display" style={{ fontSize: '18px', color: 'var(--ink-primary)', letterSpacing: '-0.005em' }}>
              {t('mvp.dash.addr_add.title')}
            </div>
            <button
              type="button"
              onClick={onClose}
              aria-label="Close"
              style={{
                background: 'transparent',
                border: 'none',
                color: 'var(--ink-tertiary)',
                fontSize: '22px',
                cursor: 'pointer',
                padding: '0 4px',
                lineHeight: 1,
              }}
            >
              ×
            </button>
          </div>

          {/* Body */}
          <div style={{ padding: '20px 24px 24px' }}>
            {mode === 'choose' && (
              <ChooseMethod t={t} onPick={(m) => setMode(m)} />
            )}

            {mode === 'scan' && (
              <ScanArea
                t={t}
                onBack={handleBack}
                onDecode={handleScanDecoded}
              />
            )}

            {mode === 'paste' && (
              <PasteArea
                t={t}
                value={pasteInput}
                onChange={setPasteInput}
                valid={pasteValid}
                touched={pasteInput.length > 0}
                onBack={handleBack}
                onContinue={handlePasteContinue}
              />
            )}

            {mode === 'confirm' && (
              <ConfirmArea
                t={t}
                address={address}
                label={label}
                onLabelChange={setLabel}
                setAsDefault={setAsDefault}
                onSetAsDefaultChange={setSetAsDefault}
                walletCount={wallets.length}
                duplicate={duplicate}
                onBack={handleBack}
                onCancel={onClose}
                onSave={handleSave}
              />
            )}
          </div>
        </div>
      </div>
    );
  }

  function ChooseMethod({ t, onPick }) {
    return (
      <>
        <div className="font-body" style={{ fontSize: '13px', color: 'var(--ink-secondary)', marginBottom: '16px' }}>
          {t('mvp.dash.addr_add.instruction')}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
          <MethodButton
            icon="📷"
            title={t('mvp.dash.addr_add.method_scan')}
            desc={t('mvp.dash.addr_add.method_scan_desc')}
            onClick={() => onPick('scan')}
          />
          <MethodButton
            icon="⌨️"
            title={t('mvp.dash.addr_add.method_paste')}
            desc={t('mvp.dash.addr_add.method_paste_desc')}
            onClick={() => onPick('paste')}
          />
        </div>
      </>
    );
  }

  function MethodButton({ icon, title, desc, onClick }) {
    return (
      <button
        type="button"
        onClick={onClick}
        className="font-body"
        style={{
          padding: '16px 14px',
          background: 'var(--surface-paper)',
          border: '1px solid var(--stroke-rule)',
          cursor: 'pointer',
          textAlign: 'left',
          display: 'flex',
          flexDirection: 'column',
          gap: '6px',
          minHeight: '92px',
        }}
      >
        <div style={{ fontSize: '20px', lineHeight: 1 }}>{icon}</div>
        <div style={{ fontSize: '14px', fontWeight: 500, color: 'var(--ink-primary)' }}>{title}</div>
        <div style={{ fontSize: '11px', color: 'var(--ink-tertiary)', lineHeight: 1.4 }}>{desc}</div>
      </button>
    );
  }

  function ScanArea({ t, onBack, onDecode }) {
    return (
      <>
        <BackLink t={t} onBack={onBack} />
        <window.QRScanner onDecode={onDecode} />
      </>
    );
  }

  function PasteArea({ t, value, onChange, valid, touched, onBack, onContinue }) {
    const handleKeyDown = (e) => {
      if (e.key === 'Enter' && valid) onContinue();
    };
    return (
      <>
        <BackLink t={t} onBack={onBack} />
        <div className="smallcaps-mono" style={{ color: 'var(--ink-secondary)', marginBottom: '6px' }}>
          {t('mvp.dash.addr_add.paste_label')}
        </div>
        <input
          type="text"
          autoFocus
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder={t('mvp.dash.addr_add.paste_placeholder')}
          className="font-mono"
          style={{
            width: '100%',
            padding: '10px 14px',
            border: `1px solid ${touched && !valid ? 'var(--status-negative)' : 'var(--stroke-rule)'}`,
            background: 'var(--surface-paper)',
            fontSize: '14px',
            color: 'var(--ink-primary)',
            outline: 'none',
          }}
        />
        {touched && !valid && (
          <div className="font-body" style={{ marginTop: '6px', fontSize: '11px', color: 'var(--status-negative)' }}>
            {t('mvp.dash.addr_add.paste_invalid')}
          </div>
        )}
        <div style={{ marginTop: '18px', display: 'flex', justifyContent: 'flex-end' }}>
          <button
            type="button"
            onClick={onContinue}
            disabled={!valid}
            className="font-body"
            style={{
              padding: '10px 20px',
              background: valid ? 'var(--ink-primary)' : 'var(--stroke-hairline)',
              border: `1px solid ${valid ? 'var(--ink-primary)' : 'var(--stroke-rule)'}`,
              color: valid ? 'var(--ink-inverse)' : 'var(--ink-tertiary)',
              fontSize: '13px',
              cursor: valid ? 'pointer' : 'not-allowed',
              letterSpacing: '0.02em',
            }}
          >
            {t('mvp.dash.addr_add.continue')} →
          </button>
        </div>
      </>
    );
  }

  function ConfirmArea({
    t, address, label, onLabelChange, setAsDefault, onSetAsDefaultChange,
    walletCount, duplicate, onBack, onCancel, onSave,
  }) {
    const canSave = !duplicate;
    const placeholder = `Wallet ${walletCount + 1}`;
    return (
      <>
        <BackLink t={t} onBack={onBack} />

        <div className="smallcaps-mono" style={{ color: 'var(--ink-secondary)', marginBottom: '6px' }}>
          {t('mvp.dash.addr_add.captured_label')}
        </div>
        <div
          className="font-mono"
          style={{
            padding: '10px 14px',
            border: '1px solid var(--stroke-hairline)',
            background: duplicate ? 'rgba(122, 38, 32, 0.06)' : 'var(--surface-paper)',
            fontSize: '13px',
            color: 'var(--ink-primary)',
            wordBreak: 'break-all',
          }}
        >
          {address}
        </div>
        {duplicate && (
          <div className="font-body" style={{ marginTop: '6px', fontSize: '11px', color: 'var(--status-negative)' }}>
            {t('mvp.dash.addr_add.duplicate')}
          </div>
        )}

        {/* Chain selector skeleton: only Base is enabled in MVP, but the
            other chains are drawn so the user understands what's coming. */}
        <div style={{ marginTop: '16px' }}>
          <div className="smallcaps-mono" style={{ color: 'var(--ink-secondary)', marginBottom: '6px' }}>
            {t('mvp.dash.addr_add.chain_label')}
          </div>
          <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
            <ChainOption label="Base"      selected />
            <ChainOption label="Arbitrum"  disabled />
            <ChainOption label="Optimism"  disabled />
            <ChainOption label="Polygon"   disabled />
            <ChainOption label="Solana"    disabled />
            <ChainOption label="Ethereum"  disabled />
          </div>
          <div className="font-body" style={{ marginTop: '8px', fontSize: '11px', color: 'var(--ink-tertiary)', lineHeight: 1.5 }}>
            {t('mvp.dash.addr_add.chain_disclaimer')}
          </div>
        </div>

        <div style={{ marginTop: '16px' }}>
          <div className="smallcaps-mono" style={{ color: 'var(--ink-secondary)', marginBottom: '6px' }}>
            {t('mvp.dash.addr_add.label_label')}
          </div>
          <input
            type="text"
            value={label}
            onChange={(e) => onLabelChange(e.target.value)}
            placeholder={placeholder}
            className="font-body"
            style={{
              width: '100%',
              padding: '10px 14px',
              border: '1px solid var(--stroke-rule)',
              background: 'var(--surface-paper)',
              fontSize: '14px',
              color: 'var(--ink-primary)',
              outline: 'none',
            }}
          />
        </div>

        <label
          className="font-body"
          style={{
            display: 'flex',
            alignItems: 'center',
            gap: '8px',
            marginTop: '14px',
            fontSize: '13px',
            color: 'var(--ink-secondary)',
            cursor: 'pointer',
          }}
        >
          <input
            type="checkbox"
            checked={setAsDefault}
            onChange={(e) => onSetAsDefaultChange(e.target.checked)}
            style={{ width: '16px', height: '16px', cursor: 'pointer' }}
          />
          {t('mvp.dash.addr_add.default_label')}
        </label>

        <div style={{ marginTop: '22px', display: 'flex', justifyContent: 'flex-end', gap: '10px' }}>
          <button
            type="button"
            onClick={onCancel}
            className="font-body"
            style={{
              padding: '10px 18px',
              background: 'transparent',
              border: '1px solid var(--stroke-rule)',
              color: 'var(--ink-primary)',
              fontSize: '13px',
              cursor: 'pointer',
              letterSpacing: '0.02em',
            }}
          >
            {t('mvp.dash.addr_add.cancel')}
          </button>
          <button
            type="button"
            onClick={onSave}
            disabled={!canSave}
            className="font-body"
            style={{
              padding: '10px 20px',
              background: canSave ? 'var(--ink-primary)' : 'var(--stroke-hairline)',
              border: `1px solid ${canSave ? 'var(--ink-primary)' : 'var(--stroke-rule)'}`,
              color: canSave ? 'var(--ink-inverse)' : 'var(--ink-tertiary)',
              fontSize: '13px',
              cursor: canSave ? 'pointer' : 'not-allowed',
              letterSpacing: '0.02em',
            }}
          >
            {t('mvp.dash.addr_add.save')}
          </button>
        </div>
      </>
    );
  }

  // Chain skeleton chip — only Base is selectable in MVP; other chains render
  // as muted "phase 2" labels so the multi-chain story is visible to users.
  function ChainOption({ label, selected, disabled }) {
    return (
      <button
        type="button"
        disabled={disabled}
        className="font-body"
        style={{
          padding: '6px 10px',
          fontSize: '12px',
          letterSpacing: '0.02em',
          background: selected ? 'var(--ink-primary)' : 'var(--surface-paper)',
          border: `1px solid ${selected ? 'var(--ink-primary)' : 'var(--stroke-rule)'}`,
          color: selected ? 'var(--ink-inverse)' : (disabled ? 'var(--ink-tertiary)' : 'var(--ink-primary)'),
          cursor: disabled ? 'not-allowed' : (selected ? 'default' : 'pointer'),
          opacity: disabled ? 0.55 : 1,
        }}
        title={disabled ? 'Coming via Circle CCTP — phase 2' : undefined}
      >
        {label}
        {disabled && (
          <span style={{ marginLeft: '6px', fontSize: '9px', letterSpacing: '0.06em', color: 'var(--ink-tertiary)' }}>
            soon
          </span>
        )}
      </button>
    );
  }

  function BackLink({ t, onBack }) {
    return (
      <button
        type="button"
        onClick={onBack}
        className="font-body"
        style={{
          background: 'transparent',
          border: 'none',
          padding: 0,
          marginBottom: '14px',
          cursor: 'pointer',
          fontSize: '11px',
          color: 'var(--ink-tertiary)',
          letterSpacing: '0.04em',
        }}
      >
        {t('mvp.dash.addr_add.back')}
      </button>
    );
  }

  window.AddAddressModal = AddAddressModal;
})();

</script>
<script type="text/babel" data-src="src/dashboard/views/FundingView.jsx">
// MVP Funding — the closed-loop core. Three blocks:
//
//   ADD FUNDS  — two cards side-by-side:
//                  • Buy USDC via Coinbase onramp (button opens fake URL).
//                  • Transfer from exchange — surfaces this agent's USDC
//                    receive address with a Copy button + a step-by-step guide.
//
//   WITHDRAW   — inline form (not a modal). USDC chain address + amount +
//                MAX + Confirm. Enforces:
//                  • destination must be a 0x… Base address (40 hex chars)
//                  • amount ≥ 5 USDC (the network-fee min documented in Q1)
//                  • amount ≤ available balance
//                After Confirm: the backend settles through the ledger
//                withdrawal endpoint, then returns the authoritative account
//                balance and ledger row for the local view.
//
// Below: a "Currently USDC on Base only" small-print line plus the phase-2
// Coinbase-offramp callout, both already part of the i18n contract.

(function () {
  function MvpFundingView({ data }) {
    const t = window.useT();
    const { wallets, defaultWalletId, ownerEmail } = window.useAppState();
    if (!data) return null;

    // Local view state — receive address visibility, withdraw form state.
    // These are intentionally view-local: a refresh re-renders them in the
    // initial state, which is fine for a demo.
    const [addrCopied, setAddrCopied] = React.useState(false);
    const [selectedWalletId, setSelectedWalletId] = React.useState(defaultWalletId);
    const [amount, setAmount]         = React.useState('');
    const [stage, setStage]           = React.useState('idle');      // idle | pending | settled
    const [withdrawError, setWithdrawError] = React.useState('');
    const [localBalance, setLocalBalance] = React.useState(data.balance.available);
    const [localTxs, setLocalTxs]     = React.useState(data.transactions || []);
    const [addAddressOpen, setAddAddressOpen] = React.useState(false);
    // ?onramp=1 opens the modal on mount (screenshot helper + deep link).
    const [onrampOpen, setOnrampOpen] = React.useState(() =>
      new URLSearchParams(window.location.search).get('onramp') === '1'
    );

    // Reset when the agent (data) changes — view key in parent triggers
    // remount, but the safety net is cheap.
    React.useEffect(() => {
      setLocalBalance(data.balance.available);
      setLocalTxs(data.transactions || []);
      setStage('idle');
      setAmount('');
      setWithdrawError('');
      setSelectedWalletId(defaultWalletId);
    }, [data, defaultWalletId]);

    const receiveAddress = data.agent.fullWalletAddress || data.agent.walletAddress;
    const MIN_WITHDRAW = 1;

    const selectedWallet = wallets.find((w) => w.id === selectedWalletId);
    const dest = selectedWallet?.address || '';
    const destValid   = !!selectedWallet && /^0x[0-9a-fA-F]{40}$/.test(dest.trim());
    const amountClean = amount.trim();
    const amountShapeValid = /^\d+(?:\.\d{0,6})?$/.test(amountClean);
    const amountNum   = amountShapeValid ? Number(amountClean) : NaN;
    const amountValid = amountShapeValid && !Number.isNaN(amountNum) && amountNum >= MIN_WITHDRAW && amountNum <= localBalance;
    const canConfirm  = destValid && amountValid && stage === 'idle';
    const belowMin    = !Number.isNaN(amountNum) && amountNum > 0 && amountNum < MIN_WITHDRAW;
    const overBalance = !Number.isNaN(amountNum) && amountNum > localBalance;

    const usdcToAtomic = (value) => {
      const raw = String(value || '').trim();
      const match = raw.match(/^(\d+)(?:\.(\d{0,6})?)?$/);
      if (!match) return '0';
      const whole = BigInt(match[1]);
      const fractional = BigInt((match[2] || '').padEnd(6, '0'));
      return String((whole * 1000000n) + fractional);
    };

    const atomicToUsdc = (value) => {
      const parsed = Number(value || 0);
      return Number.isFinite(parsed) ? parsed / 1000000 : 0;
    };

    const handleCopyAddr = () => {
      // navigator.clipboard might be unavailable in some headless contexts;
      // soft-fail to keep the demo from breaking.
      try { navigator.clipboard && navigator.clipboard.writeText(receiveAddress); } catch { /* noop */ }
      setAddrCopied(true);
      setTimeout(() => setAddrCopied(false), 1500);
    };

    const handleMax = () => {
      setWithdrawError('');
      setAmount(String(localBalance.toFixed(2)));
    };

    const handleConfirm = async () => {
      if (!canConfirm) return;
      const amountAtomic = usdcToAtomic(amount);
      setStage('pending');
      setWithdrawError('');
      try {
        const response = await fetch('/ledger/withdrawals', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            agentId: data.agent.id,
            ownerEmail,
            destinationAddress: dest.trim(),
            amountAtomic,
            reason: 'dashboard withdrawal',
            metadata: { source: 'dashboard' },
          }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          const message = payload && payload.detail && payload.detail.message
            ? payload.detail.message
            : t('mvp.dash.funding.withdraw_failed');
          throw new Error(message);
        }
        const entry = payload.entry || {};
        const entryMeta = entry.metadata || {};
        const settledAmount = Math.abs(
          atomicToUsdc(entry.availableDeltaAtomic || `-${amountAtomic}`)
        ) || amountNum;
        setStage('settled');
        setLocalBalance(
          payload.account && payload.account.availableAtomic !== undefined
            ? atomicToUsdc(payload.account.availableAtomic)
            : (b) => b - settledAmount
        );
        setLocalTxs((prev) => [
          {
            id: entry.entryId || payload.withdrawalId || `wd_${Date.now().toString(36).slice(-5)}`,
            counterparty: entryMeta.counterparty || `External · ${dest.slice(0, 6)}…${dest.slice(-4)}`,
            amount: settledAmount,
            direction: 'out',
            role: 'withdrawal',
            status: 'released',
            timestamp: t('mvp.ui.just_now'),
          },
          ...prev,
        ]);
      } catch (error) {
        setStage('idle');
        setWithdrawError(error && error.message ? error.message : t('mvp.dash.funding.withdraw_failed'));
      }
    };

    return (
      <div>
        <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)', marginBottom: '8px' }}>
          {t('mvp.dash.funding.slug')} · {data.agent.name}
        </div>

        {/* Big balance — anchors the closed loop visually. */}
        <div className="font-display" style={{ fontSize: '12px', color: 'var(--ink-tertiary)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: '4px' }}>
          {t('mvp.dash.funding.balance_label')}
        </div>
        <div className="font-mono" style={{ fontSize: '48px', color: 'var(--ink-primary)', letterSpacing: '-0.02em', lineHeight: 1 }}>
          ${window.formatAmount(localBalance)}
          <span style={{ fontSize: '16px', color: 'var(--ink-tertiary)', marginLeft: '12px', letterSpacing: '0.04em' }}>USDC</span>
        </div>

        {/* ADD FUNDS section */}
        <Section title={t('mvp.dash.funding.add_label')}>
          <div className="grid" style={{ gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
            <Card>
              <CardTitle>{t('mvp.dash.funding.onramp_title')}</CardTitle>
              <CardCTA onClick={() => setOnrampOpen(true)} primary>
                {t('mvp.dash.funding.onramp_button')} →
              </CardCTA>
            </Card>

            <Card>
              <CardTitle>{t('mvp.dash.funding.transfer_title')}</CardTitle>

              {/* Two-column: copyable address (left) + QR (right). QR exists
                  for the desktop-dashboard + mobile-exchange-app case, which
                  is common in crypto and otherwise forces the user to type
                  a 42-char hex string by hand. */}
              <div className="grid" style={{ gridTemplateColumns: '1fr auto', gap: '16px', alignItems: 'start', marginTop: '14px' }}>
                <div>
                  <div
                    className="font-mono"
                    style={{
                      padding: '10px 14px',
                      background: 'var(--surface-paper)',
                      border: '1px solid var(--stroke-hairline)',
                      fontSize: '12px',
                      color: 'var(--ink-primary)',
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'space-between',
                      gap: '12px',
                    }}
                  >
                    <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {receiveAddress}
                    </span>
                    <button
                      type="button"
                      onClick={handleCopyAddr}
                      className="smallcaps-mono"
                      style={{
                        background: 'transparent',
                        border: '1px solid var(--stroke-rule)',
                        padding: '2px 8px',
                        cursor: 'pointer',
                        color: addrCopied ? 'var(--status-positive)' : 'var(--ink-secondary)',
                        fontSize: '10px',
                      }}
                    >
                      {addrCopied ? t('mvp.dash.funding.copied') : t('mvp.dash.funding.copy')}
                    </button>
                  </div>
                  <ol
                    className="font-body"
                    style={{
                      marginTop: '14px',
                      paddingLeft: '20px',
                      fontSize: '12px',
                      color: 'var(--ink-secondary)',
                      lineHeight: 1.6,
                    }}
                  >
                    <li>{t('mvp.dash.funding.transfer_step_1')}</li>
                    <li>{t('mvp.dash.funding.transfer_step_2')}</li>
                    <li>{t('mvp.dash.funding.transfer_step_3')}</li>
                  </ol>
                </div>
                <QrPanel address={receiveAddress} t={t} />
              </div>
            </Card>
          </div>
        </Section>

        {/* WITHDRAW section */}
        <Section title={t('mvp.dash.funding.withdraw_label')}>
          <div style={{ maxWidth: '640px' }}>
            <Field label={t('mvp.dash.funding.field_destination')}>
              <window.AddressPicker
                selectedId={selectedWalletId}
                onSelect={(id) => { setWithdrawError(''); setSelectedWalletId(id); }}
                onAddNew={() => setAddAddressOpen(true)}
                disabled={stage !== 'idle'}
              />
            </Field>

            <Field label={t('mvp.dash.funding.field_amount')}>
              <div className="flex items-center" style={{ gap: '8px' }}>
                <input
                  type="text"
                  value={amount}
                  onChange={(e) => { setWithdrawError(''); setAmount(e.target.value); }}
                  placeholder="0.00"
                  disabled={stage !== 'idle'}
                  className="font-mono"
                  style={{
                    width: '180px',
                    padding: '10px 14px',
                    border: `1px solid ${belowMin || overBalance ? 'var(--status-negative)' : 'var(--stroke-rule)'}`,
                    background: 'var(--surface-paper)',
                    fontSize: '14px',
                    color: 'var(--ink-primary)',
                    outline: 'none',
                  }}
                />
                <button
                  type="button"
                  onClick={handleMax}
                  disabled={stage !== 'idle'}
                  className="smallcaps-mono"
                  style={{
                    padding: '8px 12px',
                    background: 'transparent',
                    border: '1px solid var(--stroke-rule)',
                    color: 'var(--ink-tertiary)',
                    fontSize: '11px',
                    cursor: 'pointer',
                  }}
                >
                  {t('mvp.dash.funding.max')}
                </button>
              </div>
              <div
                className="font-mono"
                style={{
                  marginTop: '8px',
                  fontSize: '11px',
                  color: (belowMin || overBalance) ? 'var(--status-negative)' : 'var(--ink-tertiary)',
                  letterSpacing: '0.02em',
                }}
              >
                {overBalance
                  ? t('mvp.dash.funding.exceeds_balance')
                  : t('mvp.dash.funding.min_hint')}
              </div>
              {withdrawError && (
                <div
                  className="font-mono"
                  style={{
                    marginTop: '10px',
                    fontSize: '11px',
                    color: 'var(--status-negative)',
                    letterSpacing: '0.02em',
                  }}
                >
                  {withdrawError}
                </div>
              )}
            </Field>

            <div
              style={{
                marginTop: '4px',
                marginBottom: '4px',
                padding: '10px 14px',
                background: 'var(--surface-card)',
                border: '1px solid var(--stroke-hairline)',
                display: 'grid',
                gridTemplateColumns: 'auto 1fr',
                rowGap: '6px',
                columnGap: '14px',
                fontSize: '12px',
              }}
            >
              <TermLabel>{t('mvp.dash.funding.term_network')}</TermLabel>
              <TermValue>{selectedWallet ? `${chainName(selectedWallet.chain)} · USDC` : 'Base · USDC'}</TermValue>
              <TermLabel>{t('mvp.dash.funding.term_fee')}</TermLabel>
              <TermValue accent>{t('mvp.dash.funding.fee_covered')}</TermValue>
            </div>

            <div className="flex" style={{ gap: '12px', marginTop: '24px' }}>
              <button
                type="button"
                onClick={handleConfirm}
                disabled={!canConfirm}
                className="font-body"
                style={{
                  padding: '12px 24px',
                  background: canConfirm ? 'var(--ink-primary)' : 'var(--stroke-hairline)',
                  border: `1px solid ${canConfirm ? 'var(--ink-primary)' : 'var(--stroke-rule)'}`,
                  color: canConfirm ? 'var(--ink-inverse)' : 'var(--ink-tertiary)',
                  cursor: canConfirm ? 'pointer' : 'not-allowed',
                  fontSize: '14px',
                  fontWeight: 500,
                  boxShadow: canConfirm ? '0 0 0 4px var(--accent-amber-soft)' : 'none',
                  transition: 'all 200ms',
                }}
              >
                {stage === 'pending'
                  ? t('mvp.dash.funding.pending')
                  : stage === 'settled'
                  ? t('mvp.dash.funding.settled')
                  : t('mvp.dash.funding.confirm')}
              </button>
              {stage === 'settled' && (
                <button
                  type="button"
                  onClick={() => { setStage('idle'); setAmount(''); }}
                  className="font-body"
                  style={{
                    padding: '12px 24px',
                    background: 'transparent',
                    border: '1px solid var(--stroke-rule)',
                    color: 'var(--ink-primary)',
                    fontSize: '14px',
                    cursor: 'pointer',
                  }}
                >
                  {t('mvp.dash.funding.another')}
                </button>
              )}
            </div>

          </div>

          {/* Live preview of the resulting ledger row when a withdraw has settled. */}
          {stage === 'settled' && localTxs[0] && (
            <div className="fade-up" style={{ marginTop: '40px', maxWidth: '720px' }}>
              <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)', marginBottom: '8px' }}>
                {t('mvp.dash.funding.new_row')}
              </div>
              <div className="rule-t" />
              <window.TransactionRow
                receiptId={localTxs[0].id}
                counterparty={localTxs[0].counterparty}
                amount={localTxs[0].amount}
                direction={localTxs[0].direction}
                status={localTxs[0].status}
                timestamp={localTxs[0].timestamp}
              />
            </div>
          )}
        </Section>

        {/* Real Coinbase hosted onramp session. Settlement and final credit
            remain backend-driven; the modal only creates and opens the session. */}
        <window.MvpCoinbaseOnrampModal
          open={onrampOpen}
          onClose={() => setOnrampOpen(false)}
          agentId={data.agent.id}
          destinationAddress={receiveAddress}
          t={t}
        />
        <window.AddAddressModal
          open={addAddressOpen}
          onClose={() => setAddAddressOpen(false)}
        />
      </div>
    );
  }

  // Small QR rendered next to the receive address. Uses the global
  // `qrcode` factory from qrcode-generator (loaded via CDN script tag in
  // mvp/dashboard.html). Renders as inline SVG so it scales crisp at any
  // size and stays self-contained for the standalone build.
  function QrPanel({ address, t }) {
    const qrAddress = String(address || '').trim();
    const svgMarkup = React.useMemo(() => {
      if (!qrAddress) return null;
      if (typeof window.qrcode !== 'function') return null;
      try {
        // typeNumber=0 → auto-fit; errorCorrection 'M' is the standard balance.
        const qr = window.qrcode(0, 'M');
        qr.addData(qrAddress);
        qr.make();
        // Fixed-size raster: cellSize=4 with margin=2 → ~120-140px square
        // for a typical 0x… address. Scalable mode (viewBox + width=100%)
        // collapses to 0×0 inside an inline-block parent — fixed size avoids
        // that, and the printed size is plenty for a phone camera to scan.
        return qr.createSvgTag({ cellSize: 4, margin: 2 });
      } catch {
        return null;
      }
    }, [qrAddress]);

    if (!svgMarkup) {
      // Library not loaded — fall back to nothing so the address column
      // still works on its own. (Standalone-build edge case insurance.)
      return null;
    }

    return (
      <div
        key={qrAddress}
        data-qr-address={qrAddress}
        style={{ textAlign: 'center', minWidth: '136px' }}
      >
        <div
          style={{
            display: 'inline-block',
            padding: '8px',
            background: 'var(--surface-paper)',
            border: '1px solid var(--stroke-hairline)',
            lineHeight: 0,
          }}
          // qrcode-generator returns a self-contained <svg> string. Inject
          // it directly to avoid the cost of an extra wrapper component.
          dangerouslySetInnerHTML={{ __html: svgMarkup }}
        />
        <div
          className="smallcaps-mono"
          style={{
            marginTop: '8px',
            fontSize: '9px',
            color: 'var(--ink-tertiary)',
            letterSpacing: '0.06em',
            lineHeight: 1.4,
            whiteSpace: 'pre-line',
          }}
        >
          {t('mvp.dash.funding.qr_caption')}
        </div>
      </div>
    );
  }

  function Section({ title, description, children }) {
    return (
      <section style={{ marginTop: '48px', paddingTop: '32px', borderTop: '1px solid var(--stroke-rule)' }}>
        <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)', marginBottom: '4px' }}>
          {title}
        </div>
        {description && (
          <div className="font-body" style={{ fontSize: '13px', color: 'var(--ink-secondary)', marginBottom: '24px', maxWidth: '720px' }}>
            {description}
          </div>
        )}
        {children}
      </section>
    );
  }

  function Card({ children }) {
    return (
      <div
        style={{
          padding: '24px',
          background: 'var(--surface-card)',
          border: '1px solid var(--stroke-rule)',
        }}
      >
        {children}
      </div>
    );
  }

  function CardTitle({ children }) {
    return (
      <div
        className="font-display"
        style={{ fontSize: '20px', color: 'var(--ink-primary)', letterSpacing: '-0.01em', marginBottom: '6px' }}
      >
        {children}
      </div>
    );
  }

  function CardCTA({ children, onClick, primary }) {
    return (
      <button
        type="button"
        onClick={onClick}
        className="font-body"
        style={{
          marginTop: '14px',
          padding: '10px 18px',
          background: primary ? 'var(--ink-primary)' : 'transparent',
          border: `1px solid ${primary ? 'var(--ink-primary)' : 'var(--stroke-rule)'}`,
          color: primary ? 'var(--ink-inverse)' : 'var(--ink-primary)',
          fontSize: '13px',
          cursor: 'pointer',
          letterSpacing: '0.02em',
        }}
      >
        {children}
      </button>
    );
  }

  function TermLabel({ children }) {
    return (
      <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)', fontSize: '10px', alignSelf: 'center' }}>
        {children}
      </div>
    );
  }

  function TermValue({ children, accent }) {
    return (
      <div className="font-body" style={{ color: accent ? 'var(--accent-amber)' : 'var(--ink-primary)', fontSize: '12px', fontWeight: accent ? 500 : 400 }}>
        {children}
      </div>
    );
  }

  function chainName(chain) {
    switch ((chain || 'base').toLowerCase()) {
      case 'base':     return 'Base';
      case 'arbitrum': return 'Arbitrum';
      case 'optimism': return 'Optimism';
      case 'polygon':  return 'Polygon';
      case 'solana':   return 'Solana';
      case 'ethereum': return 'Ethereum';
      default:         return chain;
    }
  }

  function Field({ label, children }) {
    return (
      <div style={{ marginBottom: '20px' }}>
        <div
          className="smallcaps-mono"
          style={{ color: 'var(--ink-secondary)', marginBottom: '6px' }}
        >
          {label}
        </div>
        {children}
      </div>
    );
  }

  window.MvpFundingView = MvpFundingView;
})();

</script>
<script type="text/babel" data-src="src/dashboard/views/SettingsView.jsx">
// MVP Settings — three sections:
//   1. Account         : owner email (read-only).
//   2. External wallets: owner's address book (Step 5 addition). Same
//                        wallets[] the AddressPicker / AddAddressModal read.
//                        Each row supports inline label edit, set-default,
//                        and delete. "+ Add wallet" opens AddAddressModal.
//   3. Spend limits    : per-trade cap, editable, per-agent localStorage.
//
// Cut from main's Settings: Approval section, reset controls, and demo links.

(function () {
  const CAPS_STORAGE_KEY = 'chief_mvp_dash_caps';

  function readCaps() {
    try {
      const raw = window.localStorage.getItem(CAPS_STORAGE_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      return typeof parsed === 'object' && parsed !== null ? parsed : {};
    } catch { return {}; }
  }

  function writeCap(agentId, value) {
    const caps = readCaps();
    caps[agentId] = value;
    window.localStorage.setItem(CAPS_STORAGE_KEY, JSON.stringify(caps));
  }

  function MvpSettingsView({ data }) {
    const t = window.useT();
    const {
      currentUser, signOut,
      wallets, defaultWalletId,
      removeWallet, setDefaultWallet, updateWalletLabel,
    } = window.useAppState();
    const [addOpen, setAddOpen] = React.useState(false);
    if (!data) return null;

    // Effective cap: localStorage override (per agent) wins over mock seed.
    const agentId = data.agent.id;
    const seedCap = data.settings && data.settings.limits && data.settings.limits.perTradeCap;
    const initialCap = readCaps()[agentId] ?? seedCap;

    return (
      <div>
        <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)', marginBottom: '24px' }}>
          {t('mvp.dash.settings.slug')} · {data.agent.name}
        </div>

        {/* Section 1 — Account (signed-in identity card) */}
        <Section title={t('mvp.dash.settings.account_title')}>
          <SignedInCard t={t} user={currentUser} onSignOut={signOut} />
        </Section>

        {/* Section 2 — External wallets (address book) */}
        <Section title={t('mvp.dash.settings.wallets_title')}
                 description={t('mvp.dash.settings.wallets_description')}>
          <WalletList
            t={t}
            wallets={wallets}
            defaultWalletId={defaultWalletId}
            onSetDefault={setDefaultWallet}
            onRemove={removeWallet}
            onUpdateLabel={updateWalletLabel}
            onAdd={() => setAddOpen(true)}
          />
        </Section>

        {/* Section 3 — Spend limits (editable, per agent) */}
        <Section title={t('mvp.dash.settings.limits_title')}>
          <PerTradeCapEditor
            t={t}
            agentId={agentId}
            initialValue={initialCap}
          />
        </Section>

        {/* Add-wallet modal — shared with FundingView. Both opens write to
            the same wallets[] via useAppState; the list above re-renders
            from context on save. */}
        <window.AddAddressModal
          open={addOpen}
          onClose={() => setAddOpen(false)}
        />
      </div>
    );
  }

  function WalletList({ t, wallets, defaultWalletId, onSetDefault, onRemove, onUpdateLabel, onAdd }) {
    if (wallets.length === 0) {
      return (
        <div style={{ maxWidth: '520px' }}>
          <div className="font-body" style={{ fontSize: '13px', color: 'var(--ink-tertiary)', marginBottom: '12px' }}>
            {t('mvp.dash.settings.wallets_empty')}
          </div>
          <button
            type="button"
            onClick={onAdd}
            className="font-body"
            style={{
              padding: '8px 16px',
              background: 'var(--ink-primary)',
              border: '1px solid var(--ink-primary)',
              color: 'var(--ink-inverse)',
              fontSize: '13px',
              cursor: 'pointer',
              letterSpacing: '0.02em',
            }}
          >
            + {t('mvp.dash.settings.wallets_add_first')}
          </button>
        </div>
      );
    }
    return (
      <div style={{ maxWidth: '640px' }}>
        <div style={{ border: '1px solid var(--stroke-rule)', background: 'var(--surface-paper)' }}>
          {wallets.map((w, i) => (
            <WalletRow
              key={w.id}
              t={t}
              wallet={w}
              isDefault={w.id === defaultWalletId}
              canRemove={true}
              isLast={i === wallets.length - 1}
              onSetDefault={() => onSetDefault(w.id)}
              onRemove={() => {
                if (confirm(t('mvp.dash.settings.wallets_remove_confirm').replace('{label}', w.label))) {
                  onRemove(w.id);
                }
              }}
              onUpdateLabel={(newLabel) => onUpdateLabel(w.id, newLabel)}
            />
          ))}
        </div>
        <button
          type="button"
          onClick={onAdd}
          className="font-body"
          style={{
            marginTop: '12px',
            padding: '8px 14px',
            background: 'transparent',
            border: '1px dashed var(--stroke-rule)',
            color: 'var(--ink-primary)',
            fontSize: '13px',
            cursor: 'pointer',
            letterSpacing: '0.02em',
          }}
        >
          + {t('mvp.dash.settings.wallets_add')}
        </button>
      </div>
    );
  }

  function WalletRow({ t, wallet, isDefault, isLast, onSetDefault, onRemove, onUpdateLabel }) {
    const [editing, setEditing] = React.useState(false);
    const [draftLabel, setDraftLabel] = React.useState(wallet.label);
    // Suppresses the saveEdit that React fires via the input's onBlur when
    // editing flips to false (the input unmounts → React fires blur with the
    // pre-cancel closure, which would commit the unwanted draft).
    const skipNextBlurRef = React.useRef(false);

    React.useEffect(() => { setDraftLabel(wallet.label); }, [wallet.label]);

    const startEdit = () => {
      skipNextBlurRef.current = false;
      setDraftLabel(wallet.label);
      setEditing(true);
    };
    const cancelEdit = () => {
      skipNextBlurRef.current = true;
      setDraftLabel(wallet.label);
      setEditing(false);
    };
    const saveEdit = () => {
      if (skipNextBlurRef.current) {
        skipNextBlurRef.current = false;
        return;
      }
      const trimmed = draftLabel.trim();
      if (trimmed && trimmed !== wallet.label) onUpdateLabel(trimmed);
      setEditing(false);
    };

    return (
      <div
        style={{
          padding: '14px 16px',
          borderBottom: isLast ? 'none' : '1px solid var(--stroke-hairline)',
          display: 'flex',
          alignItems: 'center',
          gap: '14px',
        }}
      >
        <div style={{ minWidth: 0, flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
            {isDefault && (
              <span style={{ color: 'var(--accent-amber)', fontSize: '13px' }}>★</span>
            )}
            {editing ? (
              <input
                type="text"
                value={draftLabel}
                autoFocus
                onChange={(e) => setDraftLabel(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === 'Enter') saveEdit();
                  if (e.key === 'Escape') cancelEdit();
                }}
                onBlur={saveEdit}
                className="font-body"
                style={{
                  padding: '4px 8px',
                  border: '1px solid var(--stroke-rule)',
                  background: 'var(--surface-paper)',
                  fontSize: '13px',
                  fontWeight: 500,
                  color: 'var(--ink-primary)',
                  outline: 'none',
                  width: '180px',
                }}
              />
            ) : (
              <span className="font-body" style={{ fontSize: '13px', fontWeight: 500, color: 'var(--ink-primary)' }}>
                {wallet.label}
              </span>
            )}
            <span
              className="smallcaps-mono"
              style={{
                fontSize: '9px',
                letterSpacing: '0.06em',
                color: 'var(--ink-secondary)',
                border: '1px solid var(--stroke-rule)',
                background: 'var(--surface-card)',
                padding: '1px 6px',
              }}
            >
              {(wallet.chain || 'base').toUpperCase()}
            </span>
            {isDefault && (
              <span className="smallcaps-mono" style={{ fontSize: '9px', color: 'var(--accent-amber)', letterSpacing: '0.06em' }}>
                {t('mvp.dash.settings.wallets_default_tag')}
              </span>
            )}
          </div>
          <div
            className="font-mono"
            style={{
              fontSize: '11px',
              color: 'var(--ink-tertiary)',
              overflow: 'hidden',
              textOverflow: 'ellipsis',
              whiteSpace: 'nowrap',
            }}
            title={wallet.address}
          >
            {wallet.address}
          </div>
        </div>
        <div style={{ display: 'flex', gap: '6px', flexShrink: 0 }}>
          {!editing && (
            <RowAction onClick={startEdit}>{t('mvp.dash.settings.wallets_edit')}</RowAction>
          )}
          {!isDefault && !editing && (
            <RowAction onClick={onSetDefault}>{t('mvp.dash.settings.wallets_set_default')}</RowAction>
          )}
          {!editing && (
            <RowAction onClick={onRemove} negative>{t('mvp.dash.settings.wallets_remove')}</RowAction>
          )}
        </div>
      </div>
    );
  }

  function RowAction({ children, onClick, negative }) {
    return (
      <button
        type="button"
        onClick={onClick}
        className="smallcaps-mono"
        style={{
          padding: '4px 8px',
          background: 'transparent',
          border: '1px solid var(--stroke-rule)',
          color: negative ? 'var(--status-negative)' : 'var(--ink-secondary)',
          fontSize: '9px',
          letterSpacing: '0.06em',
          cursor: 'pointer',
          textTransform: 'uppercase',
        }}
      >
        {children}
      </button>
    );
  }

  function PerTradeCapEditor({ t, agentId, initialValue }) {
    const [value, setValue] = React.useState(String(initialValue));
    const [saved, setSaved] = React.useState(initialValue);
    const [justSaved, setJustSaved] = React.useState(false);

    // When agent switches (key remount), state resets via initialValue.
    const numeric = parseFloat(value);
    const valid = !Number.isNaN(numeric) && numeric > 0 && numeric <= 100;
    const dirty = String(saved) !== value.trim();

    const handleSave = () => {
      if (!valid || !dirty) return;
      writeCap(agentId, numeric);
      setSaved(numeric);
      setJustSaved(true);
      setTimeout(() => setJustSaved(false), 1800);
    };

    const handleReset = () => {
      // Reset back to the last-saved value (cancels current edit).
      setValue(String(saved));
    };

    return (
      <div style={{ maxWidth: '520px' }}>
        <div className="smallcaps-mono" style={{ color: 'var(--ink-secondary)', marginBottom: '6px' }}>
          {t('mvp.dash.settings.limits_per_trade_label')}
        </div>
        <div className="flex items-center" style={{ gap: '8px' }}>
          <input
            type="text"
            value={value}
            onChange={(e) => setValue(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter') handleSave(); }}
            className="font-mono"
            style={{
