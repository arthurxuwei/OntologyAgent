<script type="text/babel" data-src="../src/lib/formatAmount.js">
// Shared amount formatter for USDC values across the demo and dashboard.
//
// Why two decimal regimes:
//   USDC on Base is an ERC-20 token with 6 decimals — the smallest unit is
//   0.000001 USDC ($0.000001 = 1 micro-USDC). Agent-to-agent payments are
//   expected to use the full precision for per-token / per-call billing
//   (e.g. $0.000050 for one model inference), where rounding to two
//   decimals would zero them out.
//
// Display rule (robust to nano-precision):
//   - amount === 0                 → "0.00"
//   - exactly at 2-decimal precision → 2 decimals ("12.50", "1,200.00")
//   - has sub-cent component        → 6 decimals ("0.000050", "2,841.298416")
//
// Why preserve sub-cent in aggregates: the "this system supports
// nanopayments" signal lives precisely in the trailing decimals of
// balances and lifetime totals — rounding them to "$3,500.06" hides the
// fact that the total absorbed micro-billing flows. Users who want
// rounded reporting can always read the first 5 digits and ignore the rest.
//
// Negative sign and thousands separator are handled by toLocaleString.
// Returned string never includes the currency symbol — callers prepend "$".

function formatAmount(n) {
  if (n === 0 || n === undefined || n === null) return '0.00';
  // Use a rounding tolerance so JS float drift (e.g., 0.1 + 0.2) doesn't
  // accidentally trip the "has sub-cent" branch. 1e-9 is well below USDC's
  // 1e-6 native precision, so any real sub-cent value still triggers.
  const rounded = Math.round(n * 100) / 100;
  const hasSubCent = Math.abs(n - rounded) > 1e-9;
  const decimals = hasSubCent ? 6 : 2;
  return n.toLocaleString('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
}

window.formatAmount = formatAmount;

</script>
<script type="text/babel" data-src="../src/lib/LangContext.jsx">
// LangContext: provides currentLang ('en' | 'zh'), setLang, and t(key) helper.
// t() reads from window.LANG_DICT (loaded by src/data/i18n.js).
// Falls back to the EN string if a key is missing in the requested lang,
// or to the key itself if the key is unknown (so missing keys are visible).

const LangContext = React.createContext(null);

function LangProvider({ children }) {
  const [lang, setLang] = React.useState('en');

  const t = React.useCallback(
    (key) => {
      const dict = window.LANG_DICT || {};
      const entry = dict[key];
      if (!entry) return key; // surface missing keys
      if (entry[lang] !== undefined) return entry[lang];
      if (entry.en !== undefined) return entry.en;
      return key;
    },
    [lang]
  );

  const toggleLang = React.useCallback(() => {
    setLang((l) => (l === 'en' ? 'zh' : 'en'));
  }, []);

  // Mirror lang to <html lang=...> + body data-lang for CSS selectors
  React.useEffect(() => {
    document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-Hans' : 'en');
    document.body.setAttribute('data-lang', lang);
  }, [lang]);

  return (
    <LangContext.Provider value={{ lang, setLang, toggleLang, t }}>
      {children}
    </LangContext.Provider>
  );
}

function useLang() {
  const ctx = React.useContext(LangContext);
  if (!ctx) throw new Error('useLang must be used inside LangProvider');
  return ctx;
}

// Convenience: just t() without destructuring lang/setLang.
function useT() {
  return useLang().t;
}

window.LangContext = LangContext;
window.LangProvider = LangProvider;
window.useLang = useLang;
window.useT = useT;

</script>

<script type="text/babel" data-src="../src/components/LedgerFrame.jsx">
// Signature visual: persistent horizontal rule across every stage at top:96px.
// Right side carries: stage index (e.g. 04 / 16) + lang switcher (EN | 中).

function LangSwitcher() {
  const { lang, setLang } = window.useLang();
  const btn = (code, label) => {
    const active = lang === code;
    return (
      <button
        type="button"
        onClick={() => setLang(code)}
        style={{
          background: 'transparent',
          border: 'none',
          padding: '2px 0',
          margin: 0,
          cursor: 'pointer',
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: '11px',
          letterSpacing: '0.08em',
          color: active ? 'var(--accent-amber)' : 'var(--ink-tertiary)',
          borderBottom: active ? '1px solid var(--accent-amber)' : '1px solid transparent',
          transition: 'color 120ms ease, border-color 120ms ease',
        }}
        aria-pressed={active}
      >
        {label}
      </button>
    );
  };
  return (
    <div className="flex items-center" style={{ gap: '8px' }}>
      {btn('en', 'EN')}
      <span style={{ color: 'var(--ink-tertiary)', fontFamily: "'JetBrains Mono', monospace", fontSize: '11px' }}>|</span>
      {btn('zh', '中')}
    </div>
  );
}

function LedgerFrame({ stageLabel, stageNumber, totalStages, children, bare }) {
  // `bare` skips the rule (used by M1 pre-roll, M5.3 step-out, M6.2 closing).
  // `stageNumber` and `totalStages` props are kept for source compatibility
  // with the 16 base stages but ignored — actual values come from the engine
  // so internal-mode toggling reflects in 7 / 24 etc. without touching stages.
  const { currentStageIndex, totalStages: engineTotal, internalMode } =
    window.useDemoEngine();
  const padded = String(currentStageIndex + 1).padStart(2, '0');
  const total = String(engineTotal).padStart(2, '0');

  return (
    <div className="relative w-full" style={{ minHeight: 'calc(100vh - 32px)' }}>
      {!bare && (
        <div
          className="absolute left-0 right-0"
          style={{ top: '96px' }}
        >
          <div className="flex items-end justify-between pb-3" style={{ gap: '32px', padding: '0 48px' }}>
            <div className="smallcaps-mono" style={{ color: 'var(--ink-secondary)', whiteSpace: 'nowrap' }}>
              {stageLabel}
            </div>
            <div className="flex items-center" style={{ gap: '12px' }}>
              {internalMode && (
                <span
                  className="font-mono"
                  style={{
                    fontSize: '10px',
                    letterSpacing: '0.1em',
                    color: 'var(--ink-tertiary)',
                    whiteSpace: 'nowrap',
                  }}
                >
                  [INTERNAL]
                </span>
              )}
              <div className="font-mono text-xs" style={{ color: 'var(--ink-tertiary)', whiteSpace: 'nowrap' }}>
                {padded} / {total}
              </div>
            </div>
          </div>
          <div style={{ height: '1px', background: 'var(--stroke-rule)' }} />
        </div>
      )}
      {children}
    </div>
  );
}

window.LangSwitcher = LangSwitcher;
window.LedgerFrame = LedgerFrame;

</script>
<script type="text/babel" data-src="../src/components/AgentCard.jsx">
// Balance + status card. Number tick animates on balance change.

function useTween(target, duration = 400) {
  const [value, setValue] = React.useState(target);
  const fromRef = React.useRef(target);
  const startRef = React.useRef(performance.now());

  React.useEffect(() => {
    if (value === target) return;
    fromRef.current = value;
    startRef.current = performance.now();
    let raf;
    const tick = () => {
      const t = Math.min(1, (performance.now() - startRef.current) / duration);
      const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
      setValue(fromRef.current + (target - fromRef.current) * eased);
      if (t < 1) raf = requestAnimationFrame(tick);
      else setValue(target);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);

  return value;
}

// Use the shared formatter so sub-cent (nanopayment) balances render at
// USDC's native 6-decimal precision instead of being rounded to "0.00".
const fmt = (n) => window.formatAmount(n);

function AgentCard({
  agentName,
  agentRole,
  balance = 0,
  escrowed = 0,
  status = 'unclaimed',
  walletAddress,
  ownerEmail,
  size = 'full',
}) {
  const tweened = useTween(balance);
  // If the target balance has no sub-cent component, snap mid-tween values
  // to 2-decimal precision so the formatter doesn't flicker between
  // "87.234500" (mid-animation) and "87.20" (final) — that toggle would
  // look broken. When the target itself has sub-cent (nanopayment-bearing
  // balance), let the tween show full 6-decimal precision throughout.
  const targetHasSubCent =
    Math.abs(balance - Math.round(balance * 100) / 100) > 1e-9;
  const displayBalance = targetHasSubCent
    ? tweened
    : Math.round(tweened * 100) / 100;
  const [flash, setFlash] = React.useState(false);
  const lastBalRef = React.useRef(balance);
  React.useEffect(() => {
    if (lastBalRef.current !== balance) {
      setFlash(true);
      const t = setTimeout(() => setFlash(false), 600);
      lastBalRef.current = balance;
      return () => clearTimeout(t);
    }
  }, [balance]);

  const statusLabel = {
    unclaimed: 'UNCLAIMED',
    claimed: ownerEmail ? `CLAIMED · ${ownerEmail}` : 'CLAIMED',
    processing: 'PROCESSING',
  }[status];

  const statusColor = status === 'unclaimed'
    ? 'var(--accent-amber)'
    : status === 'processing'
      ? 'var(--accent-amber)'
      : 'var(--ink-primary)';

  const isMini = size === 'mini';

  return (
    <div
      style={{
        background: 'var(--surface-card)',
        border: '1px solid var(--stroke-hairline)',
        padding: isMini ? '20px 24px' : '32px',
        borderRadius: '2px',
      }}
    >
      <div className="flex items-start justify-between">
        <div>
          <div className="font-display" style={{ fontSize: isMini ? '20px' : '28px', fontWeight: 400, letterSpacing: '-0.01em' }}>
            {agentName}
          </div>
          {agentRole && !isMini && (
            <div className="font-body text-sm mt-1" style={{ color: 'var(--ink-secondary)' }}>
              {agentRole}
            </div>
          )}
        </div>
        <span className="pill" style={{ color: statusColor }}>
          {statusLabel}
        </span>
      </div>

      <div
        className={flash ? 'amber-flash' : ''}
        style={{
          marginTop: isMini ? '16px' : '32px',
          padding: '4px 0',
          display: 'flex',
          alignItems: 'baseline',
          gap: '8px',
        }}
      >
        <span className="font-mono" style={{ fontSize: isMini ? '20px' : '32px', color: 'var(--ink-tertiary)' }}>$</span>
        <span className="font-mono" style={{ fontSize: isMini ? '36px' : '56px', letterSpacing: '-0.01em', lineHeight: 1, color: 'var(--ink-primary)' }}>
          {fmt(displayBalance)}
        </span>
        <span className="font-mono text-sm" style={{ color: 'var(--ink-secondary)' }}>USDC</span>
      </div>

      {escrowed > 0 && (
        <div className="font-mono mt-2" style={{ fontSize: '12px', letterSpacing: '0.04em', color: 'var(--accent-amber)' }}>
          ESCROWED · ${fmt(escrowed)}
        </div>
      )}

      <div className="font-mono text-[11px] mt-6 flex items-center gap-2" style={{ color: 'var(--ink-tertiary)' }}>
        <span>{walletAddress}</span>
        <span style={{ opacity: 0.6 }}>⎘</span>
      </div>
    </div>
  );
}

window.AgentCard = AgentCard;

</script>
<script type="text/babel" data-src="../src/components/TransactionRow.jsx">
// Compact 2-line transaction row, sized for the narrow CHIEF · LEDGER column
// (~340px). Top line: timestamp · role · counterparty · receipt · amount · refund-overlay.
// Bottom line: status pill + optional countdown / verified flag.
// Grid math is intentionally loose so the pill and countdown wrap rather than
// collide with the right-aligned amount.
//
// `role` is optional for backward compat with the demo's stages — when
// passed by the dashboard, a small mono label after the timestamp tells the
// user "what is this agent doing in this trade": AS PAYER (buying), AS PAYEE
// (selling), DEPOSIT (onramp), WITHDRAW (offramp).
//
// Refund visual: instead of striking through the row (which read as "void /
// never happened"), refund rows keep the original signed amount and append
// a tertiary "↩ ±$amount · net $0.00" so the round-trip is explicit.
// Line-through is reserved for `expired` — the only status that means the
// trade truly never settled.

function TransactionRow({
  receiptId,
  counterparty,
  amount,
  direction = 'out',
  status = 'locked',
  timestamp = 'just now',
  countdown,
  verified,
  role,
  agentTag,
}) {
  const t = window.useT();
  const sign = direction === 'out' ? '-' : '+';
  const reverseSign = direction === 'out' ? '+' : '-';
  const arrow = direction === 'out' ? '→' : '←';

  const statusMap = {
    locked:            { label: 'LOCKED',            color: 'var(--ink-primary)',     bg: 'transparent' },
    delivery_claimed:  { label: 'DELIVERY CLAIMED',  color: 'var(--accent-amber)',    bg: 'transparent' },
    released:          { label: 'RELEASED',          color: 'var(--status-positive)', bg: 'transparent' },
    refunded:          { label: 'REFUNDED',          color: 'var(--ink-secondary)',   bg: 'transparent' },
    pending_approval:  { label: 'PENDING APPROVAL',  color: 'var(--ink-inverse)',     bg: 'var(--accent-amber)' },
    onramp:            { label: 'ONRAMP',            color: 'var(--ink-secondary)',   bg: 'transparent' },
    // Phase 3 batch 1: added for Stage 9 (m4_n1__internal_expired) — quote
    // pill flips to EXPIRED with neutral ink-tertiary color + line-through.
    expired:           { label: 'EXPIRED',           color: 'var(--ink-tertiary)',    bg: 'transparent' },
  };
  const s = statusMap[status] || statusMap.locked;
  const isInverse = s.bg !== 'transparent';
  const lineThrough = status === 'expired';
  const isRefunded = status === 'refunded';

  const roleLabel =
    role === 'payer'      ? t('dash.tx.role_payer')
  : role === 'payee'      ? t('dash.tx.role_payee')
  : role === 'deposit'    ? t('dash.tx.role_deposit')
  : role === 'withdrawal' ? t('dash.tx.role_withdrawal')
  : null;

  return (
    <div
      className="hairline-b"
      style={{
        padding: '12px 4px',
        display: 'flex',
        flexDirection: 'column',
        gap: '8px',
      }}
    >
      {/* Top line: timestamp + role + counterparty + receipt id on the left,
          amount + (optional refund overlay) on the right */}
      <div
        className="flex items-baseline"
        style={{ gap: '12px', minWidth: 0, flexWrap: 'wrap' }}
      >
        <div
          className="font-mono text-[11px]"
          style={{ color: 'var(--ink-tertiary)', whiteSpace: 'nowrap' }}
        >
          {timestamp}
        </div>
        {agentTag && (
          <span
            className="font-mono"
            style={{
              fontSize: '10px',
              padding: '2px 6px',
              border: '1px solid var(--stroke-rule)',
              color: 'var(--ink-secondary)',
              letterSpacing: '0.04em',
              whiteSpace: 'nowrap',
            }}
          >
            {agentTag}
          </span>
        )}
        {roleLabel && (
          <span
            className="font-mono"
            style={{
              fontSize: '10px',
              letterSpacing: '0.08em',
              color: 'var(--ink-tertiary)',
              textTransform: 'uppercase',
              whiteSpace: 'nowrap',
            }}
          >
            {roleLabel}
          </span>
        )}
        <div
          className="font-body text-sm flex items-center"
          style={{ color: 'var(--ink-primary)', gap: '6px', minWidth: 0, flex: 1 }}
        >
          <span style={{ color: 'var(--ink-tertiary)' }}>{arrow}</span>
          <span className="truncate">{counterparty}</span>
          <span
            className="font-mono text-[11px]"
            style={{ color: 'var(--ink-tertiary)', whiteSpace: 'nowrap' }}
          >
            {receiptId}
          </span>
        </div>
        <div
          className="font-mono"
          style={{
            fontSize: '15px',
            color: 'var(--ink-primary)',
            whiteSpace: 'nowrap',
            marginLeft: 'auto',
          }}
        >
          {sign}${window.formatAmount(amount)}
        </div>
        {isRefunded && (
          <div
            className="font-mono"
            style={{
              fontSize: '12px',
              color: 'var(--ink-tertiary)',
              whiteSpace: 'nowrap',
              letterSpacing: '0.02em',
            }}
            title={t('dash.tx.refund_tooltip')}
          >
            ↩ {reverseSign}${window.formatAmount(amount)} · {t('dash.tx.refund_net')}
          </div>
        )}
      </div>

      {/* Bottom line: status pill + optional countdown / verified */}
      <div className="flex items-center flex-wrap" style={{ gap: '8px' }}>
        <span
          className="pill"
          style={{
            color: isInverse ? 'var(--ink-inverse)' : s.color,
            background: s.bg,
            borderColor: isInverse ? s.bg : s.color,
            textDecoration: lineThrough ? 'line-through' : 'none',
          }}
        >
          {s.label}
        </span>
        {countdown && (
          <span
            className="font-mono text-[11px]"
            style={{ color: 'var(--accent-amber)', whiteSpace: 'nowrap' }}
          >
            {countdown}
          </span>
        )}
        {verified && (
          <span
            className="font-mono text-[11px]"
            style={{ color: 'var(--status-positive)', whiteSpace: 'nowrap' }}
          >
            ✓ verified
          </span>
        )}
      </div>
    </div>
  );
}

window.TransactionRow = TransactionRow;

</script>

<!-- Top-level i18n base (provides dash.* keys used by reused onboarding

<script type="text/babel" data-src="../src/data/i18n.js">
// i18n dictionary derived from uploads/04_BILINGUAL_COPY_TABLE.md.
// Keys mirror the [m{module}.{stage}.{element}] convention from the table.
// "// keep as-is" entries from the table use the same string for both langs —
// terminal output, mono code, ledger rows, status pill identifiers.

const LANG_DICT = {

<!-- MVP state + mock data — must load BEFORE reused widgets that read
     window.useAppState / window.DASH_MOCK / window.DASH_CLAIMABLE. -->
<script type="text/babel" data-src="src/dashboard/Shell/MvpAppStateProvider.jsx">
// MVP AppStateProvider — same contract as src/dashboard/Shell/AppStateProvider
// but with `chief_mvp_dash_*` localStorage keys so the MVP dashboard's state
// is fully isolated from the main project's dashboard.
//
// Surfaces the same `useAppState()` hook (registers as window.useAppState).
// Reused as-is by the onboarding screens, AgentSwitcher, MockStateToggle,
// AddAgentModal — those all read via window.useAppState() and don't care
// which provider is mounted.

(function () {
  const AppStateContext = React.createContext(null);

  const STORAGE_KEYS = {
    registered:     'chief_mvp_dash_registered',
    mockState:      'chief_mvp_dash_mock_state',
    email:          'chief_mvp_dash_email',           // legacy email-only login, migrated into `user`
    user:           'chief_mvp_dash_user',             // {provider, login?, name?, email?, avatar_url?}
    wallet:         'chief_mvp_dash_wallet',           // legacy single-wallet, migrated on first read
    wallets:        'chief_mvp_dash_wallets',          // [{id, label, address, chain, createdAt}]
    defaultWallet:  'chief_mvp_dash_default_wallet',   // id string pointing into wallets
    agents:         'chief_mvp_dash_agents',
    activeAgent:    'chief_mvp_dash_active_agent',
  };

  const readBool = (key) => window.localStorage.getItem(key) === 'true';
  const writeBool = (key, value) => {
    if (value) window.localStorage.setItem(key, 'true');
    else window.localStorage.removeItem(key);
  };

  function generateWalletId() {
    return 'wal_' + Math.random().toString(36).slice(2, 8);
  }

  function readInitialAgents() {
    const raw = window.localStorage.getItem(STORAGE_KEYS.agents);
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed;
      } catch { /* fall through */ }
    }
    return [];
  }

  // Returns the canonical owner identity. Reads the new `user` blob first,
  // then forward-migrates the legacy `email` key into a `{provider: 'email'}`
  // shape so users who registered before the GitHub-OAuth ship keep working.
  // Also actively cleans up malformed values so they don't survive to fool
  // downstream "user exists?" checks.
  function readInitialUser() {
    const raw = window.localStorage.getItem(STORAGE_KEYS.user);
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object' && parsed.provider) return parsed;
      } catch { /* fall through */ }
      // Stored value exists but doesn't parse to a valid user — clear it
      // so the legacy-email check below (or downstream registered-self-heal)
      // sees the same world an empty key would.
      window.localStorage.removeItem(STORAGE_KEYS.user);
    }
    const legacyEmail = window.localStorage.getItem(STORAGE_KEYS.email);
    if (legacyEmail) {
      const migrated = { provider: 'email', email: legacyEmail };
      window.localStorage.setItem(STORAGE_KEYS.user, JSON.stringify(migrated));
      window.localStorage.removeItem(STORAGE_KEYS.email);
      return migrated;
    }
    return null;
  }

  function readInitialActiveAgent(agents) {
    const stored = window.localStorage.getItem(STORAGE_KEYS.activeAgent);
    if (stored) return stored;
    return agents[0] || null;
  }

  // Normalize an entry — fills in defaults for fields added after the schema
  // shipped (e.g. `chain`). Older saved wallets are upgraded transparently.
  function normalizeWallet(w) {
    return { ...w, chain: w.chain || 'base' };
  }

  // Migrates the legacy single-wallet `chief_mvp_dash_wallet` key into the
  // new `chief_mvp_dash_wallets` array on first read, and seeds defaultWallet.
  // Also forward-migrates any older array entries missing newly-added fields.
  function readInitialWallets() {
    const raw = window.localStorage.getItem(STORAGE_KEYS.wallets);
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          const normalized = parsed.map(normalizeWallet);
          const drifted = normalized.some((w, i) => w.chain !== parsed[i].chain);
          if (drifted) {
            window.localStorage.setItem(STORAGE_KEYS.wallets, JSON.stringify(normalized));
          }
          return normalized;
        }
      } catch { /* fall through */ }
    }
    const legacy = window.localStorage.getItem(STORAGE_KEYS.wallet);
    if (legacy) {
      const migrated = [normalizeWallet({
        id: generateWalletId(),
        label: 'My Wallet',
        address: legacy,
        createdAt: Date.now(),
      })];
      window.localStorage.setItem(STORAGE_KEYS.wallets, JSON.stringify(migrated));
      window.localStorage.setItem(STORAGE_KEYS.defaultWallet, migrated[0].id);
      window.localStorage.removeItem(STORAGE_KEYS.wallet);
      return migrated;
    }
    return [];
  }

  function MvpAppStateProvider({ children }) {
    const params = React.useMemo(() => new URLSearchParams(window.location.search), []);
    const claimToken = params.get('claim') || '';
    const internalMode = params.get('internal') === '1';
    const isReset = params.get('reset') === '1';

    // Dev seed (?seed=<mockState>): pre-populates localStorage to a post-
    // onboarding state so screenshot scripts and dev iteration can land
    // directly on the dashboard surface. Strips the param after seeding so
    // a refresh doesn't re-seed and clobber any new state.
    React.useEffect(() => {
      const seed = params.get('seed');
      if (!seed) return;
      if (!readBool(STORAGE_KEYS.registered)) {
        window.localStorage.setItem(STORAGE_KEYS.registered, 'true');
        window.localStorage.setItem(STORAGE_KEYS.user, JSON.stringify({
          provider: 'github',
          login: 'william',
          name: 'William',
          email: 'william@example.com',
          avatar_url: null,
        }));
        window.localStorage.setItem(STORAGE_KEYS.agents, JSON.stringify(['agentA']));
        window.localStorage.setItem(STORAGE_KEYS.activeAgent, 'agentA');
      }
      if (['empty', 'day1', 'mature'].includes(seed)) {
        window.localStorage.setItem(STORAGE_KEYS.mockState, seed);
      }
      const url = new URL(window.location.href);
      url.searchParams.delete('seed');
      window.history.replaceState({}, '', url.toString());
      window.location.reload();
    }, [params]);

    React.useEffect(() => {
      if (!isReset) return;
      Object.values(STORAGE_KEYS).forEach((k) => window.localStorage.removeItem(k));
      const url = new URL(window.location.href);
      url.searchParams.delete('reset');
      window.history.replaceState({}, '', url.toString());
      window.location.reload();
    }, [isReset]);

    // Order matters: currentUser runs first so its migration (legacy email →
    // user) and malformed-value cleanup execute before `registered` evaluates
    // — registered then self-heals against the post-migration storage state.
    const [currentUser, setCurrentUserState] = React.useState(() => readInitialUser());
    const [registered, setRegisteredState] = React.useState(() => {
      // Self-heal: a `registered=true` flag with no user identity is a
      // pre-GitHub-ship zombie state (e.g., legacy session that lost its
      // email key along the way). Force re-auth rather than render the
      // dashboard with an empty handle. Also strip the stale flag so it
      // doesn't keep replaying every load.
      const hasUser = !!window.localStorage.getItem(STORAGE_KEYS.user);
      if (!hasUser) {
        window.localStorage.removeItem(STORAGE_KEYS.registered);
        return false;
      }
      return readBool(STORAGE_KEYS.registered);
    });
    const [mockState, setMockStateState]   = React.useState(
      () => window.localStorage.getItem(STORAGE_KEYS.mockState) || 'day1'
    );
    const [wallets, setWalletsState] = React.useState(() => readInitialWallets());
    const [defaultWalletId, setDefaultWalletIdState] = React.useState(
      () => window.localStorage.getItem(STORAGE_KEYS.defaultWallet) || null
    );
    const [agents, setAgentsState] = React.useState(() => readInitialAgents());
    const [activeAgentId, setActiveAgentIdState] = React.useState(
      () => readInitialActiveAgent(readInitialAgents())
    );
    const [authChecked, setAuthChecked] = React.useState(() => !!params.get('seed'));

    const writeActiveAgent = React.useCallback((id) => {
      if (id) window.localStorage.setItem(STORAGE_KEYS.activeAgent, id);
      else window.localStorage.removeItem(STORAGE_KEYS.activeAgent);
      setActiveAgentIdState(id);
    }, []);

    const addWallet = React.useCallback((label, address, opts = {}) => {
      if (!address) return null;
      const id = generateWalletId();
      let becameDefault = false;
      setWalletsState((prev) => {
        const newWallet = {
          id,
          label: label || `Wallet ${prev.length + 1}`,
          address,
          chain: opts.chain || 'base',
          createdAt: Date.now(),
        };
        const next = [...prev, newWallet];
        window.localStorage.setItem(STORAGE_KEYS.wallets, JSON.stringify(next));
        if (prev.length === 0 || opts.setAsDefault) {
          window.localStorage.setItem(STORAGE_KEYS.defaultWallet, id);
          becameDefault = true;
        }
        return next;
      });
      if (becameDefault) setDefaultWalletIdState(id);
      return id;
    }, []);

    const removeWallet = React.useCallback((id) => {
      if (!id) return;
      const currentDefault = window.localStorage.getItem(STORAGE_KEYS.defaultWallet);
      let reassignedDefault = null;
      let didReassign = false;
      setWalletsState((prev) => {
        const next = prev.filter(w => w.id !== id);
        window.localStorage.setItem(STORAGE_KEYS.wallets, JSON.stringify(next));
        if (currentDefault === id) {
          reassignedDefault = next[0]?.id || null;
          didReassign = true;
          if (reassignedDefault) {
            window.localStorage.setItem(STORAGE_KEYS.defaultWallet, reassignedDefault);
          } else {
            window.localStorage.removeItem(STORAGE_KEYS.defaultWallet);
          }
        }
        return next;
      });
      if (didReassign) setDefaultWalletIdState(reassignedDefault);
    }, []);

    const setDefaultWallet = React.useCallback((id) => {
      if (!id) {
        window.localStorage.removeItem(STORAGE_KEYS.defaultWallet);
        setDefaultWalletIdState(null);
        return;
      }
      window.localStorage.setItem(STORAGE_KEYS.defaultWallet, id);
      setDefaultWalletIdState(id);
    }, []);

    const updateWalletLabel = React.useCallback((id, label) => {
      if (!id) return;
      setWalletsState((prev) => {
        const next = prev.map(w => w.id === id ? { ...w, label } : w);
        window.localStorage.setItem(STORAGE_KEYS.wallets, JSON.stringify(next));
        return next;
      });
    }, []);

    // signIn — canonical sign-in path. Accepts a fully-formed user object
    // (provider + identity fields). Persists to localStorage and flips
    // `registered` true. Replaces the older `setRegistered(true, {email})`
    // pattern; that shim still exists below for any leftover callers.
    const signIn = React.useCallback((user) => {
      if (!user || !user.provider) return;
      const previousEmail = readInitialUser()?.email || '';
      const nextEmail = user.email || '';
      if (previousEmail && nextEmail && previousEmail !== nextEmail) {
        window.localStorage.removeItem(STORAGE_KEYS.agents);
        window.localStorage.removeItem(STORAGE_KEYS.activeAgent);
        setAgentsState([]);
        setActiveAgentIdState(null);
      }
      window.localStorage.setItem(STORAGE_KEYS.user, JSON.stringify(user));
      setCurrentUserState(user);
      writeBool(STORAGE_KEYS.registered, true);
      setRegisteredState(true);
    }, []);

    const signOut = React.useCallback(() => {
      window.localStorage.removeItem(STORAGE_KEYS.user);
      window.localStorage.removeItem(STORAGE_KEYS.agents);
      window.localStorage.removeItem(STORAGE_KEYS.activeAgent);
      setCurrentUserState(null);
      setAgentsState([]);
      setActiveAgentIdState(null);
      writeBool(STORAGE_KEYS.registered, false);
      setRegisteredState(false);
    }, []);

    React.useEffect(() => {
      if (params.get('seed')) {
        setAuthChecked(true);
        return;
      }
      let cancelled = false;
      fetch('/auth/session', { credentials: 'same-origin' })
        .then((response) => {
          if (!response.ok) throw new Error(`auth session ${response.status}`);
          return response.json();
        })
        .then((payload) => {
          if (cancelled) return;
          if (payload && payload.authenticated && payload.user) {
            signIn(payload.user);
          } else {
            signOut();
          }
        })
        .catch(() => {
          if (!cancelled) signOut();
        })
        .finally(() => {
          if (!cancelled) setAuthChecked(true);
        });
      return () => { cancelled = true; };
    }, [params, signIn, signOut]);

    // Legacy shim — main project's RegistrationScreen (no longer mounted by
    // MVP but still in the bundle) calls setRegistered(true, {email}). Routes
    // through signIn so the storage shape stays consistent.
    const setRegistered = React.useCallback((value, opts = {}) => {
      if (value && opts.email !== undefined) {
        signIn({ provider: 'email', email: opts.email });
      } else if (!value) {
        signOut();
      } else {
        writeBool(STORAGE_KEYS.registered, value);
        setRegisteredState(value);
      }
      if (opts.externalWallet) {
        addWallet('My Wallet', opts.externalWallet);
      }
    }, [signIn, signOut, addWallet]);

    const claimAgent = React.useCallback((agentId) => {
      if (!agentId) return;
      setAgentsState((prev) => {
        const next = prev.includes(agentId) ? prev : [...prev, agentId];
        window.localStorage.setItem(STORAGE_KEYS.agents, JSON.stringify(next));
        return next;
      });
      writeActiveAgent(agentId);
    }, [writeActiveAgent]);

    // Backwards-compat shim for older callers that only flip claimed=true.
    const setClaimed = React.useCallback((value) => {
      if (value && agents[0]) claimAgent(agents[0]);
    }, [agents, claimAgent]);

    const setActiveAgent = React.useCallback((id) => {
      if (id) writeActiveAgent(id);
    }, [writeActiveAgent]);

    const setMockState = React.useCallback((value) => {
      window.localStorage.setItem(STORAGE_KEYS.mockState, value);
      setMockStateState(value);
    }, []);

    // Backwards-compat shim: onboarding + existing SettingsView still call this.
    // Treats it as "set the default wallet's address" — update in place when a
    // default exists, otherwise create a new wallet and mark it default.
    const setExternalWallet = React.useCallback((value) => {
      const currentDefault = window.localStorage.getItem(STORAGE_KEYS.defaultWallet);
      if (!value) {
        if (!currentDefault) return;
        let newDefault = null;
        setWalletsState((prev) => {
          const next = prev.filter(w => w.id !== currentDefault);
          window.localStorage.setItem(STORAGE_KEYS.wallets, JSON.stringify(next));
          newDefault = next[0]?.id || null;
          if (newDefault) {
            window.localStorage.setItem(STORAGE_KEYS.defaultWallet, newDefault);
          } else {
            window.localStorage.removeItem(STORAGE_KEYS.defaultWallet);
          }
          return next;
        });
        setDefaultWalletIdState(newDefault);
        return;
      }
      let newId = null;
      setWalletsState((prev) => {
        if (currentDefault && prev.some(w => w.id === currentDefault)) {
          const next = prev.map(w => w.id === currentDefault ? { ...w, address: value } : w);
          window.localStorage.setItem(STORAGE_KEYS.wallets, JSON.stringify(next));
          return next;
        }
        newId = generateWalletId();
        const newWallet = {
          id: newId,
          label: 'My Wallet',
          address: value,
          chain: 'base',
          createdAt: Date.now(),
        };
        const next = [...prev, newWallet];
        window.localStorage.setItem(STORAGE_KEYS.wallets, JSON.stringify(next));
        window.localStorage.setItem(STORAGE_KEYS.defaultWallet, newId);
        return next;
      });
      if (newId) setDefaultWalletIdState(newId);
    }, []);

    const resetAll = React.useCallback(() => {
      Object.values(STORAGE_KEYS).forEach((k) => window.localStorage.removeItem(k));
      setRegisteredState(false);
      setMockStateState('day1');
      setCurrentUserState(null);
      setWalletsState([]);
      setDefaultWalletIdState(null);
      setAgentsState([]);
      setActiveAgentIdState(null);
    }, []);

    if (isReset) {
      return <div style={{ background: 'var(--surface-paper)', minHeight: '100vh' }} />;
    }

    const claimed = agents.length > 0;

    // Derived: the address of the wallet currently flagged as default. Keeps
    // FundingView / SettingsView / onboarding working without change while
    // the new wallets[] becomes the canonical store.
    const externalWallet = React.useMemo(() => {
      const w = wallets.find((w) => w.id === defaultWalletId);
      return w?.address || '';
    }, [wallets, defaultWalletId]);

    // Derived: backwards-compat alias so older consumers (Chrome / Overview /
    // Settings before this change) reading `ownerEmail` continue to work
    // regardless of which provider signed the user in.
    const ownerEmail = currentUser?.email || '';

    const value = {
      authChecked, registered, currentUser, ownerEmail, externalWallet, mockState,
      wallets, defaultWalletId,
      agents, activeAgentId, claimed,
      claimToken, internalMode,
      signIn, signOut,
      setRegistered, setClaimed, claimAgent, setActiveAgent,
      setMockState, setExternalWallet,
      addWallet, removeWallet, setDefaultWallet, updateWalletLabel,
      resetAll,
    };

    return (
      <AppStateContext.Provider value={value}>
        {children}
      </AppStateContext.Provider>
    );
  }

  function useAppState() {
    const ctx = React.useContext(AppStateContext);
    if (!ctx) throw new Error('useAppState must be used inside MvpAppStateProvider');
    return ctx;
  }

  window.AppStateContext = AppStateContext;
  window.AppStateProvider = MvpAppStateProvider;
  window.useAppState = useAppState;
})();

</script>

<script type="text/babel" data-src="../src/dashboard/Shell/AgentSwitcher.jsx">
// AgentSwitcher — clickable badge in DashboardChrome's top bar that opens
// a dropdown listing every claimed agent + an "+ Add agent" CTA.
//
// Replaces the static `agentA` badge from batches A–D. Closed state mirrors
// that badge visually (mono pill with the active agent's id) so existing
// screenshots stay coherent; the only addition is a small ▾ caret.
//
// Open state lists each agent with name · role · current balance, and the
// active row gets an amber left border. Click a row → setActiveAgent + close.
// Click "+ Add agent" → onAddAgent() prop (parent decides what flow to run).
//
// Accepts agentRoster ({id → metadata}) so it can render rich rows; falls
// back gracefully if a claimed id is missing from the roster (rare — only if
// localStorage holds an id absent from the current mockState's roster).

function AgentSwitcher({ agents, activeAgentId, agentRoster, onSelect, onAddAgent }) {
  const t = window.useT();
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    const onKey = (e) => {
      if (e.key === 'Escape') setOpen(false);
    };
    document.addEventListener('mousedown', onDocClick);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDocClick);
      document.removeEventListener('keydown', onKey);
    };
  }, [open]);

  if (!agents || agents.length === 0) return null;

  const activeMeta = agentRoster[activeAgentId];

  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <button
        type="button"
        onClick={() => setOpen((v) => !v)}
        className="font-mono"
        style={{
          fontSize: '11px',
          padding: '3px 10px 3px 8px',
          border: '1px solid var(--stroke-rule)',
          color: 'var(--ink-primary)',
          letterSpacing: '0.04em',
          background: 'transparent',
          cursor: 'pointer',
          display: 'inline-flex',
          alignItems: 'center',
          gap: '6px',
        }}
        aria-haspopup="menu"
        aria-expanded={open}
      >
        <span>{activeAgentId || agents[0]}</span>
        <span style={{ color: 'var(--ink-tertiary)', fontSize: '10px' }}>▾</span>
      </button>

      {open && (
        <div
          role="menu"
          style={{
            position: 'absolute',
            top: 'calc(100% + 8px)',
            right: 0,
            minWidth: '320px',
            background: 'var(--surface-paper)',
            border: '1px solid var(--stroke-rule)',
            boxShadow: '0 8px 32px rgba(26,26,26,0.12)',
            zIndex: 60,
          }}
        >
          <div
            className="smallcaps-mono"
            style={{
              padding: '12px 16px 8px',
              color: 'var(--ink-tertiary)',
              fontSize: '10px',
              borderBottom: '1px solid var(--stroke-hairline)',
            }}
          >
            {t('dash.switcher.title')} · {agents.length}
          </div>

          {agents.map((id) => {
            const meta = agentRoster[id];
            const active = id === activeAgentId;
            return (
              <button
                key={id}
                type="button"
                onClick={() => {
                  onSelect(id);
                  setOpen(false);
                }}
                className="font-body"
                style={{
                  width: '100%',
                  background: active ? 'var(--accent-amber-soft)' : 'transparent',
                  border: 'none',
                  borderLeft: active
                    ? '3px solid var(--accent-amber)'
                    : '3px solid transparent',
                  padding: '12px 16px',
                  cursor: 'pointer',
                  textAlign: 'left',
                  display: 'block',
                  borderBottom: '1px solid var(--stroke-hairline)',
                }}
              >
                <AgentRow meta={meta} fallbackId={id} active={active} t={t} />
              </button>
            );
          })}

          <button
            type="button"
            onClick={() => {
              setOpen(false);
              onAddAgent && onAddAgent();
            }}
            className="font-body"
            style={{
              width: '100%',
              background: 'transparent',
              border: 'none',
              padding: '14px 16px',
              cursor: 'pointer',
              textAlign: 'left',
              fontSize: '13px',
              color: 'var(--accent-amber)',
              letterSpacing: '0.02em',
            }}
          >
            + {t('dash.switcher.add')}
          </button>
        </div>
      )}
    </div>
  );
}

function AgentRow({ meta, fallbackId, active, t }) {
  if (!meta) {
    // Defensive fallback — claimed id without a roster entry. Should be rare
    // (e.g. user claimed in mature, then toggled to empty/day1 where only
    // agentA exists). Show id only; balance/role omitted.
    return (
      <div>
        <div className="font-mono" style={{ fontSize: '13px', color: 'var(--ink-primary)' }}>
          {fallbackId}
        </div>
        <div
          className="font-body"
          style={{ fontSize: '11px', color: 'var(--ink-tertiary)', marginTop: '2px' }}
        >
          {t('dash.switcher.no_data_in_state')}
        </div>
      </div>
    );
  }
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: '12px' }}>
      <div style={{ minWidth: 0, flex: 1 }}>
        <div
          className="font-mono"
          style={{
            fontSize: '13px',
            color: active ? 'var(--accent-amber)' : 'var(--ink-primary)',
            letterSpacing: '0.02em',
          }}
        >
          {meta.agent.name}
        </div>
        <div
          className="font-body"
          style={{
            fontSize: '11px',
            color: 'var(--ink-tertiary)',
            marginTop: '2px',
            whiteSpace: 'nowrap',
            overflow: 'hidden',
            textOverflow: 'ellipsis',
          }}
        >
          {meta.agent.role}
        </div>
      </div>
      <div
        className="font-mono"
        style={{
          fontSize: '13px',
          color: 'var(--ink-primary)',
          whiteSpace: 'nowrap',
          letterSpacing: '-0.01em',
        }}
      >
        ${window.formatAmount(meta.balance.available)}
      </div>
    </div>
  );
}

window.AgentSwitcher = AgentSwitcher;

</script>

  function ScopeLine({ icon, children }) {

  function OctocatGlyph({ size = 20, fill = '#1A1A1A' }) {
    return (
      <svg
        viewBox="0 0 24 24"
        width={size}
        height={size}
        fill={fill}
        aria-hidden="true"
      >
        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />

<script type="text/babel" data-src="src/dashboard/Onboarding/ClaimForm.jsx">
// MVP ClaimForm fused with the real ledger dashboard: the surface keeps the
// prototype's validate/confirm shape, but candidates come from the logged-in
// email via /dashboard/claimable-agents.

(function () {
  function ClaimForm({ mode = 'initial', onClaimed, onDismiss }) {
    const t = window.useT();
    const { agents: claimedAgents, claimAgent, ownerEmail, currentUser, resetAll, claimToken } = window.useAppState();
    const [candidates, setCandidates] = React.useState([]);
    const [status, setStatus] = React.useState('loading');
    const [code, setCode] = React.useState(() =>
      (mode === 'initial' && claimToken) ? claimToken : ''
    );
    const [step, setStep] = React.useState('input');
    const [matched, setMatched] = React.useState(null);
    const [errorKey, setErrorKey] = React.useState('');

    React.useEffect(() => {
      let cancelled = false;
      if (!ownerEmail) {
        setCandidates([]);
        setStatus('empty');
        return () => { cancelled = true; };
      }
      const claimed = encodeURIComponent(claimedAgents.join(','));
      const email = encodeURIComponent(ownerEmail);
      setStatus('loading');
      fetch(`/dashboard/claimable-agents?email=${email}&claimed=${claimed}`)
        .then((response) => {
          if (!response.ok) throw new Error(`claimable agents ${response.status}`);
          return response.json();
        })
        .then((payload) => {
          if (cancelled) return;
          const next = Array.isArray(payload.agents) ? payload.agents : [];
          setCandidates(next);
          setStatus(next.length ? 'ready' : 'empty');
        })
        .catch(() => {
          if (cancelled) return;
          setCandidates([]);
          setStatus('error');
        });
      return () => { cancelled = true; };
    }, [ownerEmail, claimedAgents]);

    const trimmedCode = code.trim();
    const canValidate = trimmedCode.length > 0;
    const demoCodes = React.useMemo(() => {
      return candidates
        .filter((candidate) => candidate.claimCode && !claimedAgents.includes(candidate.agentId))
        .map((candidate) => [candidate.claimCode, candidate.agentId]);
    }, [candidates, claimedAgents]);

    const handleValidate = () => {
      if (!canValidate) return;
      if (status === 'loading') {
        setMatched(null);
        setErrorKey('mvp.dash.claim.error_loading');
        setStep('input');
        return;
      }
      if (status === 'error') {
        setMatched(null);
        setErrorKey('mvp.dash.claim.error_load_failed');
        setStep('input');
        return;
      }
      const lowered = trimmedCode.toLowerCase();
      const next = candidates.find((candidate) => (
        String(candidate.claimCode || '').trim().toLowerCase() === lowered
      ));
      if (!next) {
        setMatched(null);
        setErrorKey('mvp.dash.claim.error_not_found');
        setStep('input');
        return;
      }
      if (claimedAgents.includes(next.agentId)) {
        setMatched(null);
        setErrorKey('mvp.dash.claim.error_already_claimed');
        setStep('input');
        return;
      }
      setErrorKey('');
      setMatched(next);
      setStep('confirm');
    };

    const handleClaim = (candidate) => {
      if (!candidate) return;
      claimAgent(candidate.agentId);
      if (onClaimed) onClaimed(candidate.agentId);
    };

    const handleUseDifferent = () => {
      setStep('input');
      setMatched(null);
      setCode('');
      setErrorKey('');
    };

    const handleReturnToRegistration = () => {
      setStep('input');
      setMatched(null);
      setCode('');
      setErrorKey('');
      if (resetAll) resetAll();
    };

    if (step === 'confirm' && matched) {
      return (
        <ConfirmStep
          t={t}
          candidate={matched}
          code={trimmedCode}
          ownerHandle={ownerHandleFor(currentUser) || ownerEmail}
          onClaim={() => handleClaim(matched)}
          onUseDifferent={handleUseDifferent}
        />
      );
    }

    return (
      <InputStep
        t={t}
        code={code}
        onCodeChange={(value) => {
          setCode(value);
          if (errorKey) setErrorKey('');
        }}
        onValidate={handleValidate}
        canValidate={canValidate}
        errorKey={errorKey}
        demoCodes={demoCodes}
        status={status}
        ownerEmail={ownerEmail}
        mode={mode}
        onReturnToRegistration={handleReturnToRegistration}
      />
    );
  }

  function InputStep({ t, code, onCodeChange, onValidate, canValidate, errorKey, demoCodes, status, ownerEmail, mode, onReturnToRegistration }) {
    const handleKey = (e) => { if (e.key === 'Enter' && canValidate) onValidate(); };
    return (
      <>
        <div className="font-body" style={{ fontSize: '13px', color: 'var(--ink-secondary)', lineHeight: 1.55, marginBottom: '16px' }}>
          {t(mode === 'initial' ? 'mvp.dash.claim.input_help_initial' : 'mvp.dash.claim.input_help_add')}
        </div>
        <div className="smallcaps-mono" style={{ color: 'var(--ink-secondary)', marginBottom: '6px', fontSize: '10px' }}>
          {t('mvp.dash.claim.code_label')}
        </div>
        <input
          type="text"
          value={code}
          onChange={(e) => onCodeChange(e.target.value)}
          onKeyDown={handleKey}
          placeholder={t('mvp.dash.claim.code_placeholder')}
          autoFocus
          className="font-mono"
          style={{ width: '100%', padding: '10px 14px', border: `1px solid ${errorKey ? 'var(--status-negative)' : 'var(--stroke-rule)'}`, background: 'var(--surface-paper)', fontSize: '13px', color: 'var(--ink-primary)', outline: 'none', letterSpacing: '0.02em' }}
        />
        {errorKey && (
          <div className="font-body" style={{ marginTop: '6px', fontSize: '11px', color: 'var(--status-negative)' }}>{t(errorKey)}</div>
        )}
        <div style={{ marginTop: '18px' }}>
          <button type="button" onClick={onValidate} disabled={!canValidate} className="font-body" style={{ padding: '10px 22px', background: canValidate ? 'var(--ink-primary)' : 'var(--stroke-hairline)', border: `1px solid ${canValidate ? 'var(--ink-primary)' : 'var(--stroke-rule)'}`, color: canValidate ? 'var(--ink-inverse)' : 'var(--ink-tertiary)', fontSize: '13px', cursor: canValidate ? 'pointer' : 'not-allowed', letterSpacing: '0.02em' }}>
            {t('mvp.dash.claim.validate_button')} →
          </button>
        </div>
        {demoCodes.length > 0 && (
          <DemoHint t={t} demoCodes={demoCodes} onUse={onCodeChange} />
        )}
        {status === 'empty' && (
          <div className="font-body" style={{ marginTop: '18px', fontSize: '12px', color: 'var(--ink-tertiary)', lineHeight: 1.5 }}>
            {t('mvp.dash.claim.no_agents')} {ownerEmail || '-'}
            <div style={{ marginTop: '10px' }}>
              <UseDifferentButton onClick={onReturnToRegistration}>{t('dash.claim.return_to_registration')}</UseDifferentButton>
            </div>
          </div>
        )}
      </>
    );
  }

  function DemoHint({ t, demoCodes, onUse }) {
    return (
      <div style={{ marginTop: '28px', paddingTop: '18px', borderTop: '1px dashed var(--stroke-rule)' }}>
        <div className="smallcaps-mono" style={{ fontSize: '10px', color: 'var(--ink-tertiary)', marginBottom: '10px', letterSpacing: '0.08em' }}>
          {t('mvp.dash.claim.demo_hint_label')}
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
          {demoCodes.map(([claimCode, label]) => (
            <div key={claimCode} style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '8px 12px', background: 'var(--surface-card)', border: '1px solid var(--stroke-hairline)' }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div className="font-mono" style={{ fontSize: '11px', color: 'var(--ink-primary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {claimCode}
                </div>
                <div className="font-body" style={{ fontSize: '10px', color: 'var(--ink-tertiary)', marginTop: '2px' }}>
                  {t('mvp.dash.claim.demo_hint_for')} {label}
                </div>
              </div>
              <button type="button" onClick={() => onUse(claimCode)} className="smallcaps-mono" style={{ padding: '4px 10px', background: 'transparent', border: '1px solid var(--stroke-rule)', color: 'var(--ink-secondary)', fontSize: '9px', letterSpacing: '0.08em', cursor: 'pointer', textTransform: 'uppercase', flexShrink: 0 }}>
                {t('mvp.dash.claim.demo_hint_use')}
              </button>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function ConfirmStep({ t, candidate, code, ownerHandle, onClaim, onUseDifferent }) {
    const truncatedCode = code.length > 22
      ? `${code.slice(0, 14)}…${code.slice(-4)}`
      : code;
    const agentLabel = candidate.dashboard && candidate.dashboard.agent && candidate.dashboard.agent.role
      ? `${candidate.agentName || candidate.agentId} · ${candidate.dashboard.agent.role}`
      : candidate.agentName || candidate.agentId;
    return (
      <>
        <div className="font-body" style={{ display: 'inline-block', padding: '4px 10px', background: 'rgba(45, 95, 63, 0.08)', border: '1px solid rgba(45, 95, 63, 0.32)', color: 'var(--status-positive)', fontSize: '11px', letterSpacing: '0.04em', marginBottom: '20px' }}>
          ✓ {t('mvp.dash.claim.confirm_validated')}
        </div>
        <div style={{ padding: '20px 22px', background: 'var(--surface-card)', border: '1px solid var(--stroke-hairline)' }}>
          <Row label={t('mvp.dash.claim.confirm_agent_label')} value={agentLabel} />
          <Row label={t('mvp.dash.claim.confirm_wallet_label')} value={candidate.displayWalletAddress || candidate.walletAddress || '-'} mono />
          <Row label={t('mvp.dash.claim.confirm_owner_label')} value={ownerHandle || candidate.ownerEmail || '-'} mono />
          <Row label={t('mvp.dash.claim.confirm_code_label')} value={truncatedCode} mono last />
        </div>
        <div style={{ marginTop: '22px', display: 'flex', alignItems: 'center', gap: '14px', flexWrap: 'wrap' }}>
          <button type="button" onClick={onClaim} className="font-body" style={{ padding: '12px 24px', background: 'var(--accent-amber)', color: 'var(--ink-inverse)', border: 'none', fontSize: '14px', fontWeight: 500, letterSpacing: '0.02em', cursor: 'pointer', boxShadow: '0 0 0 4px var(--accent-amber-soft)' }}>
            {t('mvp.dash.claim.claim_button')}
          </button>
          <UseDifferentButton onClick={onUseDifferent}>{t('mvp.dash.claim.use_different')}</UseDifferentButton>
        </div>
      </>
    );
  }

  function UseDifferentButton({ children, onClick }) {
    return <button type="button" onClick={onClick} className="font-body" style={{ background: 'transparent', border: 'none', padding: '4px 0', color: 'var(--ink-tertiary)', fontSize: '13px', cursor: 'pointer', textDecoration: 'underline', textDecorationColor: 'var(--stroke-rule)', textUnderlineOffset: '4px' }}>{children}</button>;
  }

  function Row({ label, value, mono, last }) {
    return (
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: '14px', padding: '8px 0', borderBottom: last ? 'none' : '1px solid var(--stroke-hairline)' }}>
        <span className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)', fontSize: '10px', letterSpacing: '0.08em', whiteSpace: 'nowrap' }}>{label}</span>
        <span className={mono ? 'font-mono' : 'font-body'} style={{ fontSize: mono ? '12px' : '13px', color: 'var(--ink-primary)', textAlign: 'right', wordBreak: 'break-all' }}>{value}</span>
      </div>
    );
  }

  function ownerHandleFor(user) {
    if (!user) return '';
    if (user.provider === 'github' && user.login) return '@' + user.login;
    return user.email || user.login || '';
  }

  window.ClaimForm = ClaimForm;
})();

</script>

<script type="text/babel" data-src="src/dashboard/Onboarding/MvpAddAgentModal.jsx">
// MVP · AddAgentModal — modal wrapper around ClaimForm for adding another
// agent after the initial claim. Replaces the main project's AddAgentModal
// (which used a non-interactive token + click-an-agent flow). The actual
// validate/confirm logic lives in ClaimForm, shared with ClaimScreen.

(function () {

    React.useEffect(() => {
      const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
      document.addEventListener('keydown', onKey);

<script type="text/babel" data-src="src/dashboard/Shell/MvpDashboardChrome.jsx">
// MVP DashboardChrome — same shape as the main project's chrome (top bar +
// horizontal nav row + content), but with **5 tabs only**:
//
//   portfolio · overview · transactions · funding · settings
//
// Cut from main:
//   - credit          : MVP has no credit story
//   - reconciliation  : MVP doesn't expose the Circle delegation ledger
//
// MockStateToggle still sits on the right edge of the nav row, AgentSwitcher
// sits in the top bar — both are reused from main as-is (../src/dashboard/).

(function () {
  function MvpDashboardChrome({ activeTab, setActiveTab, ownerEmail, agentList, agentRoster, onAddAgent, children }) {
    const t = window.useT();
    const { activeAgentId, setActiveAgent } = window.useAppState();
    const agents = agentList || [];

    const tabs = [
      { id: 'portfolio',    label: t('mvp.dash.nav.portfolio') },
      { id: 'overview',     label: t('mvp.dash.nav.overview') },
      { id: 'transactions', label: t('mvp.dash.nav.transactions') },
      { id: 'funding',      label: t('mvp.dash.nav.funding') },
      { id: 'settings',     label: t('mvp.dash.nav.settings') },
    ];

    return (
      // paddingTop reserves space for the fixed top bar (64px) + 16px of
      // breathing room. Main project uses 128px which leaves a big empty
      // band above the nav row — tighter feels more product-like.
      <div className="w-full" style={{ paddingTop: '80px' }}>
        {/* Top bar */}
        <div
          className="fixed left-0 right-0 flex items-center"
          style={{
            top: 0,
            height: '64px',
            paddingLeft: '64px',
            paddingRight: '160px',
            background: 'var(--surface-paper)',
            borderBottom: '1px solid var(--stroke-hairline)',
            zIndex: 30,
          }}
        >
          <div className="font-display" style={{ fontSize: '24px', fontWeight: 400, letterSpacing: '-0.01em' }}>
            Chief
          </div>
          <span
            className="font-mono"
            style={{
              marginLeft: '10px',
              fontSize: '10px',
              letterSpacing: '0.1em',
              color: 'var(--ink-tertiary)',
            }}
          >
            MVP
          </span>
          <div className="flex-1" />
          {agents && agents.length > 0 && (
            <div className="flex items-center" style={{ gap: '12px' }}>
              <window.AgentSwitcher
                agents={agents}
                activeAgentId={activeAgentId}
                agentRoster={agentRoster || {}}
                onSelect={setActiveAgent}
                onAddAgent={onAddAgent}
              />
              <span className="font-mono" style={{ fontSize: '12px', color: 'var(--ink-tertiary)' }}>
                {ownerEmail || 'unclaimed'}
              </span>
            </div>
          )}
        </div>

        {/* Nav row */}
        <div className="px-16" style={{ marginTop: '8px' }}>
          <div className="flex items-baseline justify-between" style={{ gap: '32px', flexWrap: 'wrap' }}>
            <div className="flex" style={{ gap: '32px' }}>
              {tabs.map((tab) => {
                const active = tab.id === activeTab;
                return (
                  <button
                    key={tab.id}
                    type="button"
                    onClick={() => setActiveTab(tab.id)}
                    className="smallcaps-mono"
                    style={{
                      background: 'transparent',
                      border: 'none',
                      padding: '4px 0 8px',
                      cursor: 'pointer',
                      color: active ? 'var(--ink-primary)' : 'var(--ink-tertiary)',
                      borderBottom: active ? '2px solid var(--accent-amber)' : '2px solid transparent',
                      letterSpacing: '0.08em',
                      transition: 'color 120ms, border-color 120ms',
                    }}
                    aria-pressed={active}
                  >
                    {tab.label}
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{ height: '1px', background: 'var(--stroke-hairline)', marginTop: '4px' }} />
        </div>

        {/* Content */}
        <div className="px-16 pt-8 pb-24">{children}</div>
      </div>
    );
  }

  window.MvpDashboardChrome = MvpDashboardChrome;
})();

</script>
<script type="text/babel" data-src="src/dashboard/views/PortfolioView.jsx">
// MVP Portfolio — multi-agent overview grid. Each card surfaces the agent's
// balance and a one-line activity hint; click → set active + jump to Overview.
// "+ Add agent" is the explicit affordance for the multi-agent flow.

(function () {
  function MvpPortfolioView({ effectiveRoster, displayedAgents, onSelectAgent, onAddAgent }) {
    const t = window.useT();
    const agentIds = displayedAgents || [];

    return (
      <div>
        <div className="flex items-baseline justify-between" style={{ marginBottom: '32px' }}>
          <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)' }}>
            {t('mvp.dash.portfolio.slug')}
          </div>
          <button
            type="button"
            onClick={onAddAgent}
            className="font-body"
            style={{
              padding: '10px 18px',
              background: 'transparent',
              border: '1px solid var(--stroke-rule)',
              color: 'var(--ink-primary)',
              fontSize: '13px',
              cursor: 'pointer',
              letterSpacing: '0.02em',
            }}
          >
            + {t('mvp.dash.portfolio.add_agent')}
          </button>
        </div>

        {agentIds.length === 0 ? (
          <div
            className="font-body"
            style={{
              padding: '64px 24px',
              textAlign: 'center',
              color: 'var(--ink-tertiary)',
              border: '1px dashed var(--stroke-rule)',
            }}
          >
            {t('mvp.dash.portfolio.empty')}
          </div>
        ) : (
          <div
            className="grid"
            style={{
              gridTemplateColumns: 'repeat(auto-fill, minmax(360px, 1fr))',
              gap: '20px',
            }}
          >
            {agentIds.map((id) => (
              <AgentCard
                key={id}
                id={id}
                data={effectiveRoster[id]}
                onSelect={() => onSelectAgent(id)}
                t={t}
              />
            ))}
          </div>
        )}
      </div>
    );
  }

  function AgentCard({ id, data, onSelect, t }) {
    if (!data) return null;
    const { agent, balance, transactions } = data;
    const txCount = transactions ? transactions.length : 0;
    const lastTx = transactions && transactions[0];

    return (
      <button
        type="button"
        onClick={onSelect}
        style={{
          padding: '24px',
          background: 'var(--surface-card)',
          border: '1px solid var(--stroke-rule)',
          textAlign: 'left',
          cursor: 'pointer',
          transition: 'border-color 120ms',
        }}
        onMouseEnter={(e) => { e.currentTarget.style.borderColor = 'var(--accent-amber)'; }}
        onMouseLeave={(e) => { e.currentTarget.style.borderColor = 'var(--stroke-rule)'; }}
      >
        <div className="flex items-baseline justify-between" style={{ marginBottom: '4px' }}>
          <div className="font-display" style={{ fontSize: '24px', color: 'var(--ink-primary)' }}>
            {agent.name}
          </div>
          <div
            className="font-mono"
            style={{ fontSize: '10px', color: 'var(--ink-tertiary)', letterSpacing: '0.06em' }}
          >
            {agent.claimedDaysAgo === 0
              ? t('mvp.dash.portfolio.just_claimed')
              : `${agent.claimedDaysAgo}d`}
          </div>
        </div>
        <div className="font-body" style={{ fontSize: '13px', color: 'var(--ink-secondary)', marginBottom: '20px' }}>
          {agent.role}
        </div>
        <div
          className="font-mono"
          style={{ fontSize: '28px', color: 'var(--ink-primary)', letterSpacing: '-0.01em' }}
        >
          ${window.formatAmount(balance.available)}
          <span className="font-mono" style={{ fontSize: '11px', color: 'var(--ink-tertiary)', marginLeft: '6px' }}>
            USDC
          </span>
        </div>
        <div
          className="font-mono"
          style={{
            fontSize: '11px',
            color: 'var(--ink-tertiary)',
            marginTop: '16px',
            letterSpacing: '0.04em',
          }}
        >
          {txCount === 0
            ? t('mvp.dash.portfolio.no_activity')
            : `${txCount} ${t('mvp.dash.portfolio.tx_suffix')} · ${lastTx.timestamp}`}
        </div>
      </button>
    );
  }

  window.MvpPortfolioView = MvpPortfolioView;
})();

</script>
<script type="text/babel" data-src="src/dashboard/views/OverviewView.jsx">
// MVP Overview — single-agent landing page. View-only (no CTAs to operate);
// the operate affordances (Add funds / Withdraw) live in the Funding tab.
//
// Layout:
//   - Big balance number (USDC)
//   - 2-up KPI row (lifetime in / out). Escrow dropped — MVP atomic
//     settlement has no lock state, so escrowed is always 0 and the cell
//     was dead space.
//   - Recent 5 transactions (full list lives in Transactions tab)
//   - "View all →" link to jump to Transactions

(function () {
  function MvpOverviewView({ data, ownerEmail, onJumpTo }) {
    const t = window.useT();
    if (!data) return null;
    const { agent, balance, transactions } = data;
    const recent = (transactions || []).slice(0, 5);
    const isEmpty = recent.length === 0;

    return (
      <div>
        <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)', marginBottom: '8px' }}>
          {t('mvp.dash.overview.slug')} · {agent.name}
        </div>

        {/* Balance */}
        <div className="font-display" style={{ fontSize: '12px', color: 'var(--ink-tertiary)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: '4px' }}>
          {t('mvp.dash.overview.balance_label')}
        </div>
        <div className="font-mono" style={{ fontSize: '56px', color: 'var(--ink-primary)', letterSpacing: '-0.02em', lineHeight: 1 }}>
          ${window.formatAmount(balance.available)}
          <span style={{ fontSize: '18px', color: 'var(--ink-tertiary)', marginLeft: '12px', letterSpacing: '0.04em' }}>USDC</span>
        </div>

        {/* KPI row — 2-up (escrow dropped: MVP has no lock state) */}
        <div
          className="grid"
          style={{
            gridTemplateColumns: 'repeat(2, minmax(0, 280px))',
            gap: '48px',
            marginTop: '40px',
            paddingTop: '24px',
            borderTop: '1px solid var(--stroke-hairline)',
          }}
        >
          <Kpi label={t('mvp.dash.overview.kpi_in')}  value={`$${window.formatAmount(balance.lifetimeIn)}`} />
          <Kpi label={t('mvp.dash.overview.kpi_out')} value={`$${window.formatAmount(balance.lifetimeOut)}`} />
        </div>

        {/* Recent transactions */}
        <div style={{ marginTop: '48px' }}>
          <div className="flex items-baseline justify-between" style={{ marginBottom: '12px' }}>
            <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)' }}>
              {t('mvp.dash.overview.recent_label')}
            </div>
            {!isEmpty && (
              <button
                type="button"
                onClick={() => onJumpTo && onJumpTo('transactions')}
                className="font-body"
                style={{
                  background: 'transparent',
                  border: 'none',
                  fontSize: '12px',
                  color: 'var(--accent-amber)',
                  cursor: 'pointer',
                  letterSpacing: '0.02em',
                }}
              >
                {t('mvp.dash.overview.view_all')} →
              </button>
            )}
          </div>
          <div className="rule-t" />
          {isEmpty ? (
            <div
              className="font-body"
              style={{
                padding: '48px 0',
                textAlign: 'center',
                color: 'var(--ink-tertiary)',
                fontSize: '13px',
              }}
            >
              {t('mvp.dash.overview.empty')}
            </div>
          ) : (
            recent.map((tx) => (
              <window.TransactionRow
                key={tx.id}
                receiptId={tx.id}
                counterparty={tx.counterparty}
                amount={tx.amount}
                direction={tx.direction}
                status={tx.status}
                timestamp={tx.timestamp}
              />
            ))
          )}
        </div>
      </div>
    );
  }

  function Kpi({ label, value }) {
    return (
      <div>
        <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)', marginBottom: '4px' }}>
          {label}
        </div>
        <div className="font-mono" style={{ fontSize: '20px', color: 'var(--ink-primary)', letterSpacing: '-0.01em' }}>
          {value}
        </div>
      </div>
    );
  }

  window.MvpOverviewView = MvpOverviewView;
})();

</script>
<script type="text/babel" data-src="src/dashboard/views/TransactionsView.jsx">
// MVP Transactions — flat ledger of every transaction for the active agent.
// No filtering / search in MVP (the dataset is small); each row reuses the
// shared TransactionRow component from the main project.

(function () {
  function MvpTransactionsView({ data }) {
    const t = window.useT();
    if (!data) return null;
    const { agent, transactions } = data;
    const txs = transactions || [];

    return (
      <div>
        <div className="smallcaps-mono" style={{ color: 'var(--ink-tertiary)', marginBottom: '24px' }}>
          {t('mvp.dash.transactions.slug')} · {agent.name}
        </div>

        {txs.length === 0 ? (
          <div
            className="font-body"
            style={{
              padding: '64px 24px',
              textAlign: 'center',
              color: 'var(--ink-tertiary)',
              border: '1px dashed var(--stroke-rule)',
            }}
          >
            {t('mvp.dash.transactions.empty')}
          </div>
        ) : (
          <>
            <div className="rule-t" />
            {txs.map((tx) => (
              <window.TransactionRow
                key={tx.id}
                receiptId={tx.id}
                counterparty={tx.counterparty}
                amount={tx.amount}
                direction={tx.direction}
                status={tx.status}
                timestamp={tx.timestamp}
                countdown={tx.countdown}
              />
            ))}
            <div
              className="font-mono"
              style={{
                marginTop: '32px',
                fontSize: '11px',
                color: 'var(--ink-tertiary)',
                letterSpacing: '0.04em',
              }}
            >
              {txs.length} {t('mvp.dash.transactions.row_count_suffix')}
            </div>
          </>
        )}
      </div>
    );
  }

  window.MvpTransactionsView = MvpTransactionsView;
})();

</script>
<script type="text/babel" data-src="src/dashboard/views/CoinbaseOnrampModal.jsx">
// MVP · simulated Coinbase Onramp modal.
//
// Not the real Coinbase widget — we don't load their SDK in MVP. This is a
// stylised stand-in that hits the visual beats users will recognise from
// the real thing: Coinbase blue header + wordmark, payment-method picker
// (Apple Pay / Card / Bank), a USD amount input that converts to USDC at a
// fixed 1:1 (plus a transparent fee line), and a Pay button.
//
// State machine: form → processing → success → close. On success the
// caller's `onComplete(usdcAmount, sourceLabel)` is invoked so FundingView
// can credit the local balance + prepend a transaction row.

(function () {
  function CoinbaseOnrampModal({ open, onClose, agentId, destinationAddress, t }) {
    const [amount, setAmount] = React.useState('25');
    const [method, setMethod] = React.useState('apple_pay');
    const [stage, setStage]   = React.useState('form'); // form | processing | success | error
    const [errorMessage, setErrorMessage] = React.useState('');

    // Reset state when reopening so a previous run doesn't bleed in.
    React.useEffect(() => {
      if (open) {
        setAmount('25');
        setMethod('apple_pay');
        setStage('form');
        setErrorMessage('');
      }
    }, [open]);

    if (!open) return null;

    // Pricing: $1.00/USDC, plus a 1.99% fee (typical for card onramps).
    // Numbers are rounded for display; the credited USDC excludes the fee.
    const amountNum   = parseFloat(amount) || 0;
    const feePct      = 0.0199;
    const fee         = amountNum * feePct;
    const usdcReceive = Math.max(0, amountNum - fee);
    const validAmount = amountNum >= 5 && amountNum <= 1000;

    const handlePay = async () => {
      if (!validAmount) return;
      if (!agentId || !/^0x[0-9a-fA-F]{40}$/.test(String(destinationAddress || '').trim())) {
        setErrorMessage(t('mvp.dash.onramp.error_body'));
        setStage('error');
        return;
      }
      setStage('processing');
      setErrorMessage('');
      let coinbaseWindow = null;
      try {
        coinbaseWindow = window.open('about:blank', '_blank');
      } catch {
        coinbaseWindow = null;
      }
      try {
        const response = await fetch('/onramp/sessions', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            agentId,
            destinationAddress,
            paymentAmount: amountNum.toFixed(2),
            idempotencyKey: `dashboard-${agentId}-${Date.now()}`,
          }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload?.detail || `HTTP ${response.status}`);
        }
        if (!payload?.onrampUrl) {
          throw new Error('Coinbase session did not include an onramp URL');
        }
        if (coinbaseWindow) {
          coinbaseWindow.location.href = payload.onrampUrl;
        } else {
          window.open(payload.onrampUrl, '_blank', 'noopener,noreferrer');
        }
        setStage('success');
      } catch (error) {
        if (coinbaseWindow) {
          coinbaseWindow.close();
        }
        setErrorMessage(error?.message || t('mvp.dash.onramp.error_body'));
        setStage('error');
      }
    };

    return (
      <div
        onClick={(e) => { if (e.target === e.currentTarget && stage === 'form') onClose(); }}
        style={{
          position: 'fixed',
          inset: 0,
          background: 'rgba(26, 26, 26, 0.55)',
          zIndex: 100,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '32px',
        }}
      >
        <div
          style={{
            width: '440px',
            maxWidth: '100%',
            background: '#FFFFFF',
            borderRadius: '12px',
            overflow: 'hidden',
            boxShadow: '0 24px 64px rgba(0,0,0,0.24)',
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
          }}
        >
          {/* Header — Coinbase blue */}
          <div
            style={{
              background: '#0052FF',
              color: '#FFFFFF',
              padding: '20px 24px',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
            }}
          >
            <CoinbaseWordmark />
            {stage !== 'processing' && (
              <button
                type="button"
                onClick={onClose}
                aria-label="Close"
                style={{
                  background: 'transparent',
                  border: 'none',
                  color: '#FFFFFF',
                  fontSize: '20px',
                  lineHeight: 1,
                  cursor: 'pointer',
                  padding: '4px 8px',
                  opacity: 0.85,
                }}
              >
                ×
              </button>
            )}
          </div>

          {/* Body */}
          <div style={{ padding: '24px' }}>
            {stage === 'form' && (
              <FormState
                t={t}
                amount={amount}
                setAmount={setAmount}
                method={method}
                setMethod={setMethod}
                fee={fee}
                usdcReceive={usdcReceive}
                validAmount={validAmount}
                onPay={handlePay}
              />
            )}
            {stage === 'processing' && (
              <CenteredMessage
                title={t('mvp.dash.onramp.processing_title')}
                subtitle={t('mvp.dash.onramp.processing_body')}
              />
            )}
            {stage === 'success' && (
              <CenteredMessage
                title={`✓ ${t('mvp.dash.onramp.success_title')}`}
                subtitle={t('mvp.dash.onramp.success_body')}
                accent="#0E8345"
              />
            )}
            {stage === 'error' && (
              <CenteredMessage
                title={t('mvp.dash.onramp.error_title')}
                subtitle={errorMessage || t('mvp.dash.onramp.error_body')}
                accent="#7A2620"
              />
            )}
          </div>
        </div>
      </div>
    );
  }

  function FormState({ t, amount, setAmount, method, setMethod, fee, usdcReceive, validAmount, onPay }) {
    return (
      <>
        {/* Amount input */}
        <div style={{ marginBottom: '20px' }}>
          <Label>{t('mvp.dash.onramp.amount_label')}</Label>
          <div
            style={{
              display: 'flex',
              alignItems: 'center',
              background: '#F5F6F8',
              borderRadius: '8px',
              padding: '14px 16px',
              gap: '8px',
            }}
          >
            <span style={{ fontSize: '20px', color: '#5B6B79' }}>$</span>
            <input
              type="text"
              value={amount}
              onChange={(e) => setAmount(e.target.value.replace(/[^0-9.]/g, ''))}
              style={{
