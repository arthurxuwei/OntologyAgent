<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Wallet · MVP Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          paper: '#F5F1EA',
          card: '#FBF8F2',
          deep: '#1A1A1A',
          'deep-alt': '#2A2A2A',
          ink: '#1A1A1A',
          'ink-2': '#5A5651',
          'ink-3': '#8B847A',
          'ink-inv': '#F5F1EA',
          'ink-inv-meta': '#9A9590',
          amber: '#A8590D',
          'amber-soft': 'rgba(168, 89, 13, 0.08)',
          positive: '#2D5F3F',
          warning: '#8B6914',
          negative: '#7A2620',
        },
        fontFamily: {
          display: ['Fraunces', 'Georgia', 'serif'],
          body: ['Geist', '-apple-system', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
        },
      },
    },
  };
</script>

<link rel="stylesheet" href="/dashboard/assets/dashboard.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<!-- QR generator (used by Funding's "Transfer from exchange" card so mobile
     exchange apps can scan instead of asking the user to type a 42-char
     hex string). Tiny (~6KB), dependency-free, exposes `qrcode(t,e)`. -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
<div id="root"></div>

<!-- MVP dashboard. Built in batch 4.
     5 public tabs (portfolio · overview · transactions · funding · settings).
     Reuses the main project's LangProvider + onboarding screens + UI widgets
     (AgentSwitcher / MockStateToggle / AddAgentModal) via ../src/, but ships
     its own AppStateProvider, mock data, Chrome and views under mvp/src/. -->

<!-- Top-level shared lib (reused) -->
<script type="text/babel" src="/dashboard/assets/shared/lib/formatAmount.js"></script>
<script type="text/babel" src="/dashboard/assets/shared/lib/LangContext.jsx"></script>

<!-- Top-level shared components.
     LedgerFrame.jsx co-locates LangSwitcher (which the dashboard renders);
     LedgerFrame itself is demo chrome and goes unused here. -->
<script type="text/babel" src="/dashboard/assets/shared/components/LedgerFrame.jsx"></script>
<script type="text/babel" src="/dashboard/assets/shared/components/AgentCard.jsx"></script>
<script type="text/babel" src="/dashboard/assets/shared/components/TransactionRow.jsx"></script>

<!-- Top-level i18n base (provides dash.* keys used by reused onboarding
     screens and AgentSwitcher / MockStateToggle / AddAgentModal labels). -->
<script type="text/babel" src="/dashboard/assets/shared/data/i18n.js"></script>

<!-- MVP state + mock data — must load BEFORE reused widgets that read
     window.useAppState / window.DASH_MOCK / window.DASH_CLAIMABLE. -->
<script type="text/babel" src="/dashboard/assets/dashboard/Shell/MvpAppStateProvider.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/Shell/MvpMockData.js"></script>

<!-- Reused widgets from main (bind to window.useAppState, work as-is). -->
<script type="text/babel" src="/dashboard/assets/shared/dashboard/Shell/AgentSwitcher.jsx"></script>
<script type="text/babel" src="/dashboard/assets/shared/dashboard/Shell/MockStateToggle.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/Onboarding/GithubAuthScreen.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/Onboarding/ClaimForm.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/Onboarding/MvpClaimScreen.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/Onboarding/MvpAddAgentModal.jsx"></script>

<!-- MVP chrome + views + app + i18n overrides. -->
<script type="text/babel" src="/dashboard/assets/data/i18n.js"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/Shell/MvpDashboardChrome.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/views/PortfolioView.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/views/OverviewView.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/views/TransactionsView.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/views/CoinbaseOnrampModal.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/views/AddressPicker.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/views/QRScanner.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/views/AddAddressModal.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/views/FundingView.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/views/SettingsView.jsx"></script>
<script type="text/babel" src="/dashboard/assets/dashboard/DashboardApp.jsx"></script>
</body>
</html>
