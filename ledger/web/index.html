<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kovaloop Ledger</title>
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%230f766e"/><path d="M18 18h28v28H18z" fill="none" stroke="%23fffdf8" stroke-width="4"/><path d="M24 29h16M24 37h16" stroke="%23fffdf8" stroke-width="4" stroke-linecap="round"/><path d="M32 14v36" stroke="%23d9c9a8" stroke-width="4" stroke-linecap="round"/></svg>'
    />
    <style>
      :root {
        --bg: #f7f3ea;
        --panel: #fffdf8;
        --ink: #1f2933;
        --muted: #66747f;
        --accent: #0f766e;
        --border: #d9c9a8;
        --danger: #b91c1c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        color: var(--ink);
        background: linear-gradient(180deg, #fffaf0 0%, var(--bg) 100%);
      }

      .shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px;
        display: grid;
        gap: 18px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: end;
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        width: 48px;
        height: 48px;
        flex: 0 0 48px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(31, 41, 51, 0.14);
      }

      .brand-copy {
        display: grid;
        gap: 5px;
        min-width: 0;
      }

      h1, h2 {
        margin: 0;
      }

      h1 {
        font-size: 36px;
        line-height: 1;
      }

      h2 {
        font-size: 16px;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .summary {
        min-height: 140px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.5;
      }

      .ledger-state {
        display: grid;
        gap: 16px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        border: 1px solid rgba(15, 118, 110, 0.18);
        background: #f4fbf8;
        border-radius: 8px;
        padding: 12px;
        min-width: 0;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 22px;
        line-height: 1.1;
        overflow-wrap: anywhere;
      }

      .state-section {
        display: grid;
        gap: 8px;
      }

      .table-wrap {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.55);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        padding: 9px 10px;
        border-bottom: 1px solid rgba(217, 201, 168, 0.75);
        text-align: left;
        vertical-align: top;
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: #f4ead4;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .status {
        display: inline-block;
        border-radius: 999px;
        padding: 3px 8px;
        background: #e0f2f1;
        color: #115e59;
        font-size: 12px;
      }

      .status-released,
      .status-credited,
      .status-submitted {
        background: #dcfce7;
        color: #166534;
      }

      .status-refunded,
      .status-failed {
        background: #fee2e2;
        color: var(--danger);
      }

      .empty {
        color: var(--muted);
        padding: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        font-size: 14px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.82);
      }

      textarea {
        min-height: 86px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 11px 13px;
        font: inherit;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .secondary {
        background: #eadfc7;
        color: var(--ink);
      }

      .danger {
        background: transparent;
        border: 1px solid rgba(185, 28, 28, 0.35);
        color: var(--danger);
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
        .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .brand-mark {
          width: 42px;
          height: 42px;
          flex-basis: 42px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <div class="brand" aria-label="Kovaloop Ledger">
          <svg class="brand-mark" viewBox="0 0 64 64" role="img" aria-labelledby="kovaloop-ledger-logo-title">
            <title id="kovaloop-ledger-logo-title">Kovaloop Ledger logo</title>
            <rect width="64" height="64" rx="14" fill="#0f766e" />
            <path d="M18 18h28v28H18z" fill="none" stroke="#fffdf8" stroke-width="4" />
            <path d="M24 29h16M24 37h16" stroke="#fffdf8" stroke-width="4" stroke-linecap="round" />
            <path d="M32 14v36" stroke="#d9c9a8" stroke-width="4" stroke-linecap="round" />
          </svg>
          <div class="brand-copy">
            <h1>Kovaloop Ledger</h1>
            <div class="hint">Offchain balances and direct transfer settlement console</div>
          </div>
        </div>
        <button class="secondary" id="refresh-button">Refresh</button>
      </header>

      <section class="card">
        <h2>Ledger State</h2>
        <div class="summary" id="ledger-state">Loading ledger state...</div>
      </section>
    </main>

    <script>
      const ledgerStateEl = document.getElementById("ledger-state");
      const refreshButtonEl = document.getElementById("refresh-button");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatAtomic(value) {
        try {
          return BigInt(value ?? 0).toLocaleString("en-US");
        } catch {
          return escapeHtml(value ?? "0");
        }
      }

      function sumAtomic(records, field) {
        return records.reduce((total, record) => {
          try {
            return total + BigInt(record?.[field] ?? 0);
          } catch {
            return total;
          }
        }, 0n);
      }

      function formatDecimal(value) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) {
          return shortValue(value, "0");
        }
        return parsed.toLocaleString("en-US", { maximumFractionDigits: 6 });
      }

      function sumDecimal(records, field) {
        return records.reduce((total, record) => {
          const parsed = Number(record?.[field]);
          return Number.isFinite(parsed) ? total + parsed : total;
        }, 0);
      }

      function statusBadge(status) {
        const safeStatus = escapeHtml(status || "unknown");
        const statusClass = String(status || "unknown").toLowerCase().replace(/[^a-z0-9_-]/g, "-");
        return `<span class="status status-${statusClass}">${safeStatus}</span>`;
      }

      function shortValue(value, fallback = "none") {
        const text = String(value ?? "").trim();
        return text ? escapeHtml(text) : `<span class="empty">${escapeHtml(fallback)}</span>`;
      }

      function formatDate(value) {
        if (!value) {
          return "none";
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return escapeHtml(value);
        }
        return escapeHtml(date.toLocaleString());
      }

      function renderTable(columns, rows, emptyLabel) {
        if (rows.length === 0) {
          return `<div class="empty">${escapeHtml(emptyLabel)}</div>`;
        }
        const header = columns.map((column) => `<th>${escapeHtml(column.label)}</th>`).join("");
        const body = rows
          .map((row) => (
            `<tr>${columns.map((column) => `<td>${column.render(row)}</td>`).join("")}</tr>`
          ))
          .join("");
        return `<div class="table-wrap"><table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table></div>`;
      }

      function renderStateSection(title, columns, rows, emptyLabel) {
        return [
          `<section class="state-section">`,
          `<h2>${escapeHtml(title)}</h2>`,
          renderTable(columns, rows, emptyLabel),
          `</section>`,
        ].join("");
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, {
          headers: {
            "content-type": "application/json",
            ...(options.headers || {}),
          },
          ...options,
        });
        const payload = await response.json().catch(() => null);
        if (!response.ok) {
          throw new Error(payload?.detail ?? JSON.stringify(payload) ?? `HTTP ${response.status}`);
        }
        return payload;
      }

      function renderLedgerState(state) {
        const accounts = Array.isArray(state?.accounts) ? state.accounts : [];
        const entries = Array.isArray(state?.entries) ? state.entries : [];
        const onrampSessions = Array.isArray(state?.onrampSessions) ? state.onrampSessions : [];
        const summary = state?.summary || {};
        const recentEntries = entries.slice(0, 6);
        ledgerStateEl.innerHTML = [
          `<div class="ledger-state">`,
          `<div class="metric-grid">`,
          `<div class="metric"><span>Accounts</span><strong>${summary.accounts ?? accounts.length}</strong></div>`,
          `<div class="metric"><span>Circle USDC Available</span><strong>${formatDecimal(summary.circleUsdcAvailable ?? sumDecimal(accounts, "circleUsdcBalance"))}</strong></div>`,
          `<div class="metric"><span>Gateway USDC Available</span><strong>${formatDecimal(summary.gatewayUsdcAvailable ?? sumDecimal(accounts, "gatewayUsdcAvailable"))}</strong></div>`,
          `<div class="metric"><span>Pending Deposits</span><strong>${formatDecimal(summary.pendingDeposits ?? sumDecimal(accounts, "gatewayUsdcPendingDeposits"))}</strong></div>`,
          `<div class="metric"><span>Pending Batch</span><strong>${formatDecimal(summary.pendingBatch ?? sumDecimal(accounts, "gatewayUsdcPendingBatch"))}</strong></div>`,
          `<div class="metric"><span>Ledger Locked</span><strong>${formatAtomic(summary.ledgerLockedAtomic ?? sumAtomic(accounts, "lockedAtomic"))}</strong></div>`,
          `<div class="metric"><span>Onramp Sessions</span><strong>${summary.onrampSessions ?? onrampSessions.length}</strong></div>`,
          `</div>`,
          renderStateSection(
            "Accounts",
            [
              { label: "Agent ID", render: (account) => `<span class="mono">${shortValue(account.agentId)}</span>` },
              { label: "Email", render: (account) => shortValue(account.email) },
              { label: "Claimed", render: (account) => account.dashboardClaimedAt ? shortValue(account.dashboardClaimedByEmail || "yes") : `<span class="empty">no</span>` },
              { label: "Claimed At", render: (account) => account.dashboardClaimedAt ? formatDate(account.dashboardClaimedAt) : `<span class="empty">none</span>` },
              { label: "Wallet Address", render: (account) => `<span class="mono">${shortValue(account.walletAddress || account.circleWalletId)}</span>` },
              { label: "Circle USDC Available", render: (account) => formatDecimal(account.circleUsdcBalance) },
              { label: "Gateway Available", render: (account) => formatDecimal(account.gatewayUsdcAvailable) },
              { label: "Gateway Total", render: (account) => formatDecimal(account.gatewayUsdcTotal) },
              { label: "Gateway Withdrawable", render: (account) => formatDecimal(account.gatewayUsdcWithdrawable) },
              { label: "Gateway Withdrawing", render: (account) => formatDecimal(account.gatewayUsdcWithdrawing) },
              { label: "Pending Deposits", render: (account) => account.gatewayBalanceError ? shortValue(account.gatewayBalanceError) : formatDecimal(account.gatewayUsdcPendingDeposits) },
              { label: "Pending Deposits Atomic", render: (account) => formatAtomic(account.gatewayPendingDepositsAtomic) },
              { label: "Pending Batch", render: (account) => formatDecimal(account.gatewayUsdcPendingBatch) },
              { label: "Pending Batch Atomic", render: (account) => formatAtomic(account.gatewayPendingBatchAtomic) },
              { label: "Ledger Locked", render: (account) => formatAtomic(account.lockedAtomic) },
              { label: "Updated", render: (account) => formatDate(account.updatedAt || account.createdAt) },
            ],
            accounts,
            "No accounts",
          ),
          renderStateSection(
            "Onramp Sessions",
            [
              { label: "Status", render: (session) => statusBadge(session.status) },
              { label: "Agent", render: (session) => `<span class="mono">${shortValue(session.agentId)}</span>` },
              { label: "Fiat Amount", render: (session) => `${shortValue(session.paymentAmount, "0")} ${shortValue(session.paymentCurrency || "USD")}` },
              { label: "Credited", render: (session) => formatAtomic(session.creditedAmountAtomic || 0) },
              { label: "Session", render: (session) => `<span class="mono">${shortValue(session.sessionId)}</span>` },
            ],
            onrampSessions,
            "No onramp sessions",
          ),
          renderStateSection(
            "Recent Entries",
            [
              { label: "Type", render: (entry) => statusBadge(entry.entryType) },
              { label: "Agent", render: (entry) => `<span class="mono">${shortValue(entry.agentId)}</span>` },
              { label: "Available Delta", render: (entry) => formatAtomic(entry.availableDeltaAtomic || 0) },
              { label: "Locked Delta", render: (entry) => formatAtomic(entry.lockedDeltaAtomic || 0) },
              { label: "Reason", render: (entry) => shortValue(entry.reason || entry.entryId) },
            ],
            recentEntries,
            "No entries",
          ),
          `</div>`,
        ].join("");

      }

      async function refreshLedgerState() {
        const [summary, accounts, entries, onrampSessions] = await Promise.all([
          requestJson("/ledger/admin/summary", { method: "GET" }),
          requestJson("/ledger/accounts", { method: "GET" }),
          requestJson("/ledger/entries?limit=50", { method: "GET" }),
          requestJson("/ledger/onramp-sessions?limit=50", { method: "GET" }),
        ]);
        renderLedgerState({
          summary,
          accounts: accounts.accounts || [],
          entries: entries.entries || [],
          onrampSessions: onrampSessions.onrampSessions || [],
        });
      }

      refreshButtonEl.addEventListener("click", refreshLedgerState);

      refreshLedgerState().catch((error) => {
        ledgerStateEl.textContent = error.message;
      });
    </script>
  </body>
</html>
