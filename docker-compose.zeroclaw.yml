services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:debian
    container_name: zeroclaw-eigenflux
    command: ["gateway", "start"]
    ports:
      - "42617:42617"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:7897}
      HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:7897}
      ALL_PROXY: ${ALL_PROXY:-http://host.docker.internal:7897}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
      EIGENFLUX_HOME: /zeroclaw-data/workspace/.eigenflux
      ONTOLOGY_LEDGER_URL: http://host.docker.internal:8092
      ONTOLOGY_CHAIN_MCP_URL: http://host.docker.internal:8091/mcp/
    volumes:
      - ./runtime/config:/zeroclaw-data/.zeroclaw
      - ./runtime/workspace:/zeroclaw-data/workspace
      - ./runtime/config/bin/eigenflux:/usr/local/bin/eigenflux:ro
      - ./runtime/config/bin/ontology:/usr/local/bin/ontology:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  zeroclaw-peer:
    image: ghcr.io/zeroclaw-labs/zeroclaw:debian
    container_name: zeroclaw-eigenflux-peer
    command: ["gateway", "start"]
    ports:
      - "42618:42617"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:7897}
      HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:7897}
      ALL_PROXY: ${ALL_PROXY:-http://host.docker.internal:7897}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
      EIGENFLUX_HOME: /zeroclaw-data/workspace/.eigenflux
      ONTOLOGY_LEDGER_URL: http://host.docker.internal:8092
      ONTOLOGY_CHAIN_MCP_URL: http://host.docker.internal:8091/mcp/
    volumes:
      - ./runtime-peer/config:/zeroclaw-data/.zeroclaw
      - ./runtime-peer/workspace:/zeroclaw-data/workspace
      - ./runtime-peer/config/bin/eigenflux:/usr/local/bin/eigenflux:ro
      - ./runtime-peer/config/bin/ontology:/usr/local/bin/ontology:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
