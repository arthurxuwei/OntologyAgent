name: kovaloop-zeroclaw

services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:debian
    container_name: zeroclaw-eigenflux
    command: ["daemon"]
    ports:
      - "42617:42617"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:7897}
      HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:7897}
      ALL_PROXY: ${ALL_PROXY:-http://host.docker.internal:7897}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
      HOME: /zeroclaw-data/workspace
      PATH: /zeroclaw-data/workspace/.local/bin:/zeroclaw-data/.zeroclaw/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/games:/usr/games
      EIGENFLUX_HOME: /zeroclaw-data/workspace/.eigenflux
    volumes:
      - ./runtime/config:/zeroclaw-data/.zeroclaw
      - ./runtime/workspace:/zeroclaw-data/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  zeroclaw-peer:
    image: ghcr.io/zeroclaw-labs/zeroclaw:debian
    container_name: zeroclaw-eigenflux-peer
    command: ["daemon"]
    ports:
      - "42618:42617"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:7897}
      HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:7897}
      ALL_PROXY: ${ALL_PROXY:-http://host.docker.internal:7897}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
      HOME: /zeroclaw-data/workspace
      PATH: /zeroclaw-data/workspace/.local/bin:/zeroclaw-data/.zeroclaw/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/games:/usr/games
      EIGENFLUX_HOME: /zeroclaw-data/workspace/.eigenflux
    volumes:
      - ./runtime-peer/config:/zeroclaw-data/.zeroclaw
      - ./runtime-peer/workspace:/zeroclaw-data/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
